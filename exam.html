   explanation:'B错误：中国共产党不是国家机关，是执政党。C错误：基层自治组织不是国家机关，且管理的是基层公共事务，不是"国家事务"。D错误：全国人民代表大会与其他国家机关不是领导关系，而是监督关系（全国人大监督行政机关、司法机关）。A正确：司法机关是国家机关，严格公正司法保障人权，有助于中国式现代化。',knowledge:'时政·二十届四中全会·国家机关'},

  {cat:'policy',type:'single',text:'从"十四五"时期科技实力跃上新台阶，到"十五五"时期科技自立自强水平大幅提高，再到二○三五年实现科技实力大幅跃升，党的二十届四中全会对我国科技事业发展作出顶层设计和战略擘画。这体现了我国（ ）①把握形势变化，及时调整科技发展政策应对挑战②坚持系统思维方法，抓住时机促进科技发展飞跃③立足整体统筹全局，综合把握科技事业发展联系④排斥相对静态思维，推动科技政策动态调整优化',
   options:['A. ①③','B. ①④','C. ②③','D. ②④'],answer:'A',
   explanation:'②错误："抓住时机促进科技发展飞跃"中"飞跃"表述不当，科技发展是渐进的，不能随意跨越阶段。④错误："排斥相对静态思维"说法绝对，辩证法不排斥相对静止，而是在把握运动中认识静止。①③正确：根据形势变化调整科技政策；三个阶段统筹规划体现立足整体综合把握联系。',knowledge:'时政·二十届四中全会·科技战略'},

  {cat:'policy',type:'single',text:'2025年10月，党的二十届四中全会明确"十五五"时期经济社会发展方面的六个"坚持"。这要求（ ）①坚决维护党中央权威和集中统一领导，以党内民主带动人民民主②尊重人民主体地位，让现代化建设成果更多更公平惠及全体人民③强化底线思维，防范和化解风险，以新发展格局保障新安全格局④稳步扩大制度型开放，以开放促改革促发展，持续增强发展动力',
   options:['A. ①③','B. ①④','C. ②③','D. ②④'],answer:'D',
   explanation:'①错误："以党内民主带动人民民主"表述有误，党内民主和人民民主是相互促进的关系，而非"带动"关系。③错误："以新发展格局保障新安全格局"因果关系有误，应是统筹发展和安全，二者相互支撑。②④正确：坚持人民至上要求尊重人民主体地位；坚持扩大高水平开放要求制度型开放以开放促发展。',knowledge:'时政·二十届四中全会·六个坚持'},

  {cat:'policy',type:'single',text:'为落实党的二十届四中全会关于"加快农业农村现代化，扎实推进乡村全面振兴"的战略部署，吉林省通过领导督管、科技赋能、发展特色产业等系列举措，在2025年实现了粮食面积、单产、总产的全面增长。下列举措中与吉林省乡村振兴路径相符的是（ ）①完善农村土地流转制度→促进农业规模化经营→提高农业生产效率→推动乡村产业振兴②深化农村土地制度改革→保障农民土地所有权→增加农民财产性收入→助力乡村生活富裕③坚守耕地保护红线→稳定粮食播种面积→保障国家粮食安全→夯实乡村振兴基础④建立城乡统一的建设用地市场→引导资本下乡→促进城乡融合发展→实现乡村生态宜居',
   options:['A. ①②','B. ①③','C. ②④','D. ③④'],answer:'B',
   explanation:'②错误：农村土地实行集体所有制，农民享有土地承包经营权而非所有权，"保障土地所有权"表述错误。④错误：建立城乡统一建设用地市场→促进城乡融合，最终目标不是"生态宜居"而是城乡协调发展，且路径对应不准。①③路径推导逻辑正确。',knowledge:'时政·二十届四中全会·乡村振兴'},

  {cat:'policy',type:'single',text:'党的二十届四中全会强调，要通过完善地方税、直接税体系，健全经营所得、资本所得、财产所得税收政策，规范税收优惠政策，保持合理的宏观税负水平。上述举措（ ）①能增强高质量发展动力②旨在巩固加强党的领导③发挥积极财政政策作用④发挥适度宽松货币政策作用',
   options:['A. ①③','B. ①④','C. ②③','D. ②④'],answer:'A',
   explanation:'②错误：完善税收制度是经济领域改革，目的是促进高质量发展和优化分配，不是"巩固党的领导"。④错误：税收政策属于财政政策，不是货币政策。①③正确：规范税收优惠、合理税负有助于增强发展动力；税收调整是积极财政政策的重要工具。',knowledge:'时政·二十届四中全会·税收政策'},

  {cat:'policy',type:'single',text:'党的二十届四中全会强调，加快人工智能等数智技术创新，强化算力、算法、数据等高效供给，全面实施"人工智能+"行动，全方位赋能千行百业。这一战略部署旨在（ ）①深化供给侧结构性改革，发挥数字强国优势②提高我国全要素生产率，推动经济高质量发展③加快高水平科技自立自强，引领新质生产力发展④优化技术创新体系顶层设计，推进国家治理体系现代化',
   options:['A. ①②','B. ①④','C. ②③','D. ③④'],answer:'C',
   explanation:'①中"发挥数字强国优势"表述有误，我国目前仍在建设数字强国，并非已经是数字强国。④"推进国家治理体系现代化"与人工智能赋能千行百业的直接关联不强，目的更聚焦于经济和产业发展。②③正确：AI赋能提高全要素生产率，推动高质量发展；加快科技自立自强，引领新质生产力。',knowledge:'时政·二十届四中全会·人工智能'},

  {cat:'policy',type:'single',text:'《加快建设农业强国规划(2024—2035年)》提出：有序推进农村集体经营性建设用地入市改革，健全土地增值收益分配机制；发展新型农村集体经济，赋予农民更加充分的财产权益。这有助于（ ）①促进农村要素深度参与统一大市场，提高资源配置效率②拓宽农民分享改革成果的渠道，提高农民生产热情③扭转集体经济发展颓势，提高集体经济的综合效益④推动土地价格普遍上涨，提高农户抗风险能力',
   options:['A. ①②','B. ①③','C. ②④','D. ③④'],answer:'A',
   explanation:'③错误："扭转颓势"预设了集体经济处于颓势，表述不当，且不是直接目的。④错误：推动土地价格"普遍上涨"不是政策目标，可能带来负面影响，且"提高抗风险能力"不是直接效果。①②正确：建设用地入市促进要素参与统一大市场，提高配置效率；分配机制改革拓宽农民获得感渠道。',knowledge:'时政·二十届四中全会·农村土地改革'},

  {cat:'policy',type:'single',text:'2025年11月，经党中央、国务院批准，重庆市撤销江北区、渝北区，设立两江新区，形成两江新区聚焦打造开放与产业创新引擎、北碚区着力构建生态文旅与康养高地的错位发展格局，以空间布局和功能配置的优化重塑区域发展能级。此次行政区划调整有助于（ ）①明确两区功能定位，推动要素高效聚集②扩大重庆经济规模，释放西部发展潜力③优化国有资本布局，实现国资保值增值④理顺行政管理结构，更好发挥政府作用',
   options:['A. ①②','B. ①④','C. ②③','D. ③④'],answer:'B',
   explanation:'②错误：行政区划调整的目的是优化功能定位和治理效能，不是直接"扩大经济规模"，表述目的偏差。③错误：行政区划调整与国有资本布局优化没有直接关联。①④正确：错位发展格局明确了功能定位，推动要素聚集；理顺行政结构更好发挥政府作用是区划调整的直接目的。',knowledge:'时政·二十届四中全会·行政区划'},

  {cat:'policy',type:'single',text:'"抱歉，我是i人，不太擅长与人打交道。"MBTI将人分为16种基本类型，近两年成为青年人的社交新名片，甚至成为一些学生进行职业生涯规划的依据。对此，下列认识正确的是（ ）①MBTI测试可以帮助我们在交往中迅速准确掌握彼此性格特征，降低社交成本②MBTI的16种人格类型充分归纳概括了人的多样性，能够帮助人们认清自我③MBTI测试是一个很好的交流素材，能够帮助人们找到共同话题打破社交困境④职业与人格特质之间不存在必然的对应关系，依赖MBTI测试结果来选职业不可取',
   options:['A. ①②','B. ①③','C. ②④','D. ③④'],answer:'D',
   explanation:'①错误：MBTI不能"迅速准确"掌握他人特征，性格是复杂多变的，不能简单标签化。②错误：16种类型不能"充分"归纳人的多样性，人的性格是丰富复杂的，不能简化为16类，且不一定能帮助人们"认清自我"。③④正确：MBTI可作为社交话题素材；职业选择不应依赖人格测试，二者无必然对应关系。',knowledge:'时政·二十届四中全会·生活与哲学'},

  {cat:'policy',type:'single',text:'党的二十届四中全会提出，要促进高质量充分就业，完善收入分配制度，办好人民满意的教育，健全社会保障体系，推动房地产高质量发展，加快建设健康中国，促进人口高质量发展，稳步推进基本公共服务均等化。这是基于（ ）①改革要坚持以人民为中心的价值取向，让人民共享发展成果②改革要注重解决发展动力问题，把人民作为发展的力量源泉③高质量发展就是能满足人民日益增长的美好生活需要的发展④进一步全面深化改革是建设社会主义现代化国家的首要任务',
   options:['A. ①③','B. ①④','C. ②③','D. ②④'],answer:'A',
   explanation:'②错误：材料强调的是改善民生、共享发展，侧重人民是发展"目的"，不是"解决发展动力问题"。④错误：建设社会主义现代化国家的首要任务是高质量发展，不是"全面深化改革"。①③正确：民生建设体现以人民为中心的价值取向；高质量发展的目的是满足人民美好生活需要。',knowledge:'时政·二十届四中全会·民生改革'},

  {cat:'policy',type:'single',text:'2025年10月24日，中共中央举行新闻发布会，介绍和解读党的二十届四中全会精神。关于"个人养老金制度"，以下表述正确的是（ ）①个人养老金具有公益性、政府主导特点，是我国养老保险体系的重要支柱②有利于扩大养老金产品和服务供给，拓宽居民投资渠道，增加个人财产性收入③是国家利用再分配机制进行调节的表现，有利于健全我国养老保险体系④有利于完善我国养老保障体系，更好地发挥对社会保障的有益补充作用',
   options:['A. ①②','B. ①③','C. ②④','D. ③④'],answer:'C',
   explanation:'①错误：个人养老金是市场化、个人自愿参与的制度，不是"政府主导"，更强调个人责任和市场运营。③错误：个人养老金不是再分配机制，再分配通常指政府通过税收、社保、转移支付进行调节，个人养老金属于个人储蓄投资。②④正确：扩大产品供给、拓宽投资渠道增加财产性收入；个人养老金是第三支柱，是社会保障的有益补充。',knowledge:'时政·二十届四中全会·养老制度'},

  {cat:'policy',type:'single',text:'二十届四中全会提出，坚持扩大内需这个战略基点，坚持惠民生和促消费、投资于物和投资于人紧密结合，促进消费和投资、供给和需求良性互动，增强国内大循环内生动力和可靠性。下列关于扩大内需的传导路径正确的是（ ）',
   options:['A. 实施消费品以旧换新补贴→增加居民财产性收入→提升消费能力','B. 财政贴息支持重点领域设备更新→降低经营风险→升级消费品质','C. 财政政策适度宽松→下调个人所得税起征点→刺激消费需求','D. 提高医疗养老保障能力→激发健康养老产业活力→挖掘消费潜力'],answer:'D',
   explanation:'A错误：以旧换新补贴降低的是消费成本，不会增加"财产性收入"（财产性收入来自资产收益），而是降低消费支出。B错误：设备更新贴息降低企业成本，与"升级消费品质"之间路径跳跃太大。C错误：积极财政政策下调个税起征点意思相反（"下调"会扩大纳税范围，不是刺激消费）；且"财政政策适度宽松"对应的是积极财政政策。D路径逻辑正确：提高保障能力→产业活力→消费潜力。',knowledge:'时政·二十届四中全会·扩大内需'},

  {cat:'policy',type:'single',text:'党的二十届四中全会提出"弘扬诚信文化、廉洁文化"，将其作为精神文明建设的重要内容。弘扬诚信文化的哲学依据是（ ）①意识对改造客观世界具有指导作用②价值观对人的行为具有导向作用③社会意识的变化先于社会存在的变化④上层建筑要适应经济基础的发展',
   options:['A. ①②','B. ①③','C. ②④','D. ③④'],answer:'A',
   explanation:'③错误：社会意识有时会落后于社会存在，有时会超前于社会存在，不能说"变化先于"，这与唯物史观"社会存在决定社会意识"相矛盾。④中"上层建筑适应经济基础"是社会历史规律，与弘扬诚信文化的哲学依据关联不直接（文化是上层建筑，但题目问的是弘扬诚信的依据）。①②正确：弘扬诚信文化体现意识对实践的指导作用；诚信价值观对人行为具有导向作用。',knowledge:'时政·二十届四中全会·文化建设哲学'},

  {cat:'policy',type:'single',text:'党的二十届四中全会围绕"十五五"规划编制作出部署，明确提出"因地制宜发展新质生产力"，强调"坚持有效市场和有为政府相结合"。这一部署的理论依据是（ ）①生产关系要适应生产力发展的客观规律②社会主义市场经济体制的本质特征是科学的宏观调控③新质生产力是推动高质量发展的内在要求④政府在资源配置中起决定性作用',
   options:['A. ①②','B. ①③','C. ②④','D. ③④'],answer:'B',
   explanation:'②错误：社会主义市场经济体制的本质特征是坚持党的领导，不是"科学的宏观调控"。④错误：在市场经济中，市场在资源配置中起决定性作用，而非政府。①③正确：有效市场和有为政府结合是发展生产力的制度保障，体现生产关系适应生产力；新质生产力是高质量发展的内在要求。',knowledge:'时政·二十届四中全会·新质生产力理论'},

  {cat:'policy',type:'single',text:'2025年政府工作报告及党的二十届四中全会明确强调，发展新质生产力的核心驱动是（ ）',
   options:['A. 扩大传统产业规模','B. 全面加强自主创新','C. 依赖国外技术引进','D. 单纯追求经济增速'],answer:'B',
   explanation:'发展新质生产力强调以科技创新为核心，特别是原创性、颠覆性科技创新，关键在于自主创新。A扩大传统产业规模是传统发展方式，不是新质生产力的核心。C依赖国外技术引进与科技自立自强相悖。D单纯追求增速与高质量发展相悖。B"全面加强自主创新"是新质生产力的核心驱动力。',knowledge:'时政·二十届四中全会·新质生产力'},

  {cat:'policy',type:'single',text:'2025年10月党的二十届四中全会审议通过建议，明确2026-2030年"十五五"时期坚持公有制为主体、多种所有制经济共同发展，推动各类所有制经济优势互补、协同发展。某"十五五"重点项目中，国有资本聚焦核心技术研发，民营资本参与配套生产与市场推广，形成高效合作格局。这一现象体现我国生产资料所有制的特点是（ ）',
   options:['A. 公有制经济是唯一的市场主体','B. 各类所有制经济依法平等使用生产要素','C. 非公有制经济在我国国民经济中占主体地位','D. 国有经济控制国民经济命脉'],answer:'B',
   explanation:'A错误：公有制经济不是"唯一"市场主体，非公有制经济也是市场主体。C错误：公有制经济在我国国民经济中占主体地位，不是非公有制经济。D国有经济控制命脉是正确的，但题目强调的是两种资本合作，体现的是平等使用要素，B更准确。B正确：国有资本和民营资本在同一项目中平等参与，体现各类所有制经济依法平等使用生产要素。',knowledge:'时政·二十届四中全会·所有制'},

  {cat:'policy',type:'single',text:'"十五五"期间，我国继续为民营小微企业提供税收优惠、融资支持，同时推动国有资本向能源、国防等关键领域集中。材料相关举措的根本依据是（ ）',
   options:['A. 我国坚持以人民为主体','B. 生产资料所有制决定生产力状况','C. 适应我国生产力发展的客观状况','D. 国有经济是社会主义经济制度的基础'],answer:'C',
   explanation:'A"以人民为主体"是价值立场，不是经济制度安排的根本依据。B"所有制决定生产力"说法有误，应是生产关系要适应生产力，生产力决定生产关系。D国有经济是社会主义经济制度的基础表述正确，但不是"根本依据"，根本依据是生产力发展状况。C正确：对不同类型企业采取不同政策，根本上是适应我国生产力发展的客观状况，即生产关系适应生产力。',knowledge:'时政·二十届四中全会·所有制政策依据'},

  {cat:'policy',type:'single',text:'"十五五"规划提出"深化混合所有制改革，促进国有资本、集体资本、非公有资本交叉持股、相互融合"。某国有控股企业通过混合所有制改革引入民营资本后，研发投入增加、市场活力提升。这说明混合所有制改革的积极作用有（ ）①实现各类所有制资本优势互补②降低国有资本在企业中的比重③激发企业创新活力和发展动力④消除不同所有制经济的性质差异',
   options:['A. ①②','B. ①③','C. ②④','D. ③④'],answer:'B',
   explanation:'②错误："降低国有资本比重"不是混合所有制改革的目的，目的是实现优势互补，不是刻意降低国有比重。④错误：混合所有制不能"消除性质差异"，公有制和非公有制经济的性质仍然不同。①③正确：各类资本合作实现优势互补；研发增加、市场活力提升体现激发了创新活力和发展动力。',knowledge:'时政·二十届四中全会·混合所有制'},

  {cat:'policy',type:'single',text:'2025年10月，中共二十届四中全会通过的建议中明确：要充分激发各类经营主体活力，加快完善要素市场化配置体制机制。允许民营企业参与石化、核电、铁路等多个领域项目建设，这有利于（ ）',
   options:['A. 毫不动摇的巩固和发展非公有制经济','B. 取消市场门槛，为民营经济创造发展空间','C. 破除壁垒，引导民营资本控制国民经济命脉','D. 各种所有制经济取长补短、相互促进'],answer:'A',
   explanation:'B错误："取消市场门槛"说法不当，是"降低""打破不合理门槛"，而非"取消"所有门槛。C错误：国民经济命脉应由国有经济控制，不能引导民营资本控制。D说法合理但不如A直接，A最直接对应"允许民营企业参与更多领域"的政策取向。A正确：允许民营企业进入更多领域，正是毫不动摇巩固和发展非公有制经济的体现。',knowledge:'时政·二十届四中全会·民营经济'},

  {cat:'policy',type:'single',text:'中国共产党第二十届中央委员会第四次全体会议于2025年10月20日至23日在北京举行，全会提出，加大保障和改善民生力度，扎实推进全体人民共同富裕。这是因为（ ）①人民群众在任何时期都是社会变革的主力军②中国特色社会主义是亿万人民群众自己的事业③群众路线是党制定方针、政策的根本出发点④人民至上体现着一个社会评价是非曲直的标准',
   options:['A. ①②','B. ①④','C. ②③','D. ③④'],answer:'C',
   explanation:'①错误："在任何时期"说法绝对，且人民群众是历史主体，不仅仅是"变革的主力军"这一单一表述。④错误："人民至上体现评价是非曲直的标准"属于价值观层面，与保障民生改善生活的直接原因关联不紧密，且表述不够准确。②③正确：中国特色社会主义是人民群众自己的事业，体现群众路线；群众路线是党制定政策的根本出发点，所以要改善民生。',knowledge:'时政·二十届四中全会·群众路线'},

  {cat:'policy',type:'single',text:'党的二十届四中全会高度评价"十四五"时期我国发展取得的重大成就，指出这一时期"发展历程极不寻常、极不平凡"。今年是"十四五"的收官之年，前三季度，我国国内生产总值超过100万亿元，同比增长5.2%。这些成就的取得得益于我国（ ）①实施稳健的财政政策，激发市场主体活力②推进制度型开放，构建更高水平开放型经济新体制③经济实力、科技实力、综合国力跃上了新台阶④坚持创新驱动发展战略，突破"卡脖子"技术难题',
   options:['A. ①②','B. ①③','C. ②④','D. ③④'],answer:'C',
   explanation:'①错误：我国实施的是"积极的财政政策"而非"稳健的财政政策"（稳健是货币政策的原有表述，现已改为"适度宽松"）。③是对成就的描述，不是"得益于"的原因（成就不能作为取得成就的原因）。②④正确：推进制度型开放和创新驱动战略是取得成就的重要原因。',knowledge:'时政·二十届四中全会·十四五成就'},

  {cat:'policy',type:'single',text:'党的二十届四中全会提出，要促进高质量充分就业，完善收入分配制度，办好人民满意的教育，健全社会保障体系，推动房地产高质量发展，加快建设健康中国，促进人口高质量发展，稳步推进基本公共服务均等化。这是基于（ ）①改革要坚持以人民为中心的价值取向，让人民共享发展成果②改革要注重解决发展动力问题，把人民作为发展的力量源泉③高质量发展就是能很好满足人民日益增长的美好生活需要的发展④进一步全面深化改革是建设社会主义现代化国家的首要任务',
   options:['A. ①③','B. ①④','C. ②③','D. ②④'],answer:'A',
   explanation:'②错误：材料侧重人民是发展"目的"，而非解决"动力"问题。④错误：建设社会主义现代化国家的首要任务是高质量发展，不是"全面深化改革"。①③正确：以人民为中心让人民共享发展成果；高质量发展的核心是满足人民美好生活需要。',knowledge:'时政·二十届四中全会·高质量发展目的'},

  {cat:'policy',type:'single',text:'为扎实推进中国特色社会主义文化强国建设，党的二十届四中全会对文化领域制度建设作出部署，提出要激发全民族文化创新创造活力。发展新时代中国特色社会主义文化，必须（ ）①完善党对宣传思想文化工作的全面领导制度②坚持马克思主义在意识形态领域指导地位的根本制度③建立健全经济效益放在首位的文化创作生产体制机制④推进国际传播能力建设以强化国外民众对中华文化的深度认同',
   options:['A. ①②','B. ①③','C. ②④','D. ③④'],answer:'A',
   explanation:'③错误：文化创作生产要把社会效益放在首位，实现社会效益和经济效益相统一，不是"经济效益放在首位"。④错误：推进国际传播能力建设有助于文化传播，但不能保证"国外民众的深度认同"，且"强化深度认同"说法过于绝对。①②正确：党的全面领导是文化建设的根本保证；坚持马克思主义指导地位是根本制度。',knowledge:'时政·二十届四中全会·文化强国'},

  {cat:'policy',type:'single',text:'党的二十届四中全会提出，加快构建高水平社会主义市场经济体制，增强高质量发展动力。坚持和完善社会主义基本经济制度，更好发挥经济体制改革牵引作用。从哲学上看，强调发挥经济体制改革牵引作用是因为（ ）①生产力是社会历史发展的最终决定力量②生产关系对生产力具有重要的反作用③改革是实现社会主义自我完善的根本途径④先进的上层建筑推动经济基础的发展进程',
   options:['A. ①③','B. ①④','C. ②③','D. ②④'],answer:'C',
   explanation:'①正确但不对应"经济体制改革牵引"，生产力是最终决定力量是说明为何要改革，不是改革牵引作用的哲学依据。④错误：经济体制是生产关系的表现，上层建筑适应经济基础，但"先进上层建筑推动经济基础"不是经济体制改革的哲学依据。②③正确：经济体制改革是生产关系的调整，适应生产力；改革是社会主义自我完善和发展的根本途径。',knowledge:'时政·二十届四中全会·经济体制改革哲学'},

  {cat:'policy',type:'single',text:'习近平总书记在二十届中央纪委四次全会上指出，面对党内党风廉政建设和反腐败斗争的突出问题，我们坚持有腐必反、有贪必肃，不断纯洁干部队伍，维护了党的形象，巩固了红色江山，赢得了确保党不变质、不变色、不变味的历史主动。这体现了（ ）①全面从严治党，基础在严②打铁还需自身硬③新时代党的建设必须以先进性和纯洁性建设为根基④中国共产党保持解决大党独有难题的清醒和坚定',
   options:['A. ①②','B. ②③','C. ③④','D. ②④'],answer:'D',
   explanation:'①"基础在严"说法不当，全面从严治党的基础在党的政治建设，不是笼统的"在严"。③新时代党的建设"以先进性和纯洁性建设为根基"，但应以党的政治建设为统领，先进性和纯洁性是目标而非根基。②④正确："打铁还需自身硬"体现自我革命；坚持反腐体现保持解决大党独有难题的清醒和坚定。',knowledge:'时政·二十届四中全会·全面从严治党'},

  {cat:'policy',type:'single',text:'党的二十届四中全会审议通过的《"十五五"规划建议》指出，我国发展处于战略机遇和风险挑战并存的时期，要"固本升级传统产业、创新育新新兴产业"，既发挥超大规模市场优势，又加快科技自立自强，推动高质量发展。这一部署体现的哲学道理是（ ）①全面地看问题，坚持两点论，统筹兼顾②矛盾的普遍性与特殊性是辩证统一的③矛盾双方既对立又统一，推动事物发展④矛盾的同一性寓于矛盾的斗争性之中',
   options:['A. ①③','B. ①④','C. ②③','D. ②④'],answer:'A',
   explanation:'②矛盾普遍性与特殊性统一与材料内容对应不直接。④"同一性寓于斗争性"是矛盾同一性与斗争性的关系，与材料"统筹兼顾传统与新兴产业"对应不好。①③正确：既升级传统又发展新兴，体现两点论全面看问题；传统与新兴产业既对立（资源竞争）又统一（协同发展），体现矛盾双方对立统一推动发展。',knowledge:'时政·二十届四中全会·产业发展哲学'},

  {cat:'policy',type:'single',text:'2025年10月召开的党的二十届四中全会提出，"坚持智能化、绿色化、融合化方向，加快建设制造强国、质量强国、航天强国、交通强国、网络强国""要优化提升传统产业，培育壮大新兴产业和未来产业，促进服务业优质高效发展，构建现代化基础设施体系"。这些要求（ ）①体现了意识活动具有目的性，能够为国家产业发展提供行动指南②表明意识能够指导实践促进事物的发展，推动我国跨越式进步③是尊重产业发展客观规律与正确发挥主观能动性相结合的体现④将"智能化、绿色化"的需要作为经济发展依据，使客观符合主观',
   options:['A. ①②','B. ①③','C. ②④','D. ③④'],answer:'B',
   explanation:'②错误：意识不是"都能"促进事物发展，只有正确意识才能，且"跨越式进步"说法不妥，发展有其规律性。④错误："使客观符合主观"是唯心主义表述，正确的是在尊重客观的基础上发挥主观能动性。①③正确：全会精神有明确目的性，为产业发展指明方向；战略部署体现尊重规律与主观能动性相结合。',knowledge:'时政·二十届四中全会·意识与规律'},

  {cat:'policy',type:'single',text:'党的二十届四中全会指出，建设强大国内市场，加快构建新发展格局。要大力提振消费，扩大有效投资，坚决破除阻碍全国统一大市场建设卡点堵点。下列选项不符合这一要求的是（ ）①甲省积极参与推动完善跨区域的全国碳排放权交易市场体系②乙省对省内欠发达地区企业生产的产品施行差异化质检标准③丙市全面清理招投标领域对外地企业设置的歧视性限制条款④丁市对采购本地原材料占比超过六成企业给予额外财政奖励',
   options:['A. ①②','B. ①③','C. ②④','D. ③④'],answer:'C',
   explanation:'①甲省参与跨区域碳交易市场符合统一大市场要求，正确。③丙市清理歧视性限制符合统一大市场要求，正确。②乙省对本地欠发达企业实行差异化质检标准，属于地方保护主义，破坏了统一大市场的统一质量标准，不符合要求。④丁市奖励采购本地原材料的企业，属于地方保护，限制了要素自由流通，不符合统一大市场要求。②④不符合要求，选C。',knowledge:'时政·二十届四中全会·统一大市场'},

  {cat:'policy',type:'single',text:'党的二十届四中全会明确提出，"十五五"时期经济社会发展必须坚持全面深化改革，运用改革办法破解发展难题。之所以要全面深化改革，是因为（ ）',
   options:['A. 改革是社会变革的决定力量','B. 社会基本矛盾只能通过改革解决','C. 改革是推动人类社会发展的根本动力','D. 改革是社会主义社会发展的直接动力'],answer:'D',
   explanation:'A错误：社会变革的决定力量是生产力，不是改革。B错误：阶级社会的基本矛盾通过阶级斗争和社会革命解决；社会主义社会的基本矛盾通过改革（自我完善）解决，不是"只能通过改革"。C错误：推动人类社会发展的根本动力是社会基本矛盾运动，不是改革（改革是社会主义社会发展的直接动力）。D正确：改革是社会主义社会发展的直接动力。',knowledge:'时政·二十届四中全会·改革动力'},

  {cat:'policy',type:'single',text:'2025年10月，中国共产党二十届四中全会强调，"治国必先治党，党兴才能国强。必须以永远在路上的坚韧和执着，持之以恒推进全面从严治党"，"推进党的作风建设常态化长效化，坚定不移开展反腐败斗争，为实现'十五五'时期经济社会发展目标提供坚强保证"。以下认识正确的是（ ）①做好全面从严治党能够有力引领保障新征程开局起步②反腐败斗争的成效决定着伟大斗争和伟大事业的成败③深入推进反腐败斗争要以自我监督和人民监督相结合为强大动力④深入推进反腐败斗争要以党的作风建设为统领、党的各项建设同向发力',
   options:['A. ①②','B. ①③','C. ②④','D. ③④'],answer:'B',
   explanation:'②错误："决定着成败"说法过于绝对，反腐败斗争是重要保证，但不能说"决定成败"。④错误：党的建设以"党的政治建设为统领"，不是以"作风建设为统领"。①③正确：全面从严治党为新征程提供坚强保证；推进反腐要以自我监督（党的纪律）和人民监督相结合。',knowledge:'时政·二十届四中全会·全面从严治党'},

  {cat:'policy',type:'single',text:'二十届四中全会公报指出，"我国经济基础稳、优势多、韧性强、潜能大，长期向好的支撑条件和基本趋势没有变，中国特色社会主义制度优势更加彰显"。这一论断的理论依据在于（ ）①中国特色社会主义制度是当代中国发展进步的根本制度保障②制度优势是中国共产党领导人民取得胜利的根本保证③中国特色社会主义制度是超越社会主义初级阶段的制度创新④中国特色社会主义制度的优势集中体现为经济全球化的治理能力',
   options:['A. ①②','B. ①③','C. ②④','D. ③④'],answer:'A',
   explanation:'③错误：中国特色社会主义制度不是"超越社会主义初级阶段"，而是立足社会主义初级阶段基本国情的制度创新。④错误：中国特色社会主义制度优势是全面的，不能仅集中体现为"经济全球化的治理能力"，表述过于片面。①②正确：中国特色社会主义制度是根本制度保障；制度优势是党领导人民取得胜利的重要保证。',knowledge:'时政·二十届四中全会·制度优势'},

  {cat:'policy',type:'single',text:'二十届四中全会公报明确"十五五"时期要"推动人的全面发展、全体人民共同富裕迈出坚实步伐"，到2035年实现"人民生活更加幸福美好"。这体现了中国式现代化的显著特征是（ ）①是全体人民同步富裕的现代化②是物质文明与精神文明相协调的现代化③是坚持以人民为中心的现代化④是超越资本主义阶段的跨越式现代化',
   options:['A. ①②','B. ①④','C. ②③','D. ③④'],answer:'C',
   explanation:'①错误：中国式现代化是全体人民"共同富裕"的现代化，不是"同步富裕"（允许先富后富，最终共同富裕，不是同步）。④错误：中国式现代化不是"超越资本主义阶段"，而是走独立自主的道路，"跨越式"说法不妥。②③正确："人民生活幸福美好"既涉及物质也涉及精神，体现物质精神协调；以人民为中心是中国式现代化的本质要求。',knowledge:'时政·二十届四中全会·中国式现代化'},

  {cat:'policy',type:'single',text:'二十届四中全会指出，"十五五"时期我国发展环境面临深刻复杂变化，不确定难预料因素增多，但我国经济基础稳、优势多、韧性强、潜能大，长期向好的支撑条件和基本趋势没有变。这一判断体现了（ ）',
   options:['A. 矛盾主次方面在一定条件下可以相互转化','B. 办事情要坚持两点论与重点论相结合的方法','C. 主要矛盾对事物发展起决定作用，要抓住重点','D. 要善于把握矛盾的主要方面，认清形势的主流'],answer:'D',
   explanation:'判断中既看到了"不确定因素增多"（支流、次要方面），又指出"长期向好趋势没有变"（主流、主要方面），重在认清形势的主流，体现了把握矛盾主要方面。A矛盾主次方面转化与题意不符。B两点论与重点论结合与题意相关但不如D准确。C主要矛盾是整体局面，本题谈的是矛盾的主要方面（同一矛盾内部的主要与次要方面）。选D。',knowledge:'时政·二十届四中全会·矛盾主要方面'},

  {cat:'policy',type:'single',text:'2025年10月20日至23日，党的二十届四中全会在北京召开，研究关于制定国民经济和社会发展第十五个五年规划的建议。回望过去十年，十八届四中全会以"全面深化改革"破题，十九届四中全会聚焦"国家治理现代化"。每次四中全会都承担着将党代会精神转化为制度设计的关键职能。由此可知（ ）',
   options:['A. 党坚持问题导向，进一步扩大了开放','B. 党始终坚持以经济建设为中心','C. 党全面深化改革，加强改革顶层设计','D. 党确定了我国发展的具体方案'],answer:'C',
   explanation:'A错误：材料强调的是制度设计和改革，而非扩大开放，范围与材料不符。B错误：三次四中全会主题都不是经济建设，且"始终"说法绝对。D错误：全会制定的是战略规划和制度框架，不是"具体方案"。C正确：每次四中全会将党代会精神转化为制度设计，体现党加强改革顶层设计。',knowledge:'时政·二十届四中全会·改革顶层设计'},

  {cat:'policy',type:'single',text:'党的二十届四中全会强调，必须以永远在路上的坚韧和执着，持之以恒推进全面从严治党，坚决把党的自我革命要求落实到位，推进党的作风建设常态化长效化，坚定不移开展反腐败斗争，为实现"十五五"时期经济社会发展目标提供坚强保证。这体现了我们党（ ）①推进党的建设伟大事业，巩固党的执政地位②重视推进自我革命，增强党的生机和活力③保持先进性和纯洁性，维护最广大人民的根本利益④始终以制度建设为统领，坚持全面从严治党',
   options:['A. ①④','B. ①②','C. ②③','D. ③④'],answer:'C',
   explanation:'①错误：党的建设的目的是更好为人民服务，"巩固党的执政地位"说法带有功利性，不是党建的根本出发点。④错误：全面从严治党以党的政治建设为统领，不是"制度建设为统领"。②③正确：自我革命增强党的生机活力；坚持反腐败维护最广大人民根本利益。',knowledge:'时政·二十届四中全会·党的建设'},

  {cat:'policy',type:'single',text:'2025年10月20-23日召开的中国共产党第二十届四中全会指出：要勇于面对风高浪急甚至惊涛骇浪的重大考验，以历史主动精神克难关、战风险、迎挑战。为此，中国共产党要（ ）',
   options:['A. 建设伟大工程','B. 进行伟大斗争','C. 推进伟大事业','D. 全面依法治国'],answer:'B',
   explanation:'"勇于面对风险挑战、克难关、战风险"直接对应的是"进行伟大斗争"。伟大斗争是"四个伟大"中应对风险挑战、迎难而上的实践。A建设伟大工程指党的建设；C推进伟大事业指中国特色社会主义；D全面依法治国是治国方式。B"进行伟大斗争"最直接对应"战风险、迎挑战"。',knowledge:'时政·二十届四中全会·四个伟大'},

  {cat:'policy',type:'single',text:'党的二十届四中全会明确指出，"十五五"时期经济社会发展必须以改革创新为根本动力，同时强调要扩大高水平对外开放，开创合作共赢新局面。关于改革开放，下列说法正确的是（ ）①实现了中华民族从站起来、富起来到强起来的伟大飞跃②完成了中华民族伟大复兴的历史使命③能够为中国式现代化提供动力，只有进行时，没有完成时④是党和人民大踏步赶上时代的重要法宝',
   options:['A. ①②','B. ①③','C. ②④','D. ③④'],answer:'D',
   explanation:'①错误：中华民族"站起来、富起来到强起来"的伟大飞跃是中国共产党的百年奋斗成就，不是单独由"改革开放"实现的，站起来是新中国成立，改革开放主要对应富起来和强起来的部分。②错误：民族复兴尚未"完成"，还在推进之中。③④正确：改革开放是为中国式现代化提供持续动力，只有进行时；改革开放是党和人民大踏步赶上时代的重要法宝（邓小平的论断）。',knowledge:'时政·二十届四中全会·改革开放'},

  {cat:'policy',type:'single',text:'新时代全面从严治党以落实中央八项规定精神开局破题。2025年1月6日，二十届中央纪委四次全会强调，坚决打赢反腐败斗争攻坚战、持久战、总体战，2025年3月至7月在全党开展贯彻中央八项规定精神的学习教育，持续纯洁党的作风。由此可知（ ）①党风建设取得了历史性成就、发生了历史性的变革②党建围绕自我革命中心工作一步不停歇、半步不退让③中央八项规定作为党风建设的代名词不断深化落实④刀刃向内去毒瘤、猛药去疴治顽疾，持之以恒正风肃纪反腐',
   options:['A. ①②','B. ①③','C. ②④','D. ③④'],answer:'C',
   explanation:'①表述虽然正确，但"党风建设取得了历史性成就"不是材料的直接体现，材料强调的是持续推进反腐，未说明"已取得历史性成就"。③"中央八项规定作为党风建设的代名词"说法片面，中央八项规定是抓手和起点，不是代名词。②④正确：持续开展反腐学习体现党建围绕自我革命不停歇；攻坚战持久战体现持之以恒正风肃纪反腐。',knowledge:'时政·二十届四中全会·作风建设'},

  {cat:'policy',type:'single',text:'2025年10月，党的二十届四中全会从我国客观国情出发，明确了"十五五"时期经济社会发展目标，强调"坚持高质量发展，以新发展理念引领发展，因地制宜发展新质生产力"。据此各地加快技术创新、产业升级，推动经济质效持续提升。这一现象体现的唯物史观道理是（ ）①社会意识具有相对独立性，社会意识促进了社会存在发展②实践具有社会历史性，要因时因地发展新质生产力③社会存在决定社会意识，社会存在变化决定社会意识变化④先进社会意识能正确预见社会发展方向和趋势并推动实践发展',
   options:['A. ①②','B. ①④','C. ②③','D. ③④'],answer:'D',
   explanation:'①错误：社会意识有时促进有时阻碍社会存在发展，不是笼统说"促进了"，只有先进社会意识才促进发展。②"实践具有社会历史性"是实践的特征，不是唯物史观的道理，与材料关联不紧密。③④正确：从客观国情出发（社会存在）决定了发展战略（社会意识），体现社会存在决定社会意识；新发展理念引领发展体现先进社会意识推动实践。',knowledge:'时政·二十届四中全会·唯物史观'},

  {cat:'policy',type:'single',text:'2025年10月，科技部在介绍党的二十届四中全会精神时强调，要"加强原始创新和关键核心技术攻关"。这里的"原始创新"指前所未有的突破性创新。若从人类社会的"原始"阶段看，原始社会的生产力状况主要表现为（ ）',
   options:['A. 劳动技能低下，使用打制石器等简陋生产工具','B. 氏族首领利用权力管理集体事务','C. 平均分配劳动产品，共同占有生产资料','D. 金属工具广泛使用，出现社会分工'],answer:'A',
   explanation:'B是原始社会的生产关系/社会管理特征，不是生产力状况。C共同占有生产资料、平均分配是生产关系特征，不是生产力状况。D金属工具广泛使用是奴隶社会的生产力特征，不是原始社会（原始社会使用石器）。A正确：原始社会生产力极其低下，使用打制石器（旧石器时代）或磨制石器（新石器时代），劳动技能低下，这是原始社会生产力的典型表现。',knowledge:'时政·二十届四中全会·原始社会'},

  // ── 抗日战争胜利80周年专项（109题）──
  {cat:'history',type:'single',text:'[1] 2025年是中国人民抗日战争暨世界反法西斯战争胜利80周年。九三阅兵，是伟大抗战精神和伟大民族精神在新时代赓续传承的重要体现，是坚持弘扬正确二战史观、坚决维护战后国际秩序、坚定捍卫国际公平正义的郑重宣示。此次阅兵活动说明（ ）①中国始终不渝地走和平发展道路，坚定反法西斯的决心和力量②维护世界和平、促进共同发展是我国外交政策的基本立场③坚定维护我国的主权、安全和发展利益是我国外交政策的基本目标④中国有能力建立公正合理的全新的国际秩序',
   options:['A. ①②','B. ①④','C. ③④','D. ①③'],answer:'D',
   explanation:'②错误：维护世界和平、促进共同发展是我国外交政策的宗旨，而非"基本立场"；基本立场是独立自主。④错误："建立全新的国际秩序"说法有误，我国主张维护和完善以联合国为核心的国际体系，不是推倒重建。①③正确。',knowledge:'时政·抗日战争80周年·外交政策'},
  {cat:'history',type:'single',text:'[2] 2025年九三阅兵时，驾驶运油-20A女机长谭红梅上校被部分网友称为"阅兵最帅女机长"。谭红梅机长驾驶过6种机型，执行过各项重大演训任务，"永葆初心、勇于拼搏"是她的座右铭，她用实际行动诠释大国空军女飞行员的铿锵本色。谭红梅的经历体现了（ ）①遵循社会发展规律，能让价值观与时俱进②人既是价值的创造者，又是价值的享受者③树立正确价值观对实现人生价值的作用④她厚植家国情怀，在曲折中仍奋力向前',
   options:['A. ①③','B. ①④','C. ②③','D. ②④'],answer:'C',
   explanation:'①错误："遵循社会发展规律让价值观与时俱进"表述不当，遵循规律和价值观更新没有直接因果关系。④"在曲折中奋力向前"材料中没有体现曲折。②正确：谭红梅创造价值（飞行员工作）同时享受价值（荣誉）；③正确：正确价值观（永葆初心）对实现人生价值有重要作用。',knowledge:'时政·抗日战争80周年·人生价值'},
  {cat:'history',type:'single',text:'[3] 九三阅兵中，由国有军工企业及科研机构研发生产的一系列新域新质作战力量震撼亮相，极大提振了民族自信自强的志气、骨气和底气。"十四五"期间，每年都有一批"超级工程""大国重器"亮相，国有企业特别是中央企业创新实力不断增强。这表明我国（ ）',
   options:['A. 不断巩固国有企业在基础建设中的主体作用','B. 促进公有制经济和非公有制经济的共同发展','C. 优化资本结构，转变国有经济运营管理机制','D. 聚焦国家战略，发挥国有企业重要支柱作用'],answer:'D',
   explanation:'材料强调的是国有军工企业在国家战略领域（国防科技）发挥的关键支撑作用。A"基础建设"范围不准确。B材料未涉及非公有制经济。C"转变运营管理机制"不是材料重点。D"聚焦国家战略、发挥重要支柱作用"最直接对应国有企业在国防重器领域的作用。',knowledge:'时政·抗日战争80周年·国有企业'},
  {cat:'history',type:'single',text:'[4] 大国重器，护国安邦。2025年9月3日，北京天安门广场举行盛大阅兵仪式。受阅装备均为国产现役主战装备，新域新质力量首次大规模亮相，集中展现了我国国防科技的突破性进展与武器装备的历史性跨越。这一跨越（ ）①印证了中国特色社会主义的强大生机与活力②标志着社会的主要矛盾已经发生根本性转变③表明创新是发展中国特色社会主义的必由之路④为实现中华民族伟大复兴筑牢战略安全屏障',
   options:['A. ①③','B. ①④','C. ②③','D. ②④'],answer:'B',
   explanation:'②错误：社会主要矛盾是"人民日益增长的美好生活需要和不平衡不充分的发展之间的矛盾"，国防科技进步不标志矛盾"根本转变"。③错误：中国特色社会主义的必由之路是坚持党的领导，"创新"不是必由之路的表述。①④正确：国防突破印证了中国特色社会主义的生机活力；为民族复兴筑牢安全屏障。',knowledge:'时政·抗日战争80周年·国防建设'},
  {cat:'history',type:'single',text:'[5] "九三"阅兵式上，众多国有企业为受阅装备提供了关键材料与核心技术支撑，以扎实的创新成果诠释了"大国脊梁"的担当。由此可见（ ）①国有企业是技术创新的重要主体②国有资产在社会总资产中占优势③国有经济在国民经济中占主体地位④国有企业是党执政兴国的重要支柱',
   options:['A. ①③','B. ①④','C. ②③','D. ②④'],answer:'B',
   explanation:'②错误：公有资产在社会总资产中占优势是我国所有制结构的特征，但材料未体现"总资产"对比。③错误：国有经济在国民经济中起主导作用，"主体地位"是公有制经济的表述，国有经济不等于公有制经济全部。①④正确：国有企业提供关键技术体现创新主体作用；"大国脊梁"体现党执政兴国的重要支柱。',knowledge:'时政·抗日战争80周年·国有企业地位'},
  {cat:'history',type:'single',text:'[6] 9月3日，习近平在纪念中国人民抗日战争暨世界反法西斯战争胜利80周年招待会上指出：80年前，中国人民经过14年浴血奋战，彻底打败日本军国主义侵略者，宣告世界反法西斯战争的完全胜利。这是中华民族从近代以来陷入深重危机走向伟大复兴的历史转折点，也是世界发展的一个重大转折点。由此可见，抗日战争的胜利（ ）①终结了我国半殖民地半封建社会历史②彰显了中国人民不畏强暴的民族品格③开辟了中华民族伟大复兴的光明前景④宣告了帝国主义侵略势力的彻底灭亡',
   options:['A. ①②','B. ①④','C. ②③','D. ③④'],answer:'C',
   explanation:'①错误：抗日战争的胜利不等于终结半殖民地半封建社会，直到1949年新中国成立才结束。④错误：抗日战争胜利不代表帝国主义侵略势力"彻底灭亡"，这一说法过于绝对。②③正确：14年浴血奋战彰显不畏强暴的民族品格；从危机走向复兴转折点体现开辟光明前景。',knowledge:'时政·抗日战争80周年·抗战意义'},
  {cat:'history',type:'single',text:'[7] 九三阅兵仪式上，《松花江上》《在太行山上》《保卫黄河》《没有共产党就没有新中国》等经典歌曲响起，14亿多中国人心跳同频共振；而新创作的《胜利进行曲》作为压轴曲目，展现祖国大好河山，唱出民族复兴的坚定步伐。对此分析正确的是（ ）①传承传统文化能激发民族自信心与自豪感②价值观承载着一个民族和国家的精神追求③文化具有服务社会和推动发展的强大功能④中华文化自信就是对中华传统文化的自信',
   options:['A. ①③','B. ①④','C. ②③','D. ②④'],answer:'C',
   explanation:'①错误：抗战歌曲属于革命文化，不是"传统文化"。④错误：中华文化自信包括对优秀传统文化、革命文化和社会主义先进文化的自信，不仅仅是传统文化。②③正确：经典歌曲承载民族精神追求；文化凝聚民心、服务社会推动发展。',knowledge:'时政·抗日战争80周年·文化自信'},
  {cat:'history',type:'single',text:'[8] 2025年九三阅兵，既以威武阵容展现我国国防建设的巨大成就，又以"铭记历史、珍爱和平"的主题传递人类共同愿望，引发国内外广泛共鸣。这体现的哲学道理是（ ）①矛盾特殊性离不开普遍性，个性中包含共性②社会意识具有相对独立性，能反作用于社会存在③事物的价值源于其自身属性与主体积极需要的统一④认识具有无限性，追求真理是永无止境的过程',
   options:['A. ①②','B. ①③','C. ②④','D. ③④'],answer:'B',
   explanation:'②与材料不对应，材料谈的是阅兵活动引发共鸣，不是社会意识反作用问题。④认识无限性与材料主旨不符。①正确：阅兵展示了中国特色（特殊性），但"珍爱和平"是全人类共同价值（普遍性），特殊性中包含普遍性；③正确：阅兵价值源于其展示国威、传递和平的客观属性与人们共同需要的统一。',knowledge:'时政·抗日战争80周年·哲学'},
  {cat:'history',type:'single',text:'[9] "以武止戈，砥定乾坤"精准概括了东风-5C的战略价值：以强大的核威慑实力遏制战争风险，最终稳固国家大局、守护和平。这完全契合中国国防政策的防御性取向。由此，我们可以得到的启发是（ ）①一个国家、一个民族，唯有能战，方能止战②国际社会的现实就是，一切"从实力地位出发"③国家之间，是战是和，说到底取决于国家实力对比④中国持续推进国防现代化，绝不是为了威胁任何国家',
   options:['A. ①③','B. ①④','C. ②③','D. ②④'],answer:'B',
   explanation:'②错误："一切从实力地位出发"是霸权主义逻辑，中国反对这一做法。③错误："取决于国家实力对比"说法片面，战与和还受国际关系、外交努力等多重因素影响。①④正确：以武止戈体现唯有能战方能止战；防御性国防政策体现推进国防现代化不是为了威胁他国。',knowledge:'时政·抗日战争80周年·国防政策'},
  {cat:'history',type:'single',text:'[10] "以武止戈"一词，源自《左传》中楚庄王提出的"止戈为武"，核心内涵是把武力或武力威慑当作保障，最终实现制止战争、维护和平的目的。这说明（ ）①汉字的构成逻辑，本质上体现着和平文化②中华民族热爱和平的历史传统，源远流长③和平与战争一体两面，在现实中对应存在④古代中国人，已经拥有成熟的武力价值观',
   options:['A. ①③','B. ①④','C. ②③','D. ②④'],answer:'B',
   explanation:'③"和平与战争一体两面"说法不当，两者是对立关系，不能说是"一体两面"。④"拥有成熟的武力价值观"表述不准确，且论断过于绝对。①"止戈为武"体现汉字蕴含和平文化逻辑；②"以武止戈"从古代流传至今，体现中华民族热爱和平的历史传统源远流长。',knowledge:'时政·抗日战争80周年·中华文化'},
  {cat:'history',type:'single',text:'[11] 纵观历史和现实，和平本身都不是终极目的，它是服务于发展的保障条件，同时也需要发展为其创造有利条件，发展带来的共同利益更是维系和平的坚实基础。下列处理国际关系的选项中，与此最相符的是（ ）',
   options:['A. 恪守和平共处五项原则，求同存异、相互尊重','B. 珍惜国际和平环境，谋求在合作中实现共同发展','C. 推动多极化，通过多种力量相互制约维护世界和平','D. 发挥联合国的领导作用，统筹协调世界的和平与发展'],answer:'B',
   explanation:'材料强调和平与发展相互依存、相互促进。A强调和平原则，未体现发展。C多极化制衡不是主旨。D联合国发挥的是协调作用，不是"领导作用"（主权国家不受领导）。B"珍惜和平环境，谋求在合作中共同发展"最直接体现和平与发展相互促进。',knowledge:'时政·抗日战争80周年·和平发展'},
  {cat:'history',type:'single',text:'[12] 2025年9月3日，习近平总书记在纪念大会上指出，取得了近代以来反抗外敌入侵的第一次完全胜利。近代以后，中国人民的历史任务是（ ）①争取民族独立、人民解放②实现国家富强、人民幸福③推翻帝国主义、封建势力④实现民族复兴、国富民强',
   options:['A. ①②','B. ①③','C. ②④','D. ③④'],answer:'A',
   explanation:'近代以后中国人民面临两大历史任务：一是争取民族独立、人民解放；二是实现国家繁荣富强、人民共同富裕。③"推翻帝国主义、封建势力"是实现第一个任务的途径，不是任务本身。④"实现民族复兴、国富民强"是第二个任务，说法不够规范（标准说法是"实现国家繁荣富强、人民共同富裕"）。①②正确对应两大历史任务。',knowledge:'时政·抗日战争80周年·历史任务'},
  {cat:'history',type:'single',text:'[13] 纪念中国人民抗日战争暨世界反法西斯战争胜利80周年阅兵式，抗战精神和中华民族精神的关系是（ ）①抗战精神是民族精神在抗日战争中的具体体现和凝结升华②抗战精神是增强团结的精神纽带、自强不息的精神动力③爱国主义是我国民族精神的核心，是中华民族的民族魂④伟大的民族精神是伟大的抗战精神的强大依托和深厚底蕴',
   options:['A. ①④','B. ②④','C. ①③','D. ②③'],answer:'A',
   explanation:'②错误："自强不息的精神动力"是对中华文化生命力的描述，不是对抗战精神与民族精神关系的表述；且抗战精神不等同于"增强团结的精神纽带"这一笼统表述。③爱国主义是民族精神的核心没错，但与"抗战精神和民族精神的关系"这一核心问题无直接关联。①④正确：抗战精神是民族精神的具体体现（关系的正向）；民族精神是抗战精神的依托和底蕴（关系的逆向）。',knowledge:'时政·抗日战争80周年·民族精神'},
  {cat:'history',type:'single',text:'[14] 伟大抗战精神和伟大民族精神通过阅兵这一形式在新时代赓续传承，持续照亮中华民族前行之路。这表明（ ）①抗战精神是中国共产党的精神之源，是对民族精神的丰富和发展②抗战精神是民族精神在抗日战争时期的集中体现和重要组成部分③抗战精神鼓舞中国人民团结奋斗，为民族复兴提供强大精神动力④民族精神是一个国家民族发展中更基本、更深沉、更持久的力量',
   options:['A. ①②','B. ①④','C. ②③','D. ③④'],answer:'C',
   explanation:'①错误：中国共产党的精神之源是伟大建党精神，不是抗战精神；且抗战精神对民族精神是丰富发展，但"精神之源"说法错误。④错误："更基本、更深沉、更持久的力量"是形容优秀传统文化的，不是民族精神的定语。②③正确：抗战精神是民族精神的具体体现；持续照亮前行之路体现提供精神动力。',knowledge:'时政·抗日战争80周年·抗战精神'},
  {cat:'history',type:'single',text:'[15] 在2025年9月3日大阅兵中，"东风-5C"液体洲际战略核导弹亮相天安门。下表东风导弹的发展历程（1984年东风-5→1999年东风-31→2009年东风-31A→2019年东风-41→2025年东风-5C）体现了（ ）①辩证的否定是联系的环节和发展的环节②发展的实质是事物的前进和上升③量变是质变的必然结果④矛盾是事物发展的源泉和动力',
   options:['A. ①②','B. ①③','C. ②④','D. ③④'],answer:'C',
   explanation:'①"辩证的否定"强调的是事物自身否定，导弹发展是继承和超越（辩证否定），但材料着重表现的是发展和矛盾推动，①不是最直接体现。③错误：量变积累到一定程度才引起质变，"量变是质变的必然结果"因果关系颠倒，应是"量变引起质变"。②发展的实质是新事物产生和旧事物灭亡，导弹持续升级体现前进和上升；④导弹研发克服技术矛盾体现矛盾是发展的源泉。',knowledge:'时政·抗日战争80周年·发展哲学'},
  {cat:'history',type:'single',text:'[16] 2025年9月3日大阅兵现场，80面闪耀着英雄荣光的战旗，接受党和人民检阅。它们既承载着对革命先烈和英雄的缅怀，又激励人民在新时代勇担使命，建立新功。这表明（ ）①世界统一性在于物质性，战旗是物质载体和精神内涵的统一②矛盾具有特殊性，每一面战旗都蕴含着其特定的历史意义③量变引起质变，战旗方队展现了人民军队从弱到强的飞跃④意识决定物质，战旗的物质形态无关紧要，只要主观认可其精神，就能发挥作用',
   options:['A. ①②','B. ①④','C. ②③','D. ③④'],answer:'A',
   explanation:'③错误：从弱到强的飞跃是质变，是量变积累的结果，但材料中战旗展示本身不是"量变引起质变"的体现，而是矛盾特殊性的体现。④错误："意识决定物质"是唯心主义，错误命题。①②正确：战旗既有物质形态又有精神内涵，体现物质统一性；每面战旗代表不同英雄部队，体现矛盾特殊性。',knowledge:'时政·抗日战争80周年·哲学'},
  {cat:'history',type:'single',text:'[17] 大国重器，砥定乾坤。2025年九三阅兵，所有受阅装备都是国产现役主战装备，其中新域新质力量首次大规模集结，展现了我国强大的科技实力和创新能力。这一历史性跨越（ ）①体现新型举国体制在攻克关键核心技术上的巨大优势②意味着我国已从根本上改变了科技整体落后的面貌③得益于改革创新这一党的全部理论和实践的主题④彰显了中国人民捍卫国家主权、安全和发展利益的决心',
   options:['A. ①③','B. ①④','C. ②③','D. ②④'],answer:'B',
   explanation:'②错误："已从根本上改变科技整体落后"说法过于绝对，我国科技整体上仍有差距，个别领域突破不等于整体。③错误：党的全部理论和实践的主题是坚持和发展中国特色社会主义，"改革创新"不是"主题"。①④正确：新型举国体制是攻克核心技术的体制优势；展示国防实力体现捍卫国家利益的决心。',knowledge:'时政·抗日战争80周年·科技创新'},
  {cat:'history',type:'single',text:'[18] 2025年9月3日，纪念中国人民抗日战争暨世界反法西斯战争胜利80周年大会在北京天安门广场隆重举行。抗战胜利（ ）①从根本上改变了中国社会的发展方向②为实现民族独立和人民解放奠定了重要基础③是近代以来反抗外敌入侵取得的第一次完全胜利④为实现国家富强、民族复兴展示了美好前景和现实道路',
   options:['A. ①②','B. ①④','C. ②③','D. ③④'],answer:'C',
   explanation:'①错误：从根本上改变中国社会发展方向的是新中国成立，抗战胜利是历史转折点，但不是"根本改变"。④错误："展示了现实道路"不准确，展示美好前景和现实道路的是新中国成立和改革开放。②③正确：抗战胜利为实现民族独立解放奠定基础；是近代以来反外敌入侵第一次完全胜利（习近平原话）。',knowledge:'时政·抗日战争80周年·抗战历史意义'},
  {cat:'history',type:'single',text:'[19] 回溯历史，抗战胜利后，历史最终选择了走社会主义道路。这是因为（ ）①社会主义道路符合社会发展规律，能实现民族永续发展②只有社会主义才能彻底反帝反封建，实现中国历史任务③新民主主义革命胜利为走社会主义道路奠定了现实基础④社会主义制度的确立让中国逐渐成为世界经济发达国家',
   options:['A. ①②','B. ①③','C. ②④','D. ③④'],answer:'B',
   explanation:'②错误：彻底反帝反封建是新民主主义革命的任务，社会主义革命的任务是消灭资本主义私有制，不是"反帝反封建"。④错误：中国不是"世界经济发达国家"，仍是发展中国家。①③正确：社会主义符合历史规律；新民主主义革命胜利（新中国成立）为社会主义道路奠定基础。',knowledge:'时政·抗日战争80周年·历史发展'},
  {cat:'history',type:'single',text:'[20] 在阅兵式上，国产现役主战装备悉数亮相，彰显了中国特色社会主义道路的正确性。由此可见（ ）①改革开放是决定实现"两个一百年"奋斗目标的关键一招②中华民族实现了从站起来、富起来到强起来的伟大飞跃③中国特色社会主义理论体系是指导民族复兴的科学理论④中国特色社会主义道路是实现社会主义现代化的必由之路',
   options:['A. ①②','B. ①④','C. ②③','D. ③④'],answer:'D',
   explanation:'①"两个一百年"中第一个已经实现，且"决定实现"说法不妥，应是"关键一招"，但材料未体现改革开放。②"实现了"过于绝对，伟大飞跃正在进行中，尚未完全实现"强起来"的目标。③④正确：装备现代化彰显了理论体系的科学性；中国特色社会主义道路是现代化的必由之路。',knowledge:'时政·抗日战争80周年·中国特色社会主义'},
  {cat:'history',type:'single',text:'[21] 抗战胜利是中华民族由衰败走向复兴的重要转折点。下列对抗战胜利的历史价值诠释正确的是（ ）①改变中国面貌，扭转中国社会的发展方向②凝聚磅礴伟力，开辟民族复兴的光明前景③培育抗战精神，为民族复兴提供根本力量④回应时代之需，锻造民族复兴的领导力量',
   options:['A. ①②','B. ①③','C. ②④','D. ③④'],answer:'C',
   explanation:'①错误：彻底改变中国面貌、扭转社会发展方向的是新中国成立，抗战胜利是"历史转折点"而非"根本改变"。③错误：为民族复兴提供"根本力量"的是中国共产党的领导，抗战精神是精神动力而非"根本力量"。②④正确：抗战胜利凝聚伟力，开辟光明前景；中共领导抗战锻造了民族复兴的领导力量。',knowledge:'时政·抗日战争80周年·抗战价值'},
  {cat:'history',type:'single',text:'[22] 在纪念抗战胜利80周年阅兵中，"铁流滚滚"的武装力量展示与"8万羽和平鸽"放飞环节相继呈现，传递出"和平既需以实力捍卫，亦需谦卑维系"的无声宣言。该仪式设计体现的思维智慧是（ ）①运用超前思维展现了对未来愿景的前瞻性思考②运用逆向思维打破"武力即威胁"的固有认知③运用聚合思维揭示"以实力护和平"的深层逻辑④运用矛盾分析法把握"实力与谦卑"的对立关系',
   options:['A. ①②','B. ①④','C. ②③','D. ③④'],answer:'C',
   explanation:'①超前思维体现对未来的前瞻，仪式设计中放飞和平鸽有此意味，但更核心的是②逆向思维。④矛盾分析法把握对立统一，但材料更强调逆向思维突破固有认知和聚合思维揭示逻辑。②正确：用武力展示来表达和平意愿，打破了"武力即威胁"的固有认知，体现逆向思维。③正确：把实力、谦卑、和平三者综合分析，揭示深层逻辑，体现聚合思维。',knowledge:'时政·抗日战争80周年·思维方式'},
  {cat:'history',type:'single',text:'[23] 2025年9月3日，为纪念中国人民抗日战争暨世界反法西斯战争胜利周年，我国举行了盛大的阅兵仪式，展示了国威军威，传递了和平信念。（ ）',
   options:['A. 70周年','B. 75周年','C. 80周年','D. 85周年'],answer:'C',
   explanation:'1945年抗日战争胜利，2025年为80周年。1945+80=2025，选C。',knowledge:'时政·抗日战争80周年·基本知识'},
  {cat:'history',type:'single',text:'[24] 国资央企科技创新实现新突破，嫦娥六号、梦想号、"奋斗者"号、深地一号等一批"大国重器"捷报频传，C919大型客机、国产大型邮轮持续擦亮"中国制造"名片，九三阅兵中系列新域新质国防装备震撼亮相……这些成就的取得主要得益于我国（ ）①鼓励、支持、引导非公有制经济发展②保证国有资产在社会总资产中占有优势③坚持毫不动摇巩固和发展公有制经济④国有企业在高端科技领域发挥主导作用',
   options:['A. ①②','B. ①④','C. ②③','D. ③④'],answer:'D',
   explanation:'材料强调的都是国资央企（国有企业）的成就，与非公有制经济①无关。②"国有资产在总资产中占优势"是所有制结构的描述，不是这些成就的原因。③坚持发展公有制经济是这些成就的制度基础；④国有企业在高端科技发挥主导作用是直接原因。',knowledge:'时政·抗日战争80周年·国有经济'},
  {cat:'history',type:'single',text:'[25] 九三阅兵的歌声里，14亿多中国人的心跳同频共振……而新创作的《胜利进行曲》作为最后一首演奏乐曲，唱出了民族复兴的势不可挡。据此，下列分析正确的是（ ）①人民对美好生活的向往是推动社会历史发展的根本动力②中国共产党深刻改变了中国人民和中华民族的前途命运③实现中华民族伟大复兴是党成立以来就确立的最高理想④音乐承载的民族精神深刻影响了中华民族发展进程',
   options:['A. ①③','B. ①④','C. ②③','D. ②④'],answer:'D',
   explanation:'①错误：社会历史发展的根本动力是社会基本矛盾运动（生产力和生产关系、经济基础和上层建筑的矛盾），不是人民的向往。③错误：中国共产党成立的最高理想是实现共产主义，而非民族复兴（民族复兴是党在新民主主义革命阶段的使命）。②正确：党领导抗战和各项事业，深刻改变了民族命运；④正确：抗战歌曲承载民族精神，影响民族发展进程。',knowledge:'时政·抗日战争80周年·党的历史'},
  {cat:'history',type:'single',text:'[26] 此次"九三"阅兵，应中国国家主席习近平邀请，26位外国国家元首和政府首脑将出席纪念活动，很多都是中国"一带一路"上的伙伴。这说明（ ）①中国是历史底蕴深厚、各民族多元一体、文化多样和谐的文明大国②新时代的中国是更加有亲和力、更加开放、充满活力的社会主义大国③"一带一路"已成为深受欢迎的国际公共产品和国际合作平台④我国历来是政治清明、经济繁荣、社会稳定、人民团结的东方大国',
   options:['A. ①②','B. ①④','C. ②③','D. ③④'],answer:'C',
   explanation:'①材料未涉及文明、民族、文化多样，与26位元首出席的信息无关。④"历来"表述不当，且内容不是材料体现的主旨。②多国元首应邀出席体现中国的亲和力和开放形象；③一带一路伙伴积极参与体现一带一路是受欢迎的国际合作平台。',knowledge:'时政·抗日战争80周年·一带一路'},
  {cat:'history',type:'single',text:'[27] 铭记伟大历史胜利，凝聚正义和平力量。纪念中国人民抗日战争暨世界反法西斯战争胜利周年大会在北京天安门广场隆重举行，以盛大阅兵仪式，同世界人民一道纪念这个伟大的日子。（ ）',
   options:['A. 9月3日70','B. 9月4日80','C. 9月3日80','D. 9月4日70'],answer:'C',
   explanation:'2025年9月3日举行，纪念80周年（1945-2025）。选C：9月3日80。',knowledge:'时政·抗日战争80周年·基本知识'},
  {cat:'history',type:'single',text:'[28] 2025年9月3日我国隆重举行了"纪念中国人民抗日战争暨世界反法西斯战争胜利"80周年阅兵活动。下列说法正确的是（ ）①完成开天辟地的救国大业——为中华民族伟大复兴奠定了根本的制度基础②实现改天换地的兴国大业——为中华民族伟大复兴创造了根本的社会条件③创造翻天覆地的富国大业——实现了中华民族从站起来到富起来的伟大飞跃④开启惊天动地的强国大业——为中华民族伟大复兴提供了更为坚实的物质基础',
   options:['A. ①②','B. ①③','C. ②④','D. ③④'],answer:'C',
   explanation:'①错误：完成开天辟地（党的成立到新中国成立）奠定的是"根本政治前提和制度基础"，说法正确，但"救国大业"对应的是新民主主义革命，而非改革开放，若①对应的是新中国成立前后，则无误，但注意①说"制度基础"是正确的。②"改天换地的兴国大业"对应社会主义革命和建设时期，创造"根本的社会条件"正确。③"翻天覆地的富国大业"对应改革开放，"从站起来到富起来"说法有误，应是"富起来"的飞跃，而"站起来"是新中国成立时实现的。④开启强国大业（新时代），提供坚实物质基础正确。综合判断②④正确，选C。',knowledge:'时政·抗日战争80周年·党的百年历史'},
  {cat:'history',type:'single',text:'[29] 浩荡的九三阅兵虽已落幕，但精神的火炬永不熄灭，每一位党员干部都应当从伟大抗战精神中传承红色基因，在平凡岗位上创造不平凡业绩。这主要说明（ ）①抗战精神适应新时代的需求，是对当今时代的直接映射②需要坚定理想信念，在砥砺自我中创造和实现人生价值③抗战精神是中国共产党人革命精神的总源头和红色基因④只有投身于为人民服务的实践才能更好地实现人生价值',
   options:['A. ①②','B. ①④','C. ③④','D. ②④'],answer:'D',
   explanation:'①错误："是对当今时代的直接映射"说法不当，抗战精神不是当今时代的"直接映射"，而是精神财富的传承。③错误：中国共产党人革命精神的总源头是伟大建党精神，不是抗战精神。②坚定理想信念、砥砺自我创造人生价值；④投身为人民服务实践实现人生价值，均正确。',knowledge:'时政·抗日战争80周年·人生价值'},
  {cat:'history',type:'single',text:'[30] 我国在9·3阅兵式上集中展示的新式装备、体系化作战和无人化智能作战能力等，让全世界看到中国大陆近年来发展起来的强大军事实力。这些巨大的成就（ ）①得益于改革开放以来我国经济社会的发展②彰显了中国特色社会主义制度巨大优越性③标志着中国特色社会主义成功进入新时代④意味着我国社会主要矛盾发生了重大变化',
   options:['A. ①②','B. ①③','C. ②④','D. ③④'],answer:'A',
   explanation:'③错误：中国特色社会主义进入新时代是由党的十九大作出的重要判断，阅兵不能说是"标志"。④错误：社会主要矛盾的变化是党的十九大作出的判断，不是由阅兵决定的，且矛盾已发生变化，不是"意味着"要发生变化。①②正确：改革开放以来经济社会发展为国防现代化奠定基础；彰显中国特色社会主义制度优越性。',knowledge:'时政·抗日战争80周年·制度优越性'},
  {cat:'history',type:'single',text:'[31] 从赵一曼到佟麟阁，从八路军"狼牙山五壮士"到国民党军"八百壮士"；3200多名南洋华侨青年响应号召毅然归国……抗日战争中千千万万爱国将士和全体中华儿女的英勇壮举带来的启示是（ ）①当代青年要勇于担当时代责任，脚踏实地中砥砺奋斗②实现中华民族伟大复兴的伟业离不开科学理论的指导③当代青年要胸怀报国之志，积极投身于强国复兴伟业④国家社会要为个人放飞梦想、享受出彩人生提供保障',
   options:['A. ①③','B. ①④','C. ②③','D. ②④'],answer:'A',
   explanation:'②材料讲的是爱国将士的英勇精神，"科学理论指导"与材料无关。④"国家社会要为个人提供保障"是从国家角度讲，而材料讲的是个人对国家的担当，视角相反。①③正确：英雄故事启示当代青年要担当时代责任，脚踏实地奋斗（①）；胸怀报国之志、投身复兴伟业（③）。',knowledge:'时政·抗日战争80周年·时代担当'},
  {cat:'history',type:'single',text:'[32] 2025年9月3日，中国在天安门广场以一场盛大的阅兵宣告：中华民族伟大复兴势不可挡！纪念抗战胜利80周年的阅兵仪式（ ）①弘扬优秀传统文化，坚守中华文化立场②主动传承革命文化，赓续红色精神血脉③集中展现了中华民族的整体风貌和特征④积极弘扬民族精神，展示民族自信自立',
   options:['A. ①②','B. ①③','C. ②④','D. ③④'],answer:'C',
   explanation:'①错误：阅兵传承的是革命文化（抗战精神），不是"优秀传统文化"。③错误：阅兵展示的是人民军队和国防建设成就，不是"中华民族的整体风貌和特征"（整体风貌是一个民族文化特征的综合，不仅限于军事）。②正确：阅兵传承革命文化，赓续红色精神血脉；④正确：弘扬民族精神，展示自信自立。',knowledge:'时政·抗日战争80周年·文化传承'},
  {cat:'history',type:'single',text:'[33] 某校高中思政学习小组围绕"新中国成立以来阅兵式的发展变迁"收集整理资料形成表格，其中体现的哲学道理正确的是（ ）①主题从震慑敌人到弘扬精神→意识来源于客观存在，与客观存在相符合②参阅部队结构从单一到多兵种合成→量变是质变的必要准备，量变必然引起质变③装备从"万国牌"到"中国造"，从"骡马化"到"机械化"、"信息化"与"智能化"→世界是永恒发展的，新事物必然代替旧事物④作战理念从按军兵种划分到体系作战、联合作战→世界是永恒发展的，新事物必然代替旧事物',
   options:['A. ①②','B. ①④','C. ②③','D. ③④'],answer:'D',
   explanation:'①错误："意识与客观存在相符合"只是对正确意识的要求，不是所有意识都与客观存在相符合；且阅兵主题变化体现的是客观存在（时代发展）决定社会意识，不是"相符合"。②错误："量变必然引起质变"说法错误，量变只有积累到一定程度才能引起质变，不是所有量变都必然引起质变。③④的哲学道理（新事物代替旧事物）与材料内容（装备更新换代、理念升级）正确对应。',knowledge:'时政·抗日战争80周年·哲学表格'},
  {cat:'history',type:'single',text:'[34] 从1949年开国大典时的17架老旧战机到"9·3"阅兵中首次亮相的歼-20隐形战斗机，中国空军实现了从"有没有"到"好不好"的历史性跨越。中国空军装备的变化说明了（ ）①发展是事物自身性质的突破和飞跃②发展的实质是新事物的产生和旧事物的灭亡③事物发展是前进性和曲折性的统一④发展是矛盾双方相互转化的过程',
   options:['A. ①②','B. ①③','C. ②③','D. ③④'],answer:'A',
   explanation:'③材料着重展示进步成就，未体现"曲折性"。④"矛盾双方相互转化"是关于矛盾运动的，不是对空军装备发展的准确描述。①从17架旧战机到歼-20是事物性质的突破和飞跃（质变）；②从无到有、从落后到先进体现发展实质是新事物产生旧事物灭亡。',knowledge:'时政·抗日战争80周年·发展的实质'},
  {cat:'history',type:'single',text:'[35] 九三阅兵，歼击机梯队是受阅新机型最多的梯队，5型战机集中亮相，表明中国空军综合作战能力的不断提升。75年前的开国大典，参与阅兵的飞行编队只有17架飞机，没有一架"中国造"。75年以来，中国空军综合作战能力的不断增强说明（ ）',
   options:['A. 我国社会主要矛盾发生变化，决定了党的基本路线也发生变化','B. 党领导人民勇于实践、不断探索，坚持自立自强、创新发展','C. 中国特色社会主义道路是符合中国国情、具有普世效应的正确道路','D. 我们始终坚持把马克思主义理论作为实现中国社会飞跃的根本动力'],answer:'B',
   explanation:'A错误：社会主要矛盾变化不等于党的基本路线改变，基本路线是党的工作重心，不是随矛盾变化而改变。C错误："具有普世效应"说法不当，中国道路是适合中国国情的，不是"普世"的。D错误：马克思主义理论是科学指导，不是"根本动力"，社会发展的根本动力是社会基本矛盾。B正确：从无到有、从落后到先进，体现党领导人民不断实践探索、自立自强创新发展。',knowledge:'时政·抗日战争80周年·党的领导'},
  {cat:'history',type:'single',text:'[36] 2025年9月3日，纪念中国人民抗日战争暨世界反法西斯战争胜利80周年阅兵，不仅是一场展示国威军威的盛典，更是一次承载着深刻时代价值的国家仪式。它超越了单纯的武力展示，深刻诠释了"铭记历史、珍爱和平、开创未来"的主题，让人民在民族奋斗的史诗中汲取精神力量。这表明（ ）',
   options:['A. 在阅兵展示中筑牢民族精神根基，强化对自身文化的认同与自豪感','B. 民族文化是优秀传统文化的结晶，抗战精神涵养中华民族共同价值观','C. 抗战胜利是新民主主义革命的胜利，为实现民族复兴创造前提条件','D. 阅兵方阵步伐铿锵，集中展示了中华民族的爱国精神和整体风貌'],answer:'A',
   explanation:'B错误："民族文化是优秀传统文化的结晶"说法错误，民族文化包含优秀传统文化、革命文化和社会主义先进文化。C错误：抗战胜利不是"新民主主义革命的胜利"，新中国成立才是新民主主义革命的胜利。D"集中展示中华民族整体风貌"说法不够准确，阅兵展示的是军队力量和民族精神。A正确：阅兵活动通过文化仪式筑牢民族精神根基，强化民族文化认同感。',knowledge:'时政·抗日战争80周年·文化认同'},
  {cat:'history',type:'single',text:'[37] 为了纪念中国人民抗日战争暨世界反法西斯战争胜利80周年，某市计划通过内涵挖掘、优化陈列和数字传播等方式，讲好中国抗战故事。以下具体做法中最能体现矛盾问题精髓的是（ ）',
   options:['A. 分类整理抗战文物，合理规划展馆陈列布局','B. 以抗战精神为统领，深挖抗战遗址中的故事','C. 针对不同参观群体，制作相应讲解应用软件','D. 以数字技术为手段，升级原有体验服务项目'],answer:'C',
   explanation:'矛盾问题的精髓是矛盾的普遍性与特殊性的辩证关系（共性与个性的关系）。A整理文物是系统思维。B以抗战精神为统领体现整体与部分关系。D升级技术手段体现发展观点。C针对不同参观群体（不同特殊性/个性）制作相应软件（把握特殊矛盾特殊处理），体现了矛盾的特殊性即矛盾问题的精髓（具体问题具体分析）。',knowledge:'时政·抗日战争80周年·矛盾精髓'},
  {cat:'history',type:'single',text:'[38] 在2025年九三阅兵中，"东风-5C"液体洲际战略核导弹亮相。东风导弹发展历程体现了（ ）①辩证的否定是联系的环节和发展的环节②发展的实质是事物的前进和上升③发展是在新质基础上开始新的量变的循环过程④矛盾是事物发展的源泉和动力，没有矛盾就没有发展',
   options:['A. ①②','B. ①③','C. ②④','D. ③④'],answer:'A',
   explanation:'③"发展是在新质基础上开始新的量变"是对质变后量变的描述，但将其作为"导弹发展历程体现"不够准确，且"循环过程"表述有争议。④矛盾是事物发展的源泉和动力是正确的，但材料重点展示的是导弹的发展和技术传承升级，最直接体现的是①辩证否定（在继承基础上超越）和②发展实质（前进和上升）。',knowledge:'时政·抗日战争80周年·辩证否定'},
  {cat:'history',type:'single',text:'[39] 英雄是民族的脊梁。在中华民族抵御日本侵略者的历史进程中，涌现出无数可歌可泣的英雄人物。下列关于英雄人物在社会历史中作用的表述正确的是（ ）①英雄人物是历史发展的决定力量，引领社会变革②社会意识具有反作用，英雄精神可直接转化为物质力量③人民群众是历史的创造者，英雄人物需要依靠群众力量④英雄人物的出现是时代发展的产物，受社会存在制约',
   options:['A. ①②','B. ①④','C. ②③','D. ③④'],answer:'D',
   explanation:'①错误：历史发展的决定力量是人民群众，英雄人物在历史中发挥重要作用，但不是"决定力量"。②错误："直接转化为物质力量"说法不当，精神（意识）不能"直接"转化为物质，需要通过实践这一中间环节。③正确：人民群众是历史主体，英雄人物依靠群众；④正确：英雄人物是特定时代背景的产物，受社会历史条件制约。',knowledge:'时政·抗日战争80周年·英雄人物历史作用'},
  {cat:'history',type:'single',text:'[40] 在阅兵仪式上，"刘老庄连"荣誉旗帜上，"庄"字多了一点（是"庄"的异体字）。保留原有的字体和图案，既是对先辈们伟大抗战精神的传承，也激励中华儿女克服困难，积极投身民族复兴的伟大实践中。这说明（ ）①我们要大力发展社会主义先进文化，助力民族复兴②战旗承载、表达和展现着民族文化的内容③传承和弘扬中华优秀传统文化能够激发爱国热情④抗战精神彰显了中华民族精神的基本内涵',
   options:['A. ①②','B. ①③','C. ②④','D. ③④'],answer:'C',
   explanation:'①"大力发展社会主义先进文化"不是材料的直接体现，材料讲的是革命文化的传承（战旗和异体字的保留）。③错误：战旗和抗战精神属于革命文化，不是"优秀传统文化"，两者不能混淆。②战旗承载民族文化内容（革命文化）；④抗战精神体现勇于牺牲、自强不息等民族精神基本内涵。',knowledge:'时政·抗日战争80周年·革命文化'},
  {cat:'history',type:'single',text:'[41] 九三阅兵，歼-20、歼-35A等集体亮相，体现出中国空军综合作战能力的不断提升。76年前的开国大典，参与阅兵的飞行编队只有17架飞机，没有一架"中国造"。76年来，中国空军综合作战能力的不断增强说明（ ）①党领导人民开启了改革开放和社会主义现代化建设新时期②党领导人民勇于实践、不断探索，坚持自立自强、创新发展③我们始终坚持把马克思主义理论作为实现中国社会飞跃的根本动力④中国特色社会主义道路是符合中国国情、得到人民拥护的正确道路',
   options:['A. ①③','B. ①④','C. ②③','D. ②④'],answer:'D',
   explanation:'①"开启了改革开放新时期"是历史阶段的叙述，不是76年来发展的"说明"。③马克思主义理论是科学指导，不是"根本动力"。②党领导人民实践探索、自立自强体现76年创新发展历程；④空军现代化体现中国特色社会主义道路符合国情、得到人民拥护。',knowledge:'时政·抗日战争80周年·中国道路'},
  {cat:'history',type:'single',text:'[42] 2025年"九三阅兵"，创下超34亿人次的收看记录。其传承的抗战精神，触发了超越地域的深厚民族情感。这说明抗战精神（ ）①是维系民族生存与发展的精神纽带②作为革命文化，具有超越时空的价值③具有凝聚中华民族团结的强大功能④作为一种精神力量能转化为物质力量',
   options:['A. ①③','B. ①④','C. ②③','D. ③④'],answer:'A',
   explanation:'②"超越时空的价值"说法有争议，且与材料关联度不如①③直接。④"转化为物质力量"是精神的一般作用，但材料强调的是凝聚团结，不是材料的直接体现。①34亿人次收看体现精神纽带的力量，维系民族凝聚；③超越地域触发民族情感体现凝聚团结的强大功能。',knowledge:'时政·抗日战争80周年·民族凝聚'},
  {cat:'history',type:'single',text:'[43] 2025年9月3日，中国举行纪念抗战胜利80周年阅兵。阅兵中，战旗猎猎"狼牙山五壮士"等英模部队方队接受检阅，直升机汇成"80"字样等。这些场景意义深远，主要体现在（ ）①承载中国革命的精神标识，培育有担当的时代新人②弘扬主旋律传播正能量，拓宽思政教育的实践路径③培育民族精神，挖掘中华优秀传统文化的当代价值④发展先进文化，提高人们道德修养和科学文化修养',
   options:['A. ①②','B. ①③','C. ②④','D. ③④'],answer:'A',
   explanation:'③错误：战旗英模和抗战精神属于革命文化，不是"优秀传统文化"。④"提高科学文化修养"不是阅兵的主要目的，阅兵侧重精神传承和爱国教育。①革命精神标识（战旗英模）培育有担当时代新人；②弘扬主旋律、拓宽思政教育路径，是阅兵深远意义的体现。',knowledge:'时政·抗日战争80周年·文化功能'},
  {cat:'history',type:'single',text:'[44] 纪念中国人民抗日战争暨世界反法西斯战争胜利80周年阅兵活动严格按两个步骤推进：阅兵式和分列式。阅兵过程中，上万名官兵、上百架飞机、数百台地面装备需实现"米秒不差"的精准协同。对此，下列说法正确的是（ ）①阅兵式和分列式两个步骤都服务于整个阅兵活动②表现最好的方队最能体现整个阅兵活动的水平③每个方队的组合变化能引起整个阅兵活动效果的优化④只有每一位官兵士气高昂才能展示人民军队的威严',
   options:['A. ①③','B. ①④','C. ②③','D. ②④'],answer:'A',
   explanation:'②错误：整体不是最优部分的简单相加，部分的好坏不等于整体水平，要从整体协同来看。④错误："只有…才能"说法过于绝对，人民军队的威严是多方面共同展示的，不只是士气。①阅兵式和分列式都是阅兵活动的组成部分（部分服务于整体），正确；③每个方队的组合变化（部分的变化）影响整体效果，体现部分对整体的影响。',knowledge:'时政·抗日战争80周年·整体与部分'},
  {cat:'history',type:'single',text:'[45] 阅兵式上，徒步方队如机械般精准的步伐背后，是日均2万步的训练强度……这种"用脚步丈量忠诚"的信念，最终化为天安门前66秒的绝对精准。如果用下面成语描述参阅官兵的训练过程，其中最符合的是（ ）①锲而不舍，金石可镂②二人同心，其利断金③水滴石穿，绳锯木断④海纳百川，有容乃大',
   options:['A. ①②','B. ①③','C. ②④','D. ③④'],answer:'B',
   explanation:'②"二人同心其利断金"强调合作，不是个人坚持训练的写照。④"海纳百川有容乃大"强调包容，与训练无关。①"锲而不舍金石可镂"体现坚持不懈、日积月累终成精准（量变到质变，坚持奋斗）；③"水滴石穿绳锯木断"同样体现持之以恒、积累坚持。两者都描述了官兵日复一日坚持训练直到达到精准标准的过程。',knowledge:'时政·抗日战争80周年·量变质变'},
  {cat:'history',type:'single',text:'[46] 14年的浴血奋战，中国人民在抗日战争的壮阔进程中孕育出的伟大抗战精神，永远是激励中国人民克服一切艰难险阻的强大精神动力。伟大抗战精神（ ）①具有超越于特定时期社会存在的永恒价值②反映了中国人民在抗日战争中的精神面貌③作为先进社会意识，对社会发展有促进作用④是中国人民取得抗战胜利的巨大物质力量',
   options:['A. ①③','B. ①④','C. ②③','D. ②④'],answer:'C',
   explanation:'①错误：任何意识都不能完全"超越"社会存在，且"永恒价值"说法绝对，社会意识有其历史局限性。④错误：抗战精神是精神力量，不是"物质力量"（精神可以转化为物质力量，但抗战精神本身是精神）。②抗战精神反映了当时人民的精神面貌（社会存在决定社会意识）；③抗战精神作为先进意识，对社会发展有促进作用。',knowledge:'时政·抗日战争80周年·社会意识'},
  {cat:'history',type:'single',text:'[47] 观看阅兵仪式后，同学们围绕"九三阅兵为何能增强民族自信心"展开讨论。以下观点中，能够体现"四个自信"的是（ ）①90%国产武器装备彰显我国自主研发之路——坚定道路自信②演奏经典抗战歌曲，弘扬了中华民族精神——坚定文化自信③坚持用习近平强军思想指导我国军队建设——坚定制度自信④中国通过阅兵传递了维护世界和平的决心——坚定理论自信',
   options:['A. ①②','B. ①③','C. ②④','D. ③④'],answer:'A',
   explanation:'③错误：用习近平强军思想（理论）指导军队建设，体现的是理论自信，不是制度自信。④错误：维护和平的决心不是"理论自信"的体现，理论自信是对中国特色社会主义理论体系的自信，体现的应是理论指导实践。①国产武器装备体现坚定走中国特色发展道路→道路自信（有争议，也可以理解为理论自信，但道路自信更直接）；②弘扬中华民族精神体现文化自信，正确。',knowledge:'时政·抗日战争80周年·四个自信'},
  {cat:'history',type:'single',text:'[48] 习近平总书记指出，取得近代以来反抗外敌入侵的第一次完全胜利。中国抗日战争的胜利（ ）①是中国近代以来第一次取得完全胜利的反侵略战争②彻底结束了旧中国半殖民地半封建社会的历史③铸就了伟大的抗战精神，凝聚了民族向心力④标志着为实现国家富强、民族复兴展示了美好前景和现实道路',
   options:['A. ①③','B. ①④','C. ②③','D. ③④'],answer:'A',
   explanation:'②错误：彻底结束半殖民地半封建社会历史的是新中国成立，而非抗战胜利。④说法不准确，"展示现实道路"不是抗战胜利的直接意义，更准确的是"开辟了光明前景"。①抗战胜利是近代以来第一次完全胜利的反侵略战争（习近平原话）；③铸就抗战精神，凝聚民族向心力。',knowledge:'时政·抗日战争80周年·抗战历史地位'},
  {cat:'history',type:'single',text:'[49] 天安门广场"钢铁长城"主题景观中，"1945"与"2025"字样承载着特殊意义。对此，下列解读正确的是（ ）①抗战胜利是我国取得近代以来反抗外敌入侵的第一次完全胜利②抗战胜利实现了中国从封建专制政治向人民民主的伟大飞跃③坚持和发展中国特色社会主义离不开党对人民军队的绝对领导④抗战胜利为实现民族伟大复兴奠定了根本政治前提和制度基础',
   options:['A. ①②','B. ①③','C. ②④','D. ③④'],answer:'B',
   explanation:'②错误：从封建专制向人民民主的伟大飞跃，是新中国成立的意义，而非抗战胜利。④错误：奠定"根本政治前提和制度基础"的是新中国成立，抗战胜利是民族复兴的"历史转折点"。①正确；③坚持和发展中国特色社会主义在新时代，党对军队的绝对领导是重要保证，正确。',knowledge:'时政·抗日战争80周年·抗战历史'},
  {cat:'history',type:'single',text:'[50] 装备方队编组多个作战群，国产现役主战装备和战略重器依次亮相，彰显捍卫国家利益、维护世界和平的实力。这充分说明（ ）①人民军队是维护国家主权、安全和发展利益的坚强柱石②国家通过加强国防为社会主义现代化建设提供可靠保障③我国军事装备撑起强国底气在国际军事领域处于主导地位④纪念抗战胜利阅兵旨在展示我国军事力量以震慑周边国家',
   options:['A. ①②','B. ①③','C. ②④','D. ③④'],answer:'A',
   explanation:'③错误："在国际军事领域处于主导地位"说法过于绝对，中国不谋求军事霸权。④错误：阅兵旨在纪念历史、珍爱和平，不是"震慑周边国家"，这与中国和平外交政策相悖。①人民军队的展示体现维护国家主权安全的柱石作用；②加强国防为现代化建设提供安全保障。',knowledge:'时政·抗日战争80周年·国防功能'},
  {cat:'history',type:'single',text:'[51] 九三阅兵让全世界看到中国的综合国力和国际地位。中国综合国力增强（ ）①为维护世界和平、促进共同发展注入更多正能量②使中国维护国家核心利益的底气更足、能力更强③决定我国更坚定地奉行独立自主的和平外交政策④使中国能够坚持以平等互利为前提开展对外交往',
   options:['A. ①②','B. ①③','C. ②④','D. ③④'],answer:'A',
   explanation:'③错误：我国奉行独立自主和平外交政策是由我国国家性质和根本利益决定的，不是由综合国力"决定"的，且"决定"说法过于绝对。④错误：以平等互利开展对外交往是我国一贯立场，不是国力增强后才能坚持的。①正确；②正确。',knowledge:'时政·抗日战争80周年·综合国力外交'},
  {cat:'history',type:'single',text:'[52] 在大阅兵中，东风-41洲际导弹、"福建舰"航母编队等尖端装备的亮相，标志着我国在高端装备制造领域实现了从"跟跑"到"领跑"的跨越。这集中体现了我国（ ）①贯彻创新发展理念，推动经济高质量发展②实施创新驱动发展战略，建设现代化经济体系③通过供给侧改革，满足人民对美好生活的需求④发挥市场在资源配置中的决定性作用',
   options:['A. ①②','B. ①④','C. ②③','D. ③④'],answer:'A',
   explanation:'③错误：高端军事装备的突破主要靠举国体制和国家战略投入，不是"供给侧改革"。④错误：军工领域的突破主要靠国家主导和新型举国体制，不是市场决定配置资源。①创新发展理念在高端制造领域的体现；②创新驱动发展战略在现代化经济体系建设中的作用，均正确。',knowledge:'时政·抗日战争80周年·创新发展'},
  {cat:'history',type:'single',text:'[53] 我们应从历史中汲取前行的智慧和力量，向着中华民族伟大复兴的光辉彼岸不断前进。对此，下列说法正确的是（ ）①抗战胜利推动了中国的革命进程，开辟了中华民族伟大复兴的光明前景②抗战胜利展现中国人民不屈不挠、团结抗战，为实现民族复兴凝聚力量③抗战胜利标志着新民主主义革命的胜利，为实现民族复兴创造前提条件④抗日战争孕育形成了伟大抗战精神，为实现民族复兴提供根本政治保证',
   options:['A. ①②','B. ①③','C. ②④','D. ③④'],answer:'A',
   explanation:'③错误：新民主主义革命的胜利是1949年新中国成立，不是抗战胜利。④错误：为民族复兴提供"根本政治保证"的是中国共产党的领导，不是抗战精神。①正确；②正确：团结抗战为民族复兴凝聚了力量。',knowledge:'时政·抗日战争80周年·抗战意义'},
  {cat:'history',type:'single',text:'[54] 2025年9月3日，中国举行纪念抗战胜利80周年阅兵仪式。已知：所有参阅的武器装备均为国产现役主战装备；东风—21D导弹是参阅的武器装备之一；有些参阅的武器装备是首次公开亮相。根据以上信息，下列结论为真的是（ ）①东风—21D导弹是首次公开亮相②所有国产现役主战装备都是东风—21D导弹③东风—21D导弹与武器装备是种属关系④东风—21D导弹是国产现役主战装备',
   options:['A. ①③','B. ①④','C. ②③','D. ③④'],answer:'D',
   explanation:'①不能确定："有些参阅装备是首次亮相"，但东风-21D不一定在"有些"中，不能得出①。②错误：逻辑倒置，参阅装备是国产，但不是所有国产都是东风-21D。③正确：东风-21D是武器装备的一种（种），与武器装备（属）是种属关系；④正确：东风-21D是参阅装备，参阅装备均为国产现役主战装备，所以东风-21D是国产现役主战装备（三段论）。',knowledge:'时政·抗日战争80周年·逻辑推理'},
  {cat:'history',type:'single',text:'[55] 2025年九三阅兵，歼击机梯队受阅新机型最多。1949年开国大典，仅有17架拼凑的飞机参与阅兵。70多年来，人民空军从"飞机不够就飞两遍"逐步发展为"空天一体、攻防兼备"，这充分证明（ ）①中华民族迎来了从站起来、富起来到强起来的伟大飞跃②中国共产党的领导是人民空军实现从落后到赶超的根本保证③新民主主义革命的胜利直接推动了我国航空工业从无到有的发展④社会主义市场经济体制是我国国防科技事业发展的根本制度支撑',
   options:['A. ①②','B. ①④','C. ②③','D. ③④'],answer:'A',
   explanation:'③错误："直接推动"说法过于绝对，且新民主主义革命胜利（1949年）到航空工业发展是系统性过程，不是"直接"推动。④错误：国防科技发展的制度支撑是中国特色社会主义制度（特别是新型举国体制），而非"市场经济体制"。①正确；②正确：党的领导是人民空军建设的根本保证。',knowledge:'时政·抗日战争80周年·党的领导'},
  {cat:'history',type:'single',text:'[56] 今年9月3日我国隆重举行纪念抗战80周年盛大阅兵，彰显"铭记历史、缅怀先烈、珍爱和平、开创未来"的主题。历史和现实启示我们（ ）①不公平、不合理的国际规则是引发战争冲突的根本原因②发展是和平的前提，只有推动世界经济发展才能根除分裂与对抗③要团结一切爱好和平的国家和人民，共建人类命运共同体④国际冲突越是加剧，越要维护以联合国为核心的国际体系',
   options:['A. ①②','B. ①④','C. ②③','D. ③④'],answer:'D',
   explanation:'①错误：引发战争冲突的根本原因是帝国主义和霸权主义，以及国家间利益矛盾，不是"不公平国际规则"。②错误："只有经济发展才能根除"说法绝对，战争与和平问题复杂，单靠经济发展不能"根除"。③正确：团结爱好和平力量共建命运共同体；④正确：在国际冲突加剧时更要维护以联合国为核心的国际体系。',knowledge:'时政·抗日战争80周年·国际关系'},
  {cat:'history',type:'single',text:'[57] 习近平强调，取得近代以来反抗外敌入侵的第一次完全胜利。据此，下列说法正确的是（ ）①中国共产党是中国人民的主心骨，在抗战中发挥了中流砥柱的作用②抗战胜利是中华民族从近代以来陷入深重危机走向伟大复兴的历史转折点③抗战胜利标志着中国人民推翻了三座大山，人民翻身做主人④抗战胜利标志新民主主义革命胜利，为新中国成立奠定基础',
   options:['A. ①②','B. ①④','C. ②③','D. ③④'],answer:'A',
   explanation:'③错误：推翻三座大山（帝国主义、封建主义、官僚资本主义）、人民翻身做主人是1949年新中国成立的意义，不是抗战胜利。④错误：新民主主义革命胜利是1949年，抗战胜利（1945年）不是新民主主义革命的完全胜利。①正确；②正确（习近平原话）。',knowledge:'时政·抗日战争80周年·抗战地位'},
  {cat:'history',type:'single',text:'[58] 回溯历史，从1984年东风-5首秀，到2025年东风-5C，东风导弹家族不断发展。其发展过程体现了（ ）①辩证的否定是联系的环节和发展的环节②新出现的事物具有强大的生命力③发展的实质是事物的前进和上升④事物的发展是前进性和曲折性的统一',
   options:['A. ①②','B. ①③','C. ②④','D. ③④'],answer:'B',
   explanation:'②错误："新出现的事物"具有强大生命力是新事物战胜旧事物的依据，但材料展示的是导弹升级迭代，不是全新事物出现。④错误：材料展示的是导弹持续进步的历程，没有体现"曲折性"。①辩证否定：每一代导弹在继承前代基础上超越（联系的环节和发展的环节）；③每代升级体现发展的实质（前进和上升）。',knowledge:'时政·抗日战争80周年·辩证否定发展'},
  {cat:'history',type:'single',text:'[59] 此次"九三"阅兵，彰显中国坚决捍卫二战胜利成果和国际公平正义、积极推动构建人类命运共同体的责任担当。习近平在不同时段关于构建人类命运共同体做出了很多表述，下列关于其地位的表述错误的有（ ）①顺应了世界大同、四海一家的时代潮流，是时代的鲜明旗帜②是习近平外交思想的核心理念③是着眼于人类发展和世界前途的中国理念、中国方案④是解决和平与发展问题的关键',
   options:['A. ①③','B. ①④','C. ②③','D. ②④'],answer:'B',
   explanation:'①"世界大同、四海一家"表述不当，人类命运共同体不等于"世界大同"（共产主义目标），表述混淆，且"时代的鲜明旗帜"说法有待商榷。④错误："解决和平与发展问题的关键"不是人类命运共同体的准确定位，人类命运共同体是指导方向和理念，不是"关键"解决方案。②③是正确表述，不在错误答案中。①④表述有误，选B（①④错误）。',knowledge:'时政·抗日战争80周年·人类命运共同体'},
  {cat:'history',type:'single',text:'[60] 我国首次公开展示高超音速武器集群与太空防御系统，并首次运用人工智能协同指挥技术。这一系列展示标志着我国在尖端军事科技领域取得重大突破。阅兵式上展示的科技成就（ ）',
   options:['A. 表明我国正在加快推进国家治理体系和治理能力现代化','B. 意味着已建成听党指挥、能打胜仗、作风优良的人民军队','C. 是贯彻落实新时代党的强军思想的重要成果','D. 说明当前我国社会主要矛盾已发生根本性转变'],answer:'C',
   explanation:'A"国家治理体系和治理能力现代化"是全面深化改革的总目标，与军事科技成就关联不直接。B"已建成"说法绝对，建成强军是奋斗目标，还在推进中。D社会主要矛盾已在党的十九大确立，不是由阅兵说明的。C正确：高科技军事装备的突破是贯彻落实习近平新时代强军思想的重要成果。',knowledge:'时政·抗日战争80周年·强军思想'},
  {cat:'history',type:'single',text:'[61] 2025年是中国人民抗日战争胜利80周年。伟大抗战精神，是中华民族精神在近代民族危亡之际的生动体现，也为新时代国人注入力量。可见，中华民族精神（ ）①随着时代的发展而不断丰富②是在抗日战争时期得以形成③为抵御外侮提供了物质基础④是中华民族永远的精神火炬',
   options:['A. ①③','B. ①④','C. ②③','D. ②④'],answer:'B',
   explanation:'②错误：中华民族精神形成于悠久历史实践，不是"在抗日战争时期得以形成"，抗战精神是民族精神的丰富发展。③错误：中华民族精神提供的是精神力量，不是"物质基础"。①正确：抗战精神的产生是民族精神不断丰富的体现；④正确：民族精神是永远的精神火炬（"为新时代注入力量"）。',knowledge:'时政·抗日战争80周年·民族精神形成'},
  {cat:'history',type:'single',text:'[62] 80年后，伟大抗战精神依然如炬，穿越时空，照亮我们前行的每一步。可见，伟大抗战精神（ ）①诞生于中国革命和社会主义建设的伟大实践中②可以为中华民族的伟大复兴提供强大精神动力③集中彰显了以爱国主义为核心的中华民族精神④是中国共产党的精神之源和弥足珍贵的精神财富',
   options:['A. ①③','B. ①④','C. ②③','D. ②④'],answer:'C',
   explanation:'①错误：抗战精神诞生于抗日战争的伟大实践，不是"社会主义建设"的实践。④错误：中国共产党的精神之源是伟大建党精神，不是抗战精神。②"照亮前行之路"体现为民族复兴提供精神动力；③爱国主义是民族精神核心，抗战精神集中彰显了这一核心。',knowledge:'时政·抗日战争80周年·抗战精神内涵'},
  {cat:'history',type:'single',text:'[63] 习近平总书记来到山西阳泉百团大战纪念馆参观，强调要讲好抗战故事，把伟大抗战精神一代代传下去。这是因为伟大抗战精神（ ）①是激励中华儿女接续团结奋斗的强大精神动力②集中体现了中华民族的整体风貌和精神特征③积淀着中华民族最深层的精神追求和价值追求④是承载中国革命文化、红色文化的重要载体',
   options:['A. ①②','B. ①③','C. ②④','D. ③④'],answer:'B',
   explanation:'②"集中体现中华民族整体风貌和精神特征"是对中华文化整体的描述，不是单独对抗战精神的表述，且"集中"说法过于绝对。④抗战精神是红色文化的组成部分，不是"载体"，说法不准确。①正确；③"积淀中华民族最深层精神追求"正确（中华民族的爱国精神深根于历史）。',knowledge:'时政·抗日战争80周年·传承原因'},
  {cat:'history',type:'single',text:'[64] 某国右翼领导人公然否认二战历史及反法西斯同盟胜利成果，干涉中国内政，中国政府和军方对其进行了批驳谴责和严正警告。从唯物论角度来看，你认为正确的是（ ）①意识是人脑对客观存在的能动性反映②意识是人脑对客观存在的正确反映③物质决定意识，要求我们实事求是，一切从实际出发④物质与意识互相决定，我们要重视意识作用',
   options:['A. ①③','B. ①④','C. ②③','D. ②④'],answer:'A',
   explanation:'②错误：意识是人脑对客观存在的反映，但不一定是"正确"反映，错误意识也是意识（右翼分子的谬论也是一种意识反映）。④错误："物质与意识互相决定"是二元论，错误，应是物质决定意识，意识反作用于物质。①正确：意识是人脑对客观存在的能动反映（包括正确的和错误的反映）；③正确：物质决定意识，要从实际出发（尊重历史事实）。',knowledge:'时政·抗日战争80周年·唯物论'},
  {cat:'history',type:'single',text:'[65] 在抗日战争的壮阔进程中，中国人民孕育出伟大的抗战精神。我们铭记抗战先烈，传承伟大抗战精神，是因为抗战精神（ ）①彰显了世界各国人民英勇抗战的历程②蕴含天下兴亡、匹夫有责的爱国情怀③充分彰显了中华民族的强大战略定力④是中华民族伟大复兴强大的物质保障',
   options:['A. ①③','B. ①④','C. ②③','D. ②④'],answer:'C',
   explanation:'①错误："世界各国人民英勇抗战"超出范围，抗战精神是中国人民的精神，不是世界各国的。④错误：抗战精神是精神动力，不是"物质保障"。②"天下兴亡、匹夫有责"是抗战精神的重要内涵，蕴含爱国情怀；③中华民族在14年浴血奋战中体现了强大战略定力，均正确。',knowledge:'时政·抗日战争80周年·抗战精神内涵'},
  {cat:'history',type:'single',text:'[66] 粤港澳大湾区开展了"2025红色文化轻骑兵：重走抗战之路"的活动，通过研学走访、红色文化展演等形式，弘扬抗战精神，深化粤港澳大湾区红色文化认同。上述活动带来的影响传导正确的是（ ）①城市行走——创新文化传播形式——增强文化的吸引力②线上直播——丰富红色文化内涵——提升文化的感召力③方言诵读——消除区域文化差异——提高文化的亲近感④研学走访——感知抗战文化脉络——增强湾区文化认同',
   options:['A. ①③','B. ①④','C. ②③','D. ②④'],answer:'B',
   explanation:'②错误：线上直播是传播手段，不是"丰富文化内涵"的方式；内涵的丰富要靠深度研究和创新创造。③错误："消除区域文化差异"说法不当，方言诵读是增强亲近感，不是消除差异（区域文化差异客观存在，也不应消除）。①城市行走是创新传播形式，增强吸引力，路径正确；④研学走访感知文化脉络，增强文化认同，路径正确。',knowledge:'时政·抗日战争80周年·文化传播'},
  {cat:'history',type:'single',text:'[67] 《松花江上》《在太行山上》《保卫黄河》……一首首诞生于抗战烽火中的经典歌曲连唱。抗日战争是新民主主义革命的重要阶段，下列关于抗战胜利与新民主主义革命的说法正确的是（ ）',
   options:['A. 抗战胜利标志着中国新民主主义革命的完全胜利','B. 抗日民族统一战线是新民主主义革命胜利的法宝','C. 抗战胜利是近代以来中国反抗外敌入侵的第一次完全胜利','D. 抗战胜利完成了新民主主义革命"建立社会主义社会"任务'],answer:'C',
   explanation:'A错误：新民主主义革命的完全胜利是1949年新中国成立，不是1945年抗战胜利。B错误：新民主主义革命胜利的"三大法宝"是武装斗争、统一战线和党的建设，不是单独的"抗日民族统一战线"。D错误：新民主主义革命任务是推翻三座大山，建立新民主主义国家，不是"建立社会主义社会"（社会主义改造是1956年完成的）。C正确：抗战胜利是近代以来第一次完全胜利（习近平原话）。',knowledge:'时政·抗日战争80周年·新民主主义革命'},
  {cat:'history',type:'single',text:'[68] 南京大屠杀期间，侵华日军通过伪造照片、销毁证据等手段，试图掩盖暴行真相。电影《南京照相馆》基于真实历史事件改编，展现了"这场暴行不仅是热战，更是舆论战、文化战"的全貌。对此解读正确的有（ ）①国际社会对南京大屠杀有不同认识，说明意识领域不存在真理的统一性②国际社会最终认清日军的暴行真相，说明历史事实不以人的意志为转移③日军伪造照片、销毁证据试图掩盖暴行真相，说明意识活动具有目的性④电影故事属于艺术虚构，说明意识能够直接创造出人们需要的客观事物',
   options:['A. ①③','B. ①④','C. ②③','D. ②④'],answer:'C',
   explanation:'①错误：真理是客观的，存在统一性，不同认识不代表真理不存在统一性。④错误：意识不能"直接创造"客观事物，意识通过指导实践改造世界，意识不能直接变为物质。②正确：历史真相不以人的意志为转移（不管日军如何掩盖，历史事实客观存在）；③正确：日军销毁证据体现意识活动具有目的性和主动性。',knowledge:'时政·抗日战争80周年·唯物论意识'},
  {cat:'history',type:'single',text:'[69] 纪念中国人民抗日战争暨世界反法西斯战争胜利80周年文艺晚会《正义必胜》，重现了中国共产党领导全民族抗战、取得胜利的伟大历程。举办这台晚会意在（ ）①引导观众深刻感悟只有社会主义才能救中国②体现中国共产党致力于构建人类命运共同体③彰显中国共产党在抗战胜利中的中流砥柱作用④坚定全面推进强国建设和民族复兴伟业的信心',
   options:['A. ①②','B. ①④','C. ②③','D. ③④'],answer:'D',
   explanation:'①错误："只有社会主义才能救中国"是近代历史发展的结论，抗战时期中国还处于新民主主义革命阶段，不是"社会主义救中国"，晚会的目的不是"感悟社会主义"。②"致力于构建人类命运共同体"是晚会举办目的过于宽泛，且抗战主题晚会不直接体现命运共同体理念。③彰显党的中流砥柱作用；④坚定民族复兴信心，均是举办晚会的直接目的。',knowledge:'时政·抗日战争80周年·文艺晚会目的'},
  {cat:'history',type:'single',text:'[70] 此次阅兵不仅展示了中国军队的现代化成果，更邀请了众多国家的军队代表参与。习近平主席庄严承诺中国始终是世界和平的建设者、全球发展的贡献者、国际秩序的维护者，并再次强调中国始终坚持走和平发展道路。此举（ ）①彰显了中国作为负责任大国的担当，契合和平与发展的时代主题②通过多边外交实践，展现了世界多极化深入发展的必然趋势③表明中国已通过"结伴而不结盟"的方式同所有国家建立了新型国际关系④旨在通过军事合作与实力展示，确立中国在国际格局中的主导地位',
   options:['A. ①②','B. ①④','C. ②③','D. ③④'],answer:'A',
   explanation:'③错误："同所有国家建立了新型国际关系"说法绝对，"已"字过于肯定，且实际上不是所有国家都有这种关系。④错误：中国不谋求"主导地位"，这与霸权主义逻辑类似，不符合中国和平外交政策。①正确：负责任大国担当契合时代主题；②多国军队代表参与体现多极化趋势。',knowledge:'时政·抗日战争80周年·外交担当'},
  {cat:'history',type:'single',text:'[71] 2025年5月13日，中国人民抗日战争暨世界反法西斯战争胜利80周年纪念活动的标识发布，标识由长城、橄榄枝、光辉围合而成的胜利之门，及数字"80"、时间"1945—2025"构成。标识的创作（ ）①体现了形象思维表达方式的严谨性②是人的思维对感性材料的能动反映③体现了形象思维和抽象思维的辩证统一④运用发散思维，围绕纪念活动轴心进行思维收敛和集中',
   options:['A. ①②','B. ①④','C. ②③','D. ③④'],answer:'C',
   explanation:'①错误："严谨性"是抽象思维的特点，不是形象思维的主要特点，形象思维的特点是具体性。④错误：标识设计是聚合思维（围绕主题将各种意象聚合成一个整体形象），不是"发散思维"。②标识创作是对历史事件、民族情感等感性材料的能动反映；③长城等形象元素体现形象思维，80周年等数字概念体现抽象思维，二者统一。',knowledge:'时政·抗日战争80周年·思维方式'},
  {cat:'history',type:'single',text:'[72] 2025年是中国人民抗日战争胜利80周年，要铭记抗战先烈，不断弘扬和传承伟大抗战精神，因为抗战精神（ ）',
   options:['A. 作为民族文化的核心，源于反映人民利益的正确的价值观','B. 作为先进的社会意识，是实现民族复兴伟业的强大精神动力','C. 作为唯一思想资源，为社会主义核心价值观提供了丰富滋养','D. 寓于中华民族精神之中，丰富了民族精神和时代精神的内涵'],answer:'B',
   explanation:'A错误："民族文化的核心"是中华文化，不是抗战精神；且抗战精神不是"源于正确价值观"，而是源于抗日战争实践。C错误："唯一思想资源"说法绝对，中华民族精神的来源是多元的。D"丰富了民族精神和时代精神"说法有误，抗战精神丰富的是民族精神，不是时代精神（时代精神的核心是改革创新）。B正确：作为先进社会意识，为民族复兴提供强大精神动力。',knowledge:'时政·抗日战争80周年·抗战精神功能'},
  {cat:'history',type:'single',text:'[73] 习近平主席指出："历史警示我们，人类命运休戚与共，各个国家、各个民族只有平等相待、和睦相处、守望相助，才能维护共同安全，消弭战争根源，不让历史悲剧重演！"这一论述体现的核心思想是（ ）',
   options:['A. 要坚定维护国家主权和领土完整','B. 要促进不同文明之间的交流互鉴','C. 中国是世界反法西斯战争胜利的决定性力量','D. 构建人类命运共同体是时代要求的必然选择'],answer:'D',
   explanation:'人类命运休戚与共、平等相待守望相助、维护共同安全——这正是人类命运共同体理念的核心要义。A国家主权不是这段话的核心。B文明交流互鉴不是核心。C中国是决定性力量说法绝对且不符合历史。D"构建人类命运共同体是时代要求"最准确对应材料论述。',knowledge:'时政·抗日战争80周年·命运共同体'},
  {cat:'history',type:'single',text:'[74] 工作人员利用信鸽会辨认方向且遇到障碍物会调头的特点巧妙摆放鸽笼，从而延长鸽子在空中的滞留时间并呈现盘旋效果。这种做法体现了（ ）①坚持从实际出发，创造了延长鸽子滞留时间的条件②发挥主观能动性，使鸽子的飞行具有"人化"特点③把握矛盾斗争性，实现了鸽子盘旋效果的最优目标④坚持发展的观点，变更了摆放场所促成了事物质变',
   options:['A. ①②','B. ①④','C. ②③','D. ③④'],answer:'A',
   explanation:'③错误："把握矛盾斗争性"与材料无关，工作人员是利用信鸽习性（同一性），不是把握矛盾斗争性。④错误："坚持发展观点"与材料不对应，变更摆放场所是利用客观规律，不是"发展"；且"促成质变"说法不当。①从实际出发（利用信鸽遇障碍物调头的习性）；②利用习性使鸽子呈现盘旋，使飞行具有"人化"（按人的意图飞行）特点，体现主观能动性。',knowledge:'时政·抗日战争80周年·尊重规律能动性'},
  {cat:'history',type:'single',text:'[75] 中央广播电视总台推出《烽火战歌》，通过经典抗战歌曲串联历史事件，结合文物展示军民抗争场景，采用8K超高清技术还原烽火岁月。节目一经播出，引发强烈反响。该节目（ ）①薪火相传，铸牢中华民族共同体意识②继往开来，弘扬和发展中华优秀传统文化③励志笃行，为践行社会主义核心价值观提供基本遵循④铸魂育人，为培养担当民族复兴大任的时代新人提供深厚滋养',
   options:['A. ①②','B. ①④','C. ②③','D. ③④'],answer:'B',
   explanation:'②错误：抗战歌曲和军民抗争属于革命文化，不是"中华优秀传统文化"。③错误："为践行社会主义核心价值观提供基本遵循"的是马克思主义和中华民族优秀传统文化，而非这一节目。①传承红色文化铸牢中华民族共同体意识；④铸魂育人为时代新人培养提供滋养，均正确。',knowledge:'时政·抗日战争80周年·革命文化传播'},
  {cat:'history',type:'single',text:'[76] 抗战时期，无数贵州子弟兵出黔抗战；大山深处的军工企业为持久抗战提供后盾，展现了贵州儿女忠勇坚毅的担当。伟大抗战精神的锻造形成，同样凝聚着贵州人民的牺牲与奉献。这启示我们（ ）①不屈的民族精神是在斗争实践中孕育并不断发展的②爱国主义是激励和鼓舞中国人民团结奋斗的精神旗帜③抗战精神已融入贵州传统文化坚韧自强的固有特质之中④爱国主义流淌在中华民族血脉之中，是抗战精神形成的载体',
   options:['A. ①②','B. ①④','C. ②③','D. ③④'],answer:'A',
   explanation:'③"抗战精神融入贵州传统文化"说法不当，抗战精神是革命文化，不是传统文化，也不应说"融入固有特质"。④"爱国主义是抗战精神形成的载体"因果关系倒置，爱国主义是抗战精神的核心内涵，不是"载体"。①贵州人民参与抗战体现民族精神在实践中孕育发展；②爱国主义激励中国人民（含贵州人民）团结奋斗。',knowledge:'时政·抗日战争80周年·民族精神实践'},
  {cat:'history',type:'single',text:'[77] 伟大的抗战精神，这是中国人民弥足珍贵的精神财富，为实现中华民族伟大复兴提供了强大精神动力。这说明伟大的抗战精神（ ）①作为优秀传统文化的结晶，是中华民族精神特定历史时期的集中体现②作为中华民族精神的具体体现，体现了中华民族精神与时俱进的品格③是对爱国主义、社会主义精神的传承和发展，是中国精神的生动诠释④彰显中国人民具有伟大的奋斗精神，是激励民众团结奋斗的精神力量',
   options:['A. ①③','B. ①④','C. ②③','D. ②④'],answer:'D',
   explanation:'①错误：抗战精神是革命文化，不是"优秀传统文化的结晶"，两者是并列关系，不能混淆。③错误：抗战精神体现的是以爱国主义为核心的民族精神，不是"社会主义精神的传承"（抗战时期还未进入社会主义阶段）。②抗战精神是民族精神的具体体现，体现与时俱进；④彰显奋斗精神，激励团结奋斗，均正确。',knowledge:'时政·抗日战争80周年·抗战精神定位'},
  {cat:'history',type:'single',text:'[78] 举行纪念大会并阅兵，推出主题展览、文艺作品，发行纪念币、纪念邮票，各地联动开展群众性纪念活动。这些活动既让人们铭记血泪历史，又被赋予"捍卫和平、复兴中华"的新时代内涵。这表明（ ）①优秀文化增强精神力量，是涵养核心价值观的宝贵资源②文化引领风尚、教育人民，其经济价值高于社会价值③文化与政治交融，纪念活动强化了国家认同与民族凝聚力④文化由经济政治决定，上述活动直接投射当前国际格局',
   options:['A. ①③','B. ①④','C. ②③','D. ②④'],answer:'A',
   explanation:'②错误："经济价值高于社会价值"说法错误，文化建设要把社会效益放在首位。④错误：说纪念活动"直接投射当前国际格局"不准确，文化活动的目的是爱国教育，不是反映国际格局。①正确：纪念活动属于优秀文化，为涵养核心价值观提供资源；③正确：纪念活动体现文化与政治交融，强化国家认同和民族凝聚力。',knowledge:'时政·抗日战争80周年·文化政治关系'},
  {cat:'history',type:'single',text:'[79] 2025年5月，中国国家主席对俄罗斯进行国事访问并出席纪念卫国战争胜利80周年庆典，双方共商战略合作，共庆反法西斯战争胜利，共谱维护国际公平正义新篇。这一外交行动主要体现了我国（ ）①践行全球安全倡议，维护战后国际秩序②致力于结盟共赢，构建新型国际关系③坚持独立自主，增进战略互信与合作④主导全球治理体系，提供中国智慧方案',
   options:['A. ①③','B. ②④','C. ①④','D. ②③'],answer:'A',
   explanation:'②错误：我国不搞结盟，坚持"结伴而不结盟"，"致力于结盟"说法错误。④错误：我国参与全球治理，不是"主导"（强调主导带有霸权色彩）。①践行全球安全倡议，出席纪念活动维护战后国际秩序；③中俄协商体现坚持独立自主、增进战略互信与合作。',knowledge:'时政·抗日战争80周年·中俄外交'},
  {cat:'history',type:'single',text:'[80] 2025年是中国人民抗日战争胜利80周年。全体中华儿女以"天下兴亡、匹夫有责"的爱国情怀、"视死如归"的民族气节，铸就了抗战精神，最终赢得胜利。材料表明（ ）①爱国情怀能够转化为物质力量，决定战争胜负②抗战精神继承并发展了民族精神，是胜利的动力③抗战精神的形成和发展是长期历史积淀的过程④抗战精神是民族精神在特定历史时期的具体体现',
   options:['A. ①②','B. ①③','C. ②④','D. ③④'],answer:'C',
   explanation:'①错误："决定战争胜负"说法绝对，精神力量是重要因素，但不是"决定"因素，战争胜负受多重因素影响。③错误："抗战精神是长期历史积淀"说法不当，抗战精神形成于14年抗战实践，是特定历史时期的产物，不是"长期积淀"（那是中华民族精神的特点）。②抗战精神继承民族精神（爱国主义核心）并在特殊历史时期发展，是胜利动力；④抗战精神是民族精神在特定历史时期的具体体现。',knowledge:'时政·抗日战争80周年·民族精神关系'},
  {cat:'history',type:'single',text:'[81] 中国人民抗日战争纪念馆推出抗战家书主题展览。一封封抗战家书（ ）①弘扬了以爱国主义为核心的中华民族精神，滋养人们的精神世界②作为中华民族整体风貌的集中体现，动员和鼓舞中国人民团结奋斗③所蕴含的抗战精神寓于中华民族精神之中，丰富民族精神的内涵④展现的革命文化，是中国革命的精神标识，激发民族复兴的力量',
   options:['A. ①②','B. ①④','C. ②③','D. ③④'],answer:'B',
   explanation:'②"中华民族整体风貌的集中体现"是对中华文化整体的描述，不是对抗战家书的准确定位，家书是个体的历史文献，不是"整体风貌的集中体现"。③"寓于中华民族精神之中"说法倒置，应是中华民族精神（爱国主义）寓于抗战精神中，且"丰富"表述有争议。①弘扬以爱国主义为核心的民族精神，滋养精神世界；④家书展现的革命文化是中国革命精神标识，激发复兴力量。',knowledge:'时政·抗日战争80周年·革命文化家书'},
  {cat:'history',type:'single',text:'[82] 抗日战争作为马克思主义中国化的伟大实践，是在马克思主义中国化指导下赢得的伟大胜利。之所以说中国人民抗日战争的胜利是马克思主义中国化的胜利，是因为（ ）①科学世界观和方法论对实践具有决定性作用②马克思主义能为我国抗日战争的胜利提供具体方法③马克思主义坚持实践基础上的科学性和革命性的统一④坚持马克思主义基本原理与中国实际相结合',
   options:['A. ①②','B. ①④','C. ②③','D. ③④'],answer:'D',
   explanation:'①错误："决定性作用"过于绝对，科学的世界观和方法论对实践有重要指导作用，但不是"决定性"，客观实际才是决定因素。②错误：马克思主义提供的是世界观和方法论，不是"具体方法"（解决具体问题的方法需要结合实际）。③马克思主义中国化是将马克思主义的科学性革命性与中国实践结合；④坚持基本原理与中国实际结合是马克思主义中国化的精髓，均正确。',knowledge:'时政·抗日战争80周年·马克思主义中国化'},
  {cat:'history',type:'single',text:'[83] 1931—1945年，14年浴血奋战，取得了彪炳中华民族史册和人类和平史册的伟大胜利。抗战胜利（ ）①彻底结束了旧中国半殖民地半封建社会的历史②取得近代以来反抗外敌入侵的第一次完全胜利③显示中国人民的团结伟力，为实现民族复兴凝聚磅礴力量④是新民主主义革命的胜利，为实现民族复兴创造前提条件',
   options:['A. ①③','B. ①④','C. ②③','D. ②④'],answer:'C',
   explanation:'①错误：彻底结束半殖民地半封建社会历史的是1949年新中国成立。④错误：新民主主义革命的完全胜利是1949年新中国成立，不是1945年抗战胜利；且抗战胜利是新民主主义革命的重要阶段，不是其完全胜利。②正确；③显示团结伟力为民族复兴凝聚力量，正确。',knowledge:'时政·抗日战争80周年·抗战意义综合'},
  {cat:'history',type:'single',text:'[84] 卢沟桥上沉默的石狮，台儿庄残破的弹孔墙……历史是最好的教科书，也是最好的清醒剂。从这些抗战文物中，我们能真切地触摸到一个民族如何以血肉之躯筑起新的长城。抗战文物（ ）①承载着抗战精神，是维系中华民族生存与发展的精神根基②作为红色文化遗产，是赓续红色血脉、弘扬民族精神的重要载体③为爱国主义教育提供了生动素材，彰显了历久弥新的育人价值④是中华民族反抗侵略的历史见证，其核心价值在于传承优秀传统文化',
   options:['A. ①③','B. ①④','C. ②③','D. ②④'],answer:'C',
   explanation:'①"精神根基"说法不当，维系民族生存发展的精神根基是中华民族精神，而非抗战文物（物质层面）。④错误：抗战文物是革命文化遗存，不是"优秀传统文化"，两者要区别对待。②抗战文物是红色文化遗产，是赓续红色血脉的载体；③为爱国主义教育提供生动素材，彰显育人价值，均正确。',knowledge:'时政·抗日战争80周年·文物价值'},
  {cat:'history',type:'single',text:'[85] 习近平总书记指出：要坚持正确抗战史观、二战史观，坚定历史自信，"站在历史正确一边"，在以史为鉴中不断开创未来。"站在历史正确一边"要求我们（ ）①坚守人民立场，为人类和平与发展事业而奋斗②正确把握并自觉遵循社会历史发展的客观规律③从历史智慧出发，维护最广大人民群众的利益④价值判断与价值选择的标准要随时代之变而变',
   options:['A. ①②','B. ①④','C. ②③','D. ③④'],answer:'A',
   explanation:'③"从历史智慧出发"不如①"坚守人民立场"更直接体现"历史正确一边"的含义；且"维护最广大人民利益"更多体现群众路线，不是"站在历史正确一边"的直接要求。④错误：价值判断和价值选择的标准不是"随时代之变而变"，而是要坚持人民立场，遵循历史规律，有其客观标准。①②正确：坚守人民立场和遵循历史发展客观规律，是站在历史正确一边的核心要求。',knowledge:'时政·抗日战争80周年·历史正确立场'},
  {cat:'history',type:'single',text:'[86] 我们应从历史中汲取前行的智慧和力量，向着中华民族伟大复兴的光辉彼岸不断前进。下列对抗战胜利的意义认识正确的是（ ）①彻底洗刷了百年国耻，增强了民族自尊心和自信心②标志新民主主义革命胜利，改变了社会的发展方向③促进了民族觉醒和团结，为实现民族复兴凝聚力量④形成伟大的抗战精神，为现代化建设提供政治保证',
   options:['A. ①②','B. ①③','C. ②④','D. ③④'],answer:'B',
   explanation:'②错误：新民主主义革命胜利是新中国成立（1949年），不是抗战胜利（1945年）。④错误：抗战精神是精神动力，不是"政治保证"；政治保证是党的领导。①彻底洗刷百年国耻、增强民族自尊心；③促进民族觉醒团结为复兴凝聚力量，均正确。',knowledge:'时政·抗日战争80周年·抗战意义总结'},
  {cat:'history',type:'single',text:'[87] 习近平总书记在纪念大会上指出："日本对华持续侵略是近代中国最黑暗的一页，这场战争是中华民族从深重危机走向伟大复兴的历史转折点。"这一论述直接说明了（ ）①帝国主义的侵略是近代中国贫困落后的重要根源②抗日战争的胜利大大促进了中国革命的历史进程③中国共产党在抗日战争中发挥了中流砥柱的作用④抗日战争的胜利为实现民族复兴创造了重要条件',
   options:['A. ①③','B. ①④','C. ②③','D. ②④'],answer:'D',
   explanation:'①帝国主义侵略是近代中国贫困落后的"重要根源"，材料中有"最黑暗一页"的表述，说明侵略是重要根源，但①是直接说明，题目问的是"直接说明"，①可以推断，但不够直接。③中流砥柱的作用在材料中未直接体现（材料讲的是侵略和转折，不是党的作用）。②抗战胜利促进革命历史进程；④抗战胜利（历史转折点）为民族复兴创造条件，均为材料"直接说明"。',knowledge:'时政·抗日战争80周年·历史转折点'},
  {cat:'history',type:'single',text:'[88] 习近平总书记指出："站在历史正确一边，在以史为鉴中不断开创未来。""站在历史正确一边"要求我们（ ）①坚守人民立场，为人类和平与发展事业而奋斗②正确把握并自觉遵守社会历史发展的客观规律③从历史智慧出发，维护最广大人民群众的利益④价值判断和价值选择的标准要随时代之变而变',
   options:['A. ①②','B. ①④','C. ②③','D. ③④'],answer:'A',
   explanation:'③"维护最广大人民利益"正确，但不是"站在历史正确一边"的直接要求（是群众路线的要求）。④错误：价值判断和选择的标准不随时代变化而改变，而应以是否符合历史规律、人民利益为标准。①坚守人民立场符合历史正确立场；②正确把握并遵循历史客观规律是站在历史正确一边的核心要求。',knowledge:'时政·抗日战争80周年·历史正确立场2'},
  {cat:'history',type:'single',text:'[89] "抗战文物全国巡展"通过实物展品、历史照片、全息影像等形式再现中国军民浴血奋战的历程；"抗战故事分享会"邀请抗战老兵后代、历史研究者讲述鲜为人知的抗战往事，吸引大量青少年参与。这些活动（ ）①以多元文化载体活化抗战记忆，推动革命文化在当代持续传承弘扬②挖掘抗战历史的时代价值，为中华民族精神增添全新内核与生命力③聚焦青少年群体文化需求，通过创新表达保障青少年基本文化权益④用群众喜闻乐见的传播形式，让红色文化贴近生活并浸润大众心灵',
   options:['A. ①②','B. ①④','C. ②③','D. ③④'],answer:'B',
   explanation:'②"增添全新内核"说法不当，民族精神的内核是爱国主义，不是通过活动"增添"的；弘扬活动是传承而非"增添全新内核"。③"保障青少年基本文化权益"与活动目的不符，活动目的是爱国主义教育和文化传承，不是"保障权益"。①多元载体活化抗战记忆，推动革命文化传承；④群众喜闻乐见形式让红色文化浸润人心，均正确。',knowledge:'时政·抗日战争80周年·文化传承活动'},
  {cat:'history',type:'single',text:'[90] 习近平总书记指出："传承和弘扬伟大抗战精神，踔厉奋发、勇毅前行，为以中国式现代化全面推进强国建设、民族复兴伟业而团结奋斗！"伟大抗战精神（ ）①是中国共产党人精神谱系的源头②铸就了跨时空的精神丰碑和刻度③激励着中国人民为民族复兴而战④成为伟大的中华民族精神的核心',
   options:['A. ①③','B. ①④','C. ②③','D. ②④'],answer:'C',
   explanation:'①错误：中国共产党人精神谱系的源头是伟大建党精神，不是抗战精神。④错误：中华民族精神的核心是爱国主义，不是抗战精神（抗战精神是民族精神在特定历史时期的体现）。②"铸就跨时空精神丰碑"体现了抗战精神跨越时代的价值；③"激励为民族复兴而战"体现了新时代传承抗战精神的意义，均正确。',knowledge:'时政·抗日战争80周年·抗战精神地位'},
  {cat:'history',type:'single',text:'[91] 以毛泽东同志为代表的中国共产党人，在抗日战争中坚持把马克思主义普遍真理与中国具体实际相结合，极大地推进了马克思主义的中国化，指引着抗日战争走向胜利。这表明，抗日战争之所以能取得胜利是因为（ ）①党创立了立足中国国情、顺应时代潮流的马克思主义②马克思主义中国化创造了强大的民族凝聚力和战争伟力③马克思主义中国化为抗日战争提供了具体的方法指导④党在马克思主义中国化的引领下成为抗战的中流砥柱',
   options:['A. ①②','B. ①③','C. ②④','D. ③④'],answer:'C',
   explanation:'①错误："党创立了马克思主义"说法错误，马克思主义是马克思恩格斯创立的，党做的是将其与中国实际相结合。③错误：马克思主义提供的是世界观方法论指导，不是"具体方法"（具体方法要结合实际才能产生）。②马克思主义中国化凝聚民族力量；④在马克思主义中国化引领下党成为中流砥柱，均正确。',knowledge:'时政·抗日战争80周年·马克思主义中国化'},
  {cat:'history',type:'single',text:'[92] 通过沉浸式场景，立体呈现中国人民浴血奋战的壮阔历程，引导观众重温抗战精神。从唯物史观角度看，举办这一纪念活动是基于（ ）①社会意识对社会存在具有能动反作用，弘扬抗战精神能激发民众爱国热情②联系是普遍的，弘扬抗战精神能联结历史助力当下为民族复兴凝聚力量③尊重客观规律与发挥主观能动性相结合，举办纪念活动为当代发展提供精神动力④价值观具有重要导向作用，在传承抗战精神、厚植爱国情怀中凝聚奋进力量',
   options:['A. ①②','B. ①④','C. ②③','D. ③④'],answer:'B',
   explanation:'②"联系是普遍的"是唯物辩证法的内容，不是唯物史观范畴；题目要求从"唯物史观"角度。③"尊重客观规律与主观能动性相结合"是认识论/辩证法内容，也不是唯物史观。①社会意识的能动反作用是唯物史观的内容；④价值观的导向作用是唯物史观的内容（价值观是社会意识的组成部分）。',knowledge:'时政·抗日战争80周年·唯物史观'},
  {cat:'history',type:'single',text:'[93] 习总书记指出，中国人民取得抗日战争伟大胜利。中国人民取得抗日战争伟大胜利的密码是（ ）①只有社会主义才能救中国，才能发展中国②伟大民族精神凝聚全民族抗战的磅礴力量③中国人民彻底推翻了半殖民地半封建社会④中国共产党在抗日战争中发挥中流砥柱作用',
   options:['A. ①②','B. ①③','C. ②④','D. ③④'],answer:'C',
   explanation:'①错误：抗战时期是新民主主义革命阶段，尚未进入社会主义建设，"只有社会主义才能救中国"不是抗战胜利的密码。③错误：半殖民地半封建社会是1949年新中国成立后才彻底结束的，抗战时期尚未彻底推翻。②民族精神凝聚磅礴力量；④党发挥中流砥柱作用，是抗战胜利的关键密码。',knowledge:'时政·抗日战争80周年·抗战密码'},
  {cat:'history',type:'single',text:'[94] 之所以说中国人民抗日战争的胜利是马克思主义中国化的胜利，是因为（ ）①科学世界观和方法论对实践具有决定性作用②坚持马克思主义基本原理与中国实际相结合③马克思主义观点和方法为抗战提供科学指导④与时俱进是马克思主义哲学的核心观点',
   options:['A. ①②','B. ①④','C. ②③','D. ③④'],answer:'C',
   explanation:'①错误："决定性作用"过于绝对，科学世界观方法论对实践有重要指导，不是"决定性"。④错误："与时俱进是马克思主义哲学的核心观点"说法有误，马克思主义哲学的基本内容不是以某一观点为"核心"表述。②坚持基本原理与实际相结合是马克思主义中国化的根本原则；③马克思主义为抗战提供科学指导，均正确。',knowledge:'时政·抗日战争80周年·马克思主义中国化2'},
  {cat:'history',type:'single',text:'[95] 新时代新征程要"传承和弘扬伟大抗战精神，踔厉奋发、勇毅前行，为以中国式现代化全面推进强国建设、民族复兴伟业而团结奋斗"。这说明抗战精神（ ）①是中华各族人民自强不息的精神支柱②是中华民族精神的生动诠释和具体展现③为新时代中国发展提供了强大精神力量④全面体现了中华民族的整体风貌和精神特征',
   options:['A. ①②','B. ①④','C. ②③','D. ③④'],answer:'C',
   explanation:'①"自强不息"是中华民族精神的重要内容，但说抗战精神是"自强不息的精神支柱"不够准确，且"各族人民的精神支柱"说法过于宽泛。④"全面体现中华民族整体风貌"说法不当，"全面"一词绝对化，且整体风貌是中华文化的整体特征，不是单独一种精神"全面体现"的。②抗战精神是民族精神的生动诠释和具体展现；③为新时代中国发展提供精神力量，均正确。',knowledge:'时政·抗日战争80周年·抗战精神新时代价值'},
  {cat:'history',type:'single',text:'[96] 学生看到以下文字："文明不容倒退，唯有坚定向前；世界不可割裂，唯有团结共生；人类应远离偏见和歧视、仇恨和战争，携手构建命运与共的明天。"下列选项中与这段文字主旨最相符的是（ ）',
   options:['A. 当今世界面临着许多和平与发展问题','B. 人类命运共同体理念引领人类文明进步方向','C. 只有根除霸权思维，才能让和平理念落地生根','D. 伟大抗战精神照亮着中华民族伟大复兴之路'],answer:'B',
   explanation:'"文明向前、团结共生、构建命运与共"——核心理念是人类命运共同体。A描述问题，不是主旨。C只提到霸权思维，视角片面。D讲抗战精神复兴，不是文字的主旨。B"人类命运共同体理念引领人类文明进步方向"最准确对应文字的核心主旨。',knowledge:'时政·抗日战争80周年·命运共同体主旨'},

   options:['A. ①③','B. ①④','C. ②③','D. ②④'],answer:'B',
   explanation:'②错误：形象思维以表象为基本单元，抽象思维才以概念为基本单元；标识设计主要运用形象思维，不是"以概念为基本单元"。③错误："从事物个性中抽取共性"是抽象概括的过程，而标识设计是将多种感性形象综合成整体，是思维具体的过程，不是抽取共性。①标识运用联想（长城→民族脊梁）和想象，体现思维的想象性；④最终定稿将多种意象融合成统一象征内涵，是思维具体（多种规定性的综合）的产物。',knowledge:'时政·抗日战争80周年·形象思维'},
  {cat:'history',type:'single',text:'[98] 2025年9月3日，中国政府隆重纪念抗日战争胜利80周年，日本右翼分子和某些政客却美化侵略战争，将其说成是"自存自卫"和对亚洲占领地的"解放"，严重伤害了人民感情。下列表述错误的是（ ）',
   options:['A. 价值观对人们认识和改造世界的活动具有重要的导向作用','B. 价值判断和价值选择具有主体差异性，没有客观评价标准','C. 日本右翼分子及部分政客的行为违背客观规律与人类良知','D. 我们应尊重历史真相，树立正确价值观，维护和平与正义'],answer:'B',
   explanation:'题目问"错误的表述"。B错误：价值判断和价值选择具有主体差异性（不同主体有不同判断），但这不意味着"没有客观评价标准"，正确的价值判断应以是否符合客观规律和人民利益为标准，历史上的侵略罪行有客观评价标准。A正确；C正确：右翼分子美化侵略违背历史规律；D正确：应树立正确价值观维护和平。故B为错误表述。',knowledge:'时政·抗日战争80周年·价值判断'},
  {cat:'history',type:'single',text:'[99] 2025年9月3日，在纪念中国人民抗日战争暨世界反法西斯战争胜利80周年大会上，习近平总书记同抗战老战士、老同志代表亲切握手，向他们表示崇高敬意。致敬抗战老战士、老同志是因为（ ）①他们是中华优秀传统文化的直接传播者②他们的精神是中华民族的宝贵精神财富③他们是鼓舞中国人民团结奋斗的一面旗帜④英雄是中华民族的脊梁、时代的先锋',
   options:['A. ①②','B. ①③','C. ②④','D. ③④'],answer:'C',
   explanation:'①错误：抗战老战士是革命文化的传承者和体现者，不是"中华优秀传统文化的直接传播者"，二者概念不同。③"鼓舞团结奋斗的旗帜"说法不够准确，老战士是精神榜样，但"一面旗帜"通常指旗帜性人物，不是所有老战士的通用表述。②他们的精神（抗战精神）是中华民族宝贵精神财富；④英雄是民族脊梁和时代先锋，是致敬的根本原因。',knowledge:'时政·抗日战争80周年·英雄致敬'},
  {cat:'history',type:'single',text:'[100] 习近平总书记强调，纪念的目的是铭记历史、缅怀先烈、珍爱和平、开创未来，中国人民始终坚定地站在历史正确一边，与各国携手构建人类命运共同体。这表明我国（ ）①凝聚国际共识，引领全球治理体系实现根本性变革②增强历史自觉，从抗战历史中汲取前进的智慧力量③坚持和平发展，在国际合作与交流中维护世界和平④彰显大国担当，维护各国平等参与国际事务的权利',
   options:['A. ①③','B. ①④','C. ②③','D. ②④'],answer:'D',
   explanation:'①错误："引领全球治理体系实现根本性变革"说法过于激进，中国主张完善而非"根本性变革"现有国际秩序体系。③"在国际合作中维护世界和平"正确，但题目中①③组合排除①，②④组合更合适。②铭记历史汲取智慧体现历史自觉；④与各国携手构建命运共同体，彰显大国担当，维护各国平等参与权利。',knowledge:'时政·抗日战争80周年·大国担当'},
  {cat:'history',type:'single',text:'[101] 2025年是中国人民抗日战争暨世界反法西斯战争胜利80周年。伟大的抗战精神，向世界展示了天下兴亡、匹夫有责的爱国情怀，视死如归、宁死不屈的民族气节，不畏强暴、血战到底的英雄气概，百折不挠、坚忍不拔的必胜信念。伟大的抗战精神（ ）①熔铸于抗日战争的伟大斗争，是实现民族复兴的精神动力②彰显了新时代保家卫国、视死如归的爱国主义的鲜明主题③是中华民族宝贵的精神财富，激励中国人民克服艰难险阻④寓于中华民族精神之中，集中体现了中华民族的精神面貌',
   options:['A. ①③','B. ①④','C. ②③','D. ②④'],answer:'A',
   explanation:'②错误：材料描述的是抗日战争时期的精神，"新时代保家卫国"的表述不准确，且"鲜明主题"的说法与材料不符。④错误："集中体现了中华民族的精神面貌"不够准确，抗战精神是民族精神在特定历史时期的体现，不是"集中体现"中华民族整体精神面貌。①熔铸于抗战斗争，是民族复兴的精神动力；③是宝贵精神财富，激励克服艰难险阻，均正确。',knowledge:'时政·抗日战争80周年·抗战精神内涵'},
  {cat:'history',type:'single',text:'[102] 2025年10月10日，筠连县第十七届人大常委会举行第三十六次会议。会议传达学习了习近平总书记在纪念大会上的重要讲话精神，对部分县级部门进行了工作满意度测评，表决通过了《筠连县人民代表大会专门委员会议事规则》，决定任命曹正楷为筠连县信访局局长。可见，筠连县人大常委会（ ）①行使了党赋予的任免权②代表人民行使了立法权③行使了监督权和决定权④坚持了民主集中制原则',
   options:['A. ①②','B. ②③','C. ①④','D. ③④'],answer:'D',
   explanation:'①错误：任免权是国家权力，由宪法和法律赋予，不是"党赋予的"，且应表述为"法律赋予"。②错误：表决通过《议事规则》是地方性法规立法，是地方人大的立法权，但县级人大没有立法权（地方立法权在设区的市以上），通过"议事规则"是自身规范性文件，不是行使立法权。③对部门进行满意度测评体现监督权；表决通过议事规则、决定任命局长体现决定权；④民主集中制是人大工作的基本原则，均正确。',knowledge:'时政·抗日战争80周年·人大常委会职权'},
  {cat:'history',type:'single',text:'[103] 之所以说中国人民抗日战争的胜利是马克思主义中国化的胜利，是因为（ ）①马克思主义统一唯物辩证的自然观与历史观②坚持马克思主义基本原理与中国实际相结合③马克思主义观点和方法为抗战提供科学指导④科学世界观和方法论对实践具有决定性作用',
   options:['A. ①②','B. ①④','C. ②③','D. ③④'],answer:'C',
   explanation:'①"马克思主义统一唯物辩证的自然观与历史观"是马克思主义哲学的特点，不是抗战胜利是马克思主义中国化胜利的原因。④"决定性作用"说法绝对，世界观方法论对实践有重要指导，不是"决定性"。②坚持基本原理与实际相结合（马克思主义中国化的根本路径）；③马克思主义观点方法为抗战提供科学指导，均正确。',knowledge:'时政·抗日战争80周年·马克思主义中国化3'},
