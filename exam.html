// ═══════════════════════════════════════════════════════
// ═══════════════════════════════════════════════════════
// 全局状态
// ═══════════════════════════════════════════════════════
let currentMode = 'bank';
let answerMode = 'instant';
let bankCat = 'all';
let aiCat = 'all';
let quizData = [], userAnswers = {}, submitted = {};
let totalAnswered=0, totalCorrect=0, totalWrong=0;
let isEndless = false;
let endlessPool = [], endlessCurrent = 0;

const catLabels = {
  all:'常识判断',jilin:'吉林省情',politics:'政治理论',
  law:'法律法规',history:'历史文化',science:'科技常识',economy:'经济知识'
};

document.getElementById('bankTotal').textContent = BANK.length;

function switchMode(mode) {
  currentMode = mode;
  document.getElementById('tab-bank').classList.toggle('active', mode==='bank');
  document.getElementById('tab-ai').classList.toggle('active', mode==='ai');
  document.getElementById('tab-search').classList.toggle('active', mode==='search');
  document.getElementById('panel-bank').style.display = mode==='bank' ? '' : 'none';
  document.getElementById('panel-ai').style.display = mode==='ai' ? '' : 'none';
  document.getElementById('panel-search').style.display = mode==='search' ? '' : 'none';
  document.getElementById('quizArea').innerHTML = '';
  if (mode==='search') {
    setTimeout(()=>document.getElementById('searchInput').focus(), 80);
  }
}

function setAnswerMode(mode, btn) {
  answerMode = mode;
  btn.closest('.answer-mode-group').querySelectorAll('.amode-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

document.querySelectorAll('#bankCats .cat-btn').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('#bankCats .cat-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); bankCat = b.dataset.cat;
  });
});
document.querySelectorAll('#aiCats .cat-btn').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('#aiCats .cat-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); aiCat = b.dataset.cat;
  });
});

function updateStats() {
  document.getElementById('sTotal').textContent = totalAnswered;
  document.getElementById('sCorrect').textContent = totalCorrect;
  document.getElementById('sWrong').textContent = totalWrong;
  document.getElementById('sRate').textContent = totalAnswered ? Math.round(totalCorrect/totalAnswered*100)+'%' : '—';
}

// ─── 本地题库 ────────────────────────────────────────────
function startBankQuiz() {
  const countSel = document.getElementById('bankCount').value;
  const typeSel = document.getElementById('bankType').value;
  let pool = BANK.filter(q => bankCat==='all' || q.cat===bankCat);
  if (typeSel !== 'all') pool = pool.filter(q => q.type===typeSel);
  if (pool.length === 0) {
    document.getElementById('quizArea').innerHTML = '<div class="error-box">⚠ 当前筛选条件下无题目，请更换分类或类型。</div>';
    return;
  }
  if (countSel === 'endless') { startEndlessMode(pool); return; }
  isEndless = false;
  const n = countSel==='999' ? pool.length : Math.min(parseInt(countSel), pool.length);
  quizData = [...pool].sort(()=>Math.random()-.5).slice(0, n);
  userAnswers = {}; submitted = {};
  renderQuiz('bank');
}

// ─── 无尽模式 ────────────────────────────────────────────
function startEndlessMode(pool) {
  isEndless = true;
  endlessPool = [...pool].sort(()=>Math.random()-.5);
  endlessCurrent = 0;
  userAnswers = {}; submitted = {}; quizData = [];
  const area = document.getElementById('quizArea');
  area.innerHTML = `
    <div class="endless-bar">
      <span class="endless-label">♾ 无尽模式</span>
      <div class="endless-progress"><div class="endless-fill" id="endlessFill" style="width:0%"></div></div>
      <span class="endless-count" id="endlessCount">已答 0 题</span>
    </div>
    <div id="endlessCards"></div>
    <div id="endlessLoadRow" style="text-align:center;padding:20px 0;display:none">
      <button class="btn btn-outline" onclick="endlessNext()">下一题 ›</button>
    </div>`;
  endlessNext();
}

function endlessNext() {
  if (endlessCurrent >= endlessPool.length) {
    endlessPool = [...endlessPool].sort(()=>Math.random()-.5);
    endlessCurrent = 0;
  }
  const idx = endlessCurrent;
  const q = endlessPool[endlessCurrent++];
  quizData[idx] = q;
  const cards = document.getElementById('endlessCards');
  // 只保留最近3题
  while (cards.children.length >= 3) cards.removeChild(cards.firstChild);
  const card = createQuizCard(q, idx, 'bank');
  cards.appendChild(card);
  document.getElementById('endlessLoadRow').style.display = 'none';
  card.scrollIntoView({behavior:'smooth', block:'center'});
}

function endlessAnswered() {
  const done = Object.keys(submitted).length;
  const cntEl = document.getElementById('endlessCount');
  if (cntEl) cntEl.textContent = `已答 ${done} 题`;
  const fill = document.getElementById('endlessFill');
  if (fill) fill.style.width = Math.min(100, (done % 10) * 10) + '%';
  const loadRow = document.getElementById('endlessLoadRow');
  if (loadRow) { loadRow.style.display = ''; loadRow.scrollIntoView({behavior:'smooth',block:'nearest'}); }
}

// ─── AI出题 ─────────────────────────────────────────────
async function startAiQuiz() {
  const n = document.getElementById('aiCount').value;
  const type = document.getElementById('aiType').value;
  const cat = catLabels[aiCat];
  const btn = document.getElementById('aiStartBtn');
  btn.disabled = true; btn.textContent = '生成中…';
  isEndless = false;
  document.getElementById('quizArea').innerHTML = '<div class="loading"><div class="loader"></div><br>AI正在出题，请稍候…</div>';
  const typeDesc = type==='single'?'单选题':type==='judge'?'判断题':'单选题和判断题混合';
  const prompt = `你是吉林省公务员考试出题专家。生成${n}道关于"${cat}"的${typeDesc}，符合考试风格和难度。严格返回JSON不含其他文字：{"questions":[{"type":"single","text":"题目？","options":["A. 选项一","B. 选项二","C. 选项三","D. 选项四"],"answer":"B","explanation":"解析","knowledge":"知识点"},{"type":"judge","text":"判断？","options":["正确","错误"],"answer":"正确","explanation":"解析","knowledge":"知识点"}]}`;
  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})
    });
    const data = await resp.json();
    const raw = (data.content?.[0]?.text||'').replace(/```json|```/g,'').trim();
    quizData = JSON.parse(raw).questions;
    userAnswers = {}; submitted = {};
    renderQuiz('ai');
  } catch(e) {
    document.getElementById('quizArea').innerHTML = `<div class="error-box">⚠ 生成失败：${e.message}</div>`;
  } finally { btn.disabled = false; btn.textContent = '▶ AI 出题'; }
}

// ─── 渲染题目列表 ─────────────────────────────────────────
function renderQuiz(source) {
  const area = document.getElementById('quizArea');
  area.innerHTML = '';
  quizData.forEach((q, idx) => area.appendChild(createQuizCard(q, idx, source)));

  if (answerMode === 'batch') {
    const toolbar = document.createElement('div');
    toolbar.className = 'batch-toolbar'; toolbar.id = 'batchToolbar';
    toolbar.innerHTML = `
      <span class="batch-progress-text">已选 <span id="batchDone">0</span> / ${quizData.length} 题</span>
      <div style="display:flex;gap:10px">
        <button class="btn btn-outline" onclick="${source==='bank'?'startBankQuiz':'startAiQuiz'}()">↺ 重新出题</button>
        <button class="btn btn-green" onclick="submitBatch()">📋 提交全部答案</button>
      </div>`;
    area.appendChild(toolbar);
  } else {
    const row = document.createElement('div');
    row.id = 'quizFooter';
    row.style.cssText = 'display:flex;gap:12px;justify-content:center;margin:10px 0 24px;';
    row.innerHTML = `<button class="btn btn-outline" onclick="${source==='bank'?'startBankQuiz':'startAiQuiz'}()">↺ 换一批题目</button>`;
    area.appendChild(row);
  }
  area.scrollIntoView({behavior:'smooth', block:'start'});
}

function createQuizCard(q, idx, source) {
  const card = document.createElement('div');
  card.className = 'quiz-card'; card.id = `card-${idx}`;
  const typeTag = q.type==='judge'?'判断题':'单选题';
  const srcTag = source==='bank'?`<span class="q-source-tag">📚 题库</span>`:`<span class="q-source-tag">🤖 AI</span>`;
  // 编辑按钮（仅题库题目显示）
  const editBtn = source==='bank'
    ? `<button class="edit-card-btn" onclick="openEditModal(${idx})" title="编辑此题">✏ 修改</button>`
    : '';
  let optsHtml = q.type==='judge'
    ? `<div class="judge-options" id="judgeOpts-${idx}">
        <button class="judge-btn" onclick="handleSelect(${idx},'正确',this)" id="jbtn-${idx}-正确">✓ 正确</button>
        <button class="judge-btn" onclick="handleSelect(${idx},'错误',this)" id="jbtn-${idx}-错误">✗ 错误</button>
       </div>`
    : `<div class="options" id="opts-${idx}">${q.options.map(opt=>{
        const key=opt.charAt(0), txt=opt.length>2?opt.slice(2).trim():opt;
        return `<div class="option" id="opt-${idx}-${key}" onclick="handleSelect(${idx},'${key}',this)"><span class="opt-key">${key}</span><span class="opt-text">${escH(txt)}</span></div>`;
      }).join('')}</div>`;
  card.innerHTML = `
    ${editBtn}
    <div class="q-header">
      <span class="q-badge">第 ${idx+1} 题</span>
      <span class="q-type-tag">${typeTag}</span>${srcTag}
      <span class="q-text">${escH(q.text)}</span>
    </div>
    ${optsHtml}
    <div id="result-${idx}"></div>`;
  return card;
}

// ─── 统一选择入口 ─────────────────────────────────────────
function handleSelect(idx, val, el) {
  if (submitted[idx]) return;
  userAnswers[idx] = val;
  const q = quizData[idx];
  const cls = answerMode==='batch' ? 'batch-selected' : 'selected';
  if (q.type==='judge') {
    document.querySelectorAll(`#judgeOpts-${idx} .judge-btn`).forEach(b=>b.classList.remove('selected','batch-selected'));
  } else {
    document.querySelectorAll(`#opts-${idx} .option`).forEach(o=>o.classList.remove('selected','batch-selected'));
  }
  el.classList.add(cls);
  if (answerMode==='instant') {
    revealAnswer(idx);
  } else {
    const counter = document.getElementById('batchDone');
    if (counter) counter.textContent = Object.keys(userAnswers).length;
  }
}

// ─── 揭示答案 ─────────────────────────────────────────────
function revealAnswer(idx) {
  if (submitted[idx]) return;
  const q = quizData[idx];
  const chosen = userAnswers[idx];
  if (!chosen) return;
  submitted[idx] = true;
  const isCorrect = chosen===q.answer;
  totalAnswered++; if(isCorrect) totalCorrect++; else totalWrong++;
  updateStats();
  if (q.type==='judge') {
    ['正确','错误'].forEach(val=>{
      const el=document.getElementById(`jbtn-${idx}-${val}`);
      if(!el) return;
      el.classList.add('disabled'); el.classList.remove('selected','batch-selected');
      if(val===q.answer) el.classList.add(val===chosen?'correct':'show-correct');
      else if(val===chosen&&!isCorrect) el.classList.add('wrong');
    });
  } else {
    ['A','B','C','D'].forEach(k=>{
      const el=document.getElementById(`opt-${idx}-${k}`);
      if(!el) return;
      el.classList.add('disabled'); el.classList.remove('selected','batch-selected');
      if(k===q.answer) el.classList.add(k===chosen?'correct':'show-correct');
      else if(k===chosen&&!isCorrect) el.classList.add('wrong');
    });
  }
  document.getElementById(`result-${idx}`).innerHTML = `
    <div class="result-block">
      <div class="result-verdict">
        <span class="verdict-icon">${isCorrect?'✅':'❌'}</span>
        <span class="verdict-text ${isCorrect?'verdict-correct':'verdict-wrong'}">${isCorrect?'回答正确！':'回答错误'}</span>
      </div>
      ${!isCorrect?`<div class="correct-ans"><span class="correct-ans-label">正确答案</span><span class="correct-ans-val">${escH(q.answer)}</span></div>`:''}
      ${q.knowledge?`<div><span class="knowledge-tag">${escH(q.knowledge)}</span></div>`:''}
      <div class="explanation">${escH(q.explanation)}</div>
    </div>`;
  if (isEndless) { endlessAnswered(); return; }
  if (answerMode==='instant' && Object.keys(submitted).length===quizData.length) showSummary();
}

// ─── 统一提交 ─────────────────────────────────────────────
function submitBatch() {
  const unanswered = quizData.filter((_,i)=>!userAnswers[i]).length;
  if (unanswered > 0 && !confirm(`还有 ${unanswered} 道题未选择，确定提交吗？未答题将显示正确答案但不计入成绩。`)) return;
  const toolbar = document.getElementById('batchToolbar');
  if (toolbar) toolbar.remove();
  quizData.forEach((_,idx)=>{
    if (userAnswers[idx]) revealAnswer(idx);
    else showUnanswered(idx);
  });
  showSummary();
}

function showUnanswered(idx) {
  submitted[idx] = true;
  const q = quizData[idx];
  if (q.type==='judge') {
    ['正确','错误'].forEach(val=>{
      const el=document.getElementById(`jbtn-${idx}-${val}`);
      if(el){el.classList.add('disabled');if(val===q.answer)el.classList.add('show-correct');}
    });
  } else {
    ['A','B','C','D'].forEach(k=>{
      const el=document.getElementById(`opt-${idx}-${k}`);
      if(el){el.classList.add('disabled');if(k===q.answer)el.classList.add('show-correct');}
    });
  }
  document.getElementById(`result-${idx}`).innerHTML = `
    <div class="result-block">
      <div class="result-verdict"><span class="verdict-icon">⬜</span><span class="verdict-text" style="color:var(--muted)">未作答</span></div>
      <div class="correct-ans"><span class="correct-ans-label">正确答案</span><span class="correct-ans-val">${escH(q.answer)}</span></div>
      ${q.knowledge?`<div><span class="knowledge-tag">${escH(q.knowledge)}</span></div>`:''}
      <div class="explanation">${escH(q.explanation)}</div>
    </div>`;
}

// ─── 总结 ─────────────────────────────────────────────────
function showSummary() {
  let bc=0; quizData.forEach((q,i)=>{if(userAnswers[i]===q.answer)bc++;});
  const answered=quizData.filter((_,i)=>!!userAnswers[i]).length;
  const n=quizData.length, rate=answered>0?Math.round(bc/answered*100):0;
  const s=document.createElement('div'); s.className='summary-card';
  s.innerHTML=`
    <div class="summary-title">✦ 本批答题完成 ✦</div>
    <div class="summary-grid">
      <div><div class="summary-num gold">${n}</div><div class="summary-sub">总题数</div></div>
      <div><div class="summary-num gold">${answered}</div><div class="summary-sub">已作答</div></div>
      <div><div class="summary-num green">${bc}</div><div class="summary-sub">答对</div></div>
      <div><div class="summary-num red">${answered-bc}</div><div class="summary-sub">答错</div></div>
      <div><div class="summary-num gold">${rate}%</div><div class="summary-sub">正确率</div></div>
    </div>
    <div class="btn-row" style="justify-content:center;gap:12px">
      <button class="btn btn-primary" onclick="${currentMode==='bank'?'startBankQuiz':'startAiQuiz'}()">▶ 再来一批</button>
      <button class="btn btn-outline" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑ 返回设置</button>
    </div>`;
  const footer=document.getElementById('quizFooter');
  if(footer) footer.replaceWith(s);
  else document.getElementById('quizArea').appendChild(s);
}

// ═══════════════════════════════════════════════════════
// 🔍 搜索功能
// ═══════════════════════════════════════════════════════
let searchResults = [];
let searchKeyword = '';

const catNameMap = {policy:'政策时政', economy:'经济常识', science:'科技常识', history:'历史常识'};
const typeNameMap = {single:'单选题', judge:'判断题'};

function doSearch(kw) {
  searchKeyword = kw.trim();
  const clearBtn = document.getElementById('searchClear');
  clearBtn.style.display = kw ? 'block' : 'none';
  const catFilter = document.getElementById('searchCatFilter').value;
  if (!searchKeyword) {
    document.getElementById('searchBar').style.display = 'none';
    document.getElementById('searchResults').innerHTML = '';
    return;
  }
  const kwLower = searchKeyword.toLowerCase();
  searchResults = BANK.map((q, i) => ({q, i})).filter(({q}) => {
    if (catFilter !== 'all' && q.cat !== catFilter) return false;
    return (q.text && q.text.toLowerCase().includes(kwLower)) ||
           (q.answer && q.answer.toLowerCase().includes(kwLower)) ||
           (q.explanation && q.explanation.toLowerCase().includes(kwLower)) ||
           (q.knowledge && q.knowledge.toLowerCase().includes(kwLower)) ||
           (q.options && q.options.some(o => o.toLowerCase().includes(kwLower)));
  });
  renderSearchResults();
}

function filterSearchResults() {
  if (searchKeyword) doSearch(document.getElementById('searchInput').value);
}

function renderSearchResults() {
  const bar = document.getElementById('searchBar');
  const box = document.getElementById('searchResults');
  bar.style.display = 'flex';
  document.getElementById('searchCount').textContent = searchResults.length;
  if (searchResults.length === 0) {
    box.innerHTML = `<div class="no-results">😶 没有找到包含「${escH(searchKeyword)}」的题目</div>`;
    return;
  }
  const kw = searchKeyword;
  function hl(str) {
    if (!str) return '';
    const escaped = escH(str);
    const kwEsc = escH(kw);
    return escaped.replace(new RegExp(kwEsc.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), 'gi'),
      m => `<span class="search-highlight">${m}</span>`);
  }
  box.innerHTML = `<div class="search-q-list">${searchResults.map(({q, i}) => {
    const preview = q.text.length > 80 ? q.text.slice(0,80)+'…' : q.text;
    return `<div class="search-q-item" onclick="openEditFromSearch(${i})">
      <div class="search-q-num">#${i+1}</div>
      <div>
        <div class="search-q-preview">${hl(preview)}</div>
        <div class="search-q-meta">
          <span class="search-q-tag gold">${catNameMap[q.cat]||q.cat}</span>
          <span class="search-q-tag">${typeNameMap[q.type]||q.type}</span>
          ${q.knowledge ? `<span class="search-q-tag">${escH(q.knowledge)}</span>` : ''}
          <span class="search-q-tag" style="color:var(--green);border-color:rgba(39,174,96,.3)">答案：${escH(q.answer)}</span>
        </div>
      </div>
    </div>`;
  }).join('')}</div>`;
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClear').style.display = 'none';
  document.getElementById('searchBar').style.display = 'none';
  document.getElementById('searchResults').innerHTML = '';
  searchKeyword = '';
  searchResults = [];
}

function openEditFromSearch(bankIdx) {
  openEditModalByBankIdx(bankIdx);
}

// ═══════════════════════════════════════════════════════
// ✏ 编辑题目功能
// ═══════════════════════════════════════════════════════
let editingBankIdx = -1;   // 正在编辑的 BANK 下标
let editingQuizIdx = -1;   // 答题区 quizData 下标（-1=从搜索打开）

// 从答题卡打开（quizData 下标）
function openEditModal(quizIdx) {
  const q = quizData[quizIdx];
  // 找到该题在 BANK 中的原始下标
  const bankIdx = BANK.indexOf(q);
  editingBankIdx = bankIdx >= 0 ? bankIdx : -1;
  editingQuizIdx = quizIdx;
  fillEditForm(q);
  document.getElementById('editModal').classList.add('open');
}

// 从搜索结果打开（BANK 下标）
function openEditModalByBankIdx(bankIdx) {
  editingBankIdx = bankIdx;
  editingQuizIdx = -1;
  fillEditForm(BANK[bankIdx]);
  document.getElementById('editModal').classList.add('open');
}

function fillEditForm(q) {
  document.getElementById('editText').value = q.text || '';
  document.getElementById('editType').value = q.type || 'single';
  document.getElementById('editAnswer').value = q.answer || '';
  document.getElementById('editExplanation').value = q.explanation || '';
  document.getElementById('editKnowledge').value = q.knowledge || '';
  document.getElementById('editCat').value = q.cat || 'history';
  // 填选项
  if (q.type === 'judge') {
    document.getElementById('editOptsField').style.display = 'none';
  } else {
    document.getElementById('editOptsField').style.display = '';
    const keys = ['A','B','C','D'];
    keys.forEach((k,i) => {
      const opt = (q.options && q.options[i]) ? q.options[i] : '';
      // 去掉"A. "前缀只显示内容
      const txt = opt.replace(/^[A-D][.．。、]\s*/,'');
      document.getElementById(`editOpt${k}`).value = txt;
    });
  }
}

function onEditTypeChange() {
  const t = document.getElementById('editType').value;
  document.getElementById('editOptsField').style.display = t==='judge' ? 'none' : '';
  if (t==='judge') document.getElementById('editAnswer').placeholder = '填：正确 或 错误';
  else document.getElementById('editAnswer').placeholder = '填：A / B / C / D';
}

function closeEditModal() {
  document.getElementById('editModal').classList.remove('open');
  editingBankIdx = -1; editingQuizIdx = -1;
}

function saveEdit() {
  const text = document.getElementById('editText').value.trim();
  const type = document.getElementById('editType').value;
  const answer = document.getElementById('editAnswer').value.trim();
  const explanation = document.getElementById('editExplanation').value.trim();
  const knowledge = document.getElementById('editKnowledge').value.trim();
  const cat = document.getElementById('editCat').value;
  if (!text) { alert('题目文本不能为空'); return; }
  if (!answer) { alert('正确答案不能为空'); return; }

  let options;
  if (type === 'judge') {
    options = ['正确','错误'];
  } else {
    options = ['A','B','C','D'].map(k => {
      const v = document.getElementById(`editOpt${k}`).value.trim();
      return `${k}. ${v}`;
    });
    if (options.some(o => o === 'A. ' || o === 'B. ' || o === 'C. ' || o === 'D. ')) {
      if (!confirm('有选项内容为空，确认保存？')) return;
    }
  }

  const updated = { cat, type, text, options, answer, explanation, knowledge };

  // 更新 BANK 原题
  if (editingBankIdx >= 0) {
    Object.assign(BANK[editingBankIdx], updated);
  }
  // 更新当前答题区 quizData（如存在）
  if (editingQuizIdx >= 0 && quizData[editingQuizIdx]) {
    Object.assign(quizData[editingQuizIdx], updated);
    // 重新渲染该题卡（仅未作答时）
    if (!submitted[editingQuizIdx]) {
      const area = document.getElementById('quizArea');
      const oldCard = document.getElementById(`card-${editingQuizIdx}`);
      if (oldCard) {
        const newCard = createQuizCard(quizData[editingQuizIdx], editingQuizIdx, 'bank');
        area.replaceChild(newCard, oldCard);
      }
    } else {
      // 已作答，只更新知识点和解析显示
      const resDiv = document.getElementById(`result-${editingQuizIdx}`);
      if (resDiv && resDiv.querySelector('.knowledge-tag')) {
        if (knowledge) resDiv.querySelector('.knowledge-tag').textContent = knowledge;
      }
      if (resDiv && resDiv.querySelector('.explanation')) {
        resDiv.querySelector('.explanation').textContent = explanation;
      }
    }
  }
  // 如果是从搜索界面打开，刷新搜索结果
  if (editingQuizIdx < 0 && searchKeyword) {
    doSearch(searchKeyword);
  }
  closeEditModal();
  // 短暂闪烁提示
  const indicator = document.createElement('div');
  indicator.style.cssText = 'position:fixed;top:20px;right:20px;background:#27ae60;color:#fff;padding:10px 20px;font-size:13px;z-index:9999;border-radius:2px;';
  indicator.textContent = '✓ 已保存修改';
  document.body.appendChild(indicator);
  setTimeout(()=>indicator.remove(), 2000);
}

// 点击遮罩关闭
document.getElementById('editModal').addEventListener('click', function(e) {
  if (e.target === this) closeEditModal();
});

function escH(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

</script>
