<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>吉林省公务员考试常识答题器</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap');
  :root {
    --red:#c0392b; --gold:#c9a84c; --darker:#0f0f1a; --card:#16213e;
    --border:rgba(201,168,76,0.3); --text:#e8e0d0; --muted:rgba(232,224,208,0.5); --green:#27ae60;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--darker);color:var(--text);font-family:'Noto Sans SC',sans-serif;min-height:100vh;
    background-image:radial-gradient(ellipse at 15% 15%,rgba(192,57,43,.08) 0%,transparent 50%),
    radial-gradient(ellipse at 85% 85%,rgba(201,168,76,.06) 0%,transparent 50%);}
  header{text-align:center;padding:32px 20px 16px;border-bottom:1px solid var(--border);}
  .badge{display:inline-block;background:linear-gradient(135deg,var(--red),#8b1a1a);color:var(--gold);
    font-family:'Noto Serif SC',serif;font-size:11px;letter-spacing:3px;padding:4px 16px;
    border:1px solid var(--gold);margin-bottom:10px;}
  h1{font-family:'Noto Serif SC',serif;font-size:clamp(18px,4vw,28px);font-weight:700;letter-spacing:2px;}
  h1 span{color:var(--gold);}
  .subtitle{font-size:11px;color:var(--muted);letter-spacing:4px;margin-top:5px;}

  /* Stats */
  .stats-bar{display:flex;justify-content:center;background:var(--card);border-bottom:1px solid var(--border);}
  .stat{text-align:center;padding:12px 24px;border-right:1px solid var(--border);}
  .stat:last-child{border-right:none;}
  .stat-num{font-family:'Noto Serif SC',serif;font-size:22px;color:var(--gold);font-weight:700;}
  .stat-label{font-size:10px;color:var(--muted);letter-spacing:1px;margin-top:3px;}

  .container{max-width:780px;margin:0 auto;padding:24px 14px 60px;}

  /* Mode tabs */
  .mode-tabs{display:flex;margin-bottom:20px;border:1px solid var(--border);overflow:hidden;}
  .mode-tab{flex:1;padding:11px;text-align:center;cursor:pointer;font-size:13px;letter-spacing:1px;
    background:transparent;color:var(--muted);border:none;font-family:'Noto Sans SC',sans-serif;
    transition:all .18s;}
  .mode-tab.active{background:rgba(201,168,76,.12);color:var(--gold);}
  .mode-tab:first-child{border-right:1px solid var(--border);}

  /* Setup panel */
  .setup-panel{background:var(--card);border:1px solid var(--border);padding:22px;margin-bottom:18px;position:relative;}
  .setup-panel::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;
    background:linear-gradient(to bottom,var(--red),var(--gold));}
  .section-title{font-family:'Noto Serif SC',serif;font-size:13px;color:var(--gold);letter-spacing:2px;
    margin-bottom:12px;display:flex;align-items:center;gap:8px;}
  .section-title::after{content:'';flex:1;height:1px;background:var(--border);}

  .categories{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
  .cat-btn{background:transparent;border:1px solid var(--border);color:var(--muted);
    font-family:'Noto Sans SC',sans-serif;font-size:12px;padding:5px 13px;cursor:pointer;transition:all .18s;}
  .cat-btn.active,.cat-btn:hover{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.08);}

  .row{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap;}
  .row label{font-size:12px;color:var(--muted);white-space:nowrap;}
  select{background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--text);
    font-family:'Noto Sans SC',sans-serif;font-size:13px;padding:5px 10px;outline:none;cursor:pointer;}

  /* Buttons */
  .btn{cursor:pointer;font-family:'Noto Sans SC',sans-serif;font-size:13px;letter-spacing:1px;
    padding:10px 24px;border:none;transition:all .18s;}
  .btn-primary{background:linear-gradient(135deg,var(--red),#a93226);color:#fff;border:1px solid var(--red);}
  .btn-primary:hover:not(:disabled){filter:brightness(1.15);transform:translateY(-1px);}
  .btn-primary:disabled{opacity:.45;cursor:not-allowed;}
  .btn-outline{background:transparent;color:var(--gold);border:1px solid var(--border);}
  .btn-outline:hover{border-color:var(--gold);background:rgba(201,168,76,.05);}
  .btn-green{background:linear-gradient(135deg,#27ae60,#1e8449);color:#fff;border:1px solid #27ae60;}
  .btn-green:hover:not(:disabled){filter:brightness(1.15);transform:translateY(-1px);}
  .btn-green:disabled{opacity:.45;cursor:not-allowed;}
  .btn-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}

  /* Info tag */
  .info-tag{display:inline-block;font-size:11px;color:var(--muted);border:1px dashed var(--border);
    padding:6px 12px;line-height:1.6;margin-top:10px;}

  /* Quiz card */
  .quiz-card{background:var(--card);border:1px solid var(--border);padding:24px 26px;
    margin-bottom:16px;position:relative;animation:fadeUp .35s ease;}
  .quiz-card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;
    background:linear-gradient(to bottom,rgba(201,168,76,.6),transparent);}
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

  .q-header{display:flex;align-items:flex-start;gap:12px;margin-bottom:16px;}
  .q-badge{background:var(--red);color:#fff;font-family:'Noto Serif SC',serif;font-size:11px;
    padding:2px 10px;flex-shrink:0;margin-top:2px;}
  .q-type-tag{font-size:10px;border:1px solid var(--border);color:var(--muted);padding:2px 8px;flex-shrink:0;margin-top:3px;}
  .q-source-tag{font-size:10px;border:1px solid rgba(201,168,76,.2);color:rgba(201,168,76,.6);
    padding:2px 8px;flex-shrink:0;margin-top:3px;}
  .q-text{font-size:15px;line-height:1.75;color:var(--text);flex:1;}

  /* Options */
  .options{display:flex;flex-direction:column;gap:9px;margin-bottom:16px;}
  .option{display:flex;align-items:flex-start;gap:12px;padding:10px 15px;border:1px solid var(--border);
    cursor:pointer;transition:all .15s;background:rgba(255,255,255,.02);user-select:none;}
  .option:hover:not(.disabled){border-color:var(--gold);background:rgba(201,168,76,.06);}
  .option.selected{border-color:var(--gold);background:rgba(201,168,76,.10);}
  .option.correct{border-color:var(--green);background:rgba(39,174,96,.10);}
  .option.wrong{border-color:var(--red);background:rgba(192,57,43,.10);}
  .option.show-correct{border-color:var(--green);background:rgba(39,174,96,.06);}
  .option.disabled{cursor:default;}
  .opt-key{font-family:'Noto Serif SC',serif;font-size:13px;font-weight:700;color:var(--gold);flex-shrink:0;width:18px;margin-top:1px;}
  .option.correct .opt-key{color:var(--green);}
  .option.wrong .opt-key{color:var(--red);}
  .option.show-correct .opt-key{color:var(--green);}
  .opt-text{font-size:14px;line-height:1.65;}

  .judge-options{display:flex;gap:10px;margin-bottom:16px;}
  .judge-btn{flex:1;padding:13px;border:1px solid var(--border);background:rgba(255,255,255,.02);
    color:var(--text);font-family:'Noto Sans SC',sans-serif;font-size:14px;cursor:pointer;transition:all .15s;text-align:center;}
  .judge-btn:hover:not(.disabled){border-color:var(--gold);background:rgba(201,168,76,.08);}
  .judge-btn.selected{border-color:var(--gold);background:rgba(201,168,76,.12);}
  .judge-btn.correct{border-color:var(--green);background:rgba(39,174,96,.12);color:var(--green);}
  .judge-btn.wrong{border-color:var(--red);background:rgba(192,57,43,.12);color:#e88;}
  .judge-btn.show-correct{border-color:var(--green);background:rgba(39,174,96,.08);color:var(--green);}
  .judge-btn.disabled{cursor:default;}

  .submit-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}

  /* Result */
  .result-block{border-top:1px solid var(--border);padding-top:14px;margin-top:12px;animation:fadeUp .3s ease;}
  .result-verdict{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .verdict-icon{font-size:17px;flex-shrink:0;}
  .verdict-text{font-family:'Noto Serif SC',serif;font-size:15px;font-weight:700;}
  .verdict-correct{color:var(--green);}
  .verdict-wrong{color:var(--red);}
  .correct-ans{display:flex;align-items:baseline;gap:10px;padding:9px 13px;
    background:rgba(201,168,76,.07);border-left:3px solid var(--gold);margin-bottom:10px;}
  .correct-ans-label{font-size:11px;color:var(--gold);letter-spacing:1px;flex-shrink:0;}
  .correct-ans-val{font-family:'Noto Serif SC',serif;font-size:15px;font-weight:700;color:var(--text);}
  .explanation{font-size:13px;line-height:1.9;color:rgba(232,224,208,.72);}
  .knowledge-tag{display:inline-block;font-size:10px;background:rgba(201,168,76,.08);
    border:1px solid var(--border);color:var(--gold);padding:2px 10px;letter-spacing:1px;margin-bottom:8px;}

  .loading{text-align:center;padding:44px 20px;color:var(--muted);font-size:14px;}
  .loader{display:inline-block;width:32px;height:32px;border:2px solid var(--border);
    border-top-color:var(--gold);border-radius:50%;animation:spin .75s linear infinite;margin-bottom:12px;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .error-box{background:rgba(192,57,43,.1);border:1px solid rgba(192,57,43,.4);color:#e88;
    padding:14px 18px;font-size:13px;margin-bottom:16px;line-height:1.6;}

  .summary-card{background:var(--card);border:1px solid var(--gold);padding:28px;
    text-align:center;margin-bottom:20px;animation:fadeUp .4s ease;}
  .summary-title{font-family:'Noto Serif SC',serif;font-size:17px;color:var(--gold);margin-bottom:18px;letter-spacing:2px;}
  .summary-grid{display:flex;justify-content:center;gap:36px;margin-bottom:22px;flex-wrap:wrap;}
  .summary-num{font-family:'Noto Serif SC',serif;font-size:30px;font-weight:700;}
  .summary-num.green{color:var(--green);}
  .summary-num.red{color:var(--red);}
  .summary-num.gold{color:var(--gold);}
  .summary-sub{font-size:11px;color:var(--muted);margin-top:4px;letter-spacing:1px;}

  footer{text-align:center;padding:24px;font-size:11px;color:var(--muted);letter-spacing:2px;
    border-top:1px solid var(--border);margin-top:16px;}

  /* ── 搜索框 ── */
  .search-wrap{position:relative;margin-bottom:14px;}
  .search-input{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);
    color:var(--text);font-family:'Noto Sans SC',sans-serif;font-size:13px;
    padding:10px 42px 10px 38px;outline:none;transition:border-color .18s;}
  .search-input:focus{border-color:var(--gold);}
  .search-input::placeholder{color:var(--muted);}
  .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);
    font-size:15px;pointer-events:none;opacity:.5;}
  .search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);
    background:none;border:none;color:var(--muted);font-size:17px;cursor:pointer;
    padding:2px 6px;line-height:1;display:none;}
  .search-clear:hover{color:var(--text);}
  .search-results-bar{font-size:11px;color:var(--muted);margin-bottom:10px;
    display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;}
  .search-results-bar span{color:var(--gold);}
  .search-highlight{background:rgba(201,168,76,.28);color:var(--gold);
    border-radius:2px;padding:0 2px;}

  /* ── 编辑题目模态框 ── */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);
    z-index:1000;align-items:center;justify-content:center;padding:16px;}
  .modal-overlay.open{display:flex;}
  .modal{background:#1a2340;border:1px solid var(--gold);width:100%;max-width:680px;
    max-height:90vh;overflow-y:auto;animation:fadeUp .25s ease;}
  .modal-header{display:flex;align-items:center;justify-content:space-between;
    padding:16px 20px;border-bottom:1px solid var(--border);
    background:linear-gradient(135deg,rgba(192,57,43,.15),rgba(201,168,76,.08));}
  .modal-title{font-family:'Noto Serif SC',serif;font-size:15px;color:var(--gold);letter-spacing:2px;}
  .modal-close{background:none;border:none;color:var(--muted);font-size:22px;
    cursor:pointer;padding:0 4px;line-height:1;transition:color .15s;}
  .modal-close:hover{color:var(--text);}
  .modal-body{padding:20px;}
  .edit-field{margin-bottom:16px;}
  .edit-label{font-size:11px;color:var(--gold);letter-spacing:1px;margin-bottom:6px;
    display:flex;align-items:center;gap:6px;}
  .edit-label::after{content:'';flex:1;height:1px;background:var(--border);}
  .edit-input, .edit-textarea, .edit-select{width:100%;background:rgba(255,255,255,.04);
    border:1px solid var(--border);color:var(--text);
    font-family:'Noto Sans SC',sans-serif;font-size:13px;padding:8px 12px;
    outline:none;transition:border-color .18s;resize:vertical;}
  .edit-input:focus,.edit-textarea:focus,.edit-select:focus{border-color:var(--gold);}
  .edit-textarea{min-height:72px;line-height:1.7;}
  .edit-select{cursor:pointer;}
  .edit-opts-grid{display:flex;flex-direction:column;gap:8px;}
  .edit-opt-row{display:flex;align-items:center;gap:8px;}
  .edit-opt-key{font-family:'Noto Serif SC',serif;font-size:13px;color:var(--gold);
    width:22px;flex-shrink:0;font-weight:700;}
  .edit-opt-input{flex:1;background:rgba(255,255,255,.04);border:1px solid var(--border);
    color:var(--text);font-family:'Noto Sans SC',sans-serif;font-size:13px;
    padding:7px 10px;outline:none;transition:border-color .18s;}
  .edit-opt-input:focus{border-color:var(--gold);}
  .modal-footer{display:flex;gap:10px;justify-content:flex-end;
    padding:14px 20px;border-top:1px solid var(--border);}
  .btn-danger{background:linear-gradient(135deg,#8b1a1a,#c0392b);color:#fff;
    border:1px solid var(--red);}
  .btn-danger:hover{filter:brightness(1.15);transform:translateY(-1px);}

  /* ── 题卡上的编辑按钮 ── */
  .edit-card-btn{position:absolute;top:10px;right:12px;background:rgba(201,168,76,.08);
    border:1px solid rgba(201,168,76,.25);color:rgba(201,168,76,.6);
    font-size:11px;padding:3px 10px;cursor:pointer;letter-spacing:1px;
    transition:all .15s;font-family:'Noto Sans SC',sans-serif;z-index:2;}
  .edit-card-btn:hover{border-color:var(--gold);color:var(--gold);
    background:rgba(201,168,76,.14);}

  /* ── 搜索模式题目列表 ── */
  .search-q-list{display:flex;flex-direction:column;gap:10px;}
  .search-q-item{background:var(--card);border:1px solid var(--border);
    padding:14px 16px 14px 20px;cursor:pointer;transition:all .15s;
    position:relative;display:flex;align-items:flex-start;gap:12px;}
  .search-q-item::before{content:'';position:absolute;top:0;left:0;width:3px;
    height:100%;background:rgba(201,168,76,.3);transition:background .15s;}
  .search-q-item:hover{border-color:var(--gold);}
  .search-q-item:hover::before{background:var(--gold);}
  .search-q-num{font-family:'Noto Serif SC',serif;font-size:11px;color:var(--muted);
    flex-shrink:0;margin-top:2px;white-space:nowrap;}
  .search-q-preview{font-size:13px;line-height:1.65;color:var(--text);flex:1;}
  .search-q-meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;}
  .search-q-tag{font-size:10px;border:1px solid var(--border);color:var(--muted);
    padding:1px 7px;letter-spacing:.5px;}
  .search-q-tag.gold{border-color:rgba(201,168,76,.3);color:rgba(201,168,76,.7);}
  .no-results{text-align:center;padding:40px 20px;color:var(--muted);font-size:14px;}

  /* 答题方式切换 */
  .answer-mode-group{display:flex;gap:0;border:1px solid var(--border);overflow:hidden;}
  .amode-btn{background:transparent;border:none;border-right:1px solid var(--border);
    color:var(--muted);font-family:'Noto Sans SC',sans-serif;font-size:12px;padding:6px 16px;
    cursor:pointer;transition:all .15s;white-space:nowrap;}
  .amode-btn:last-child{border-right:none;}
  .amode-btn.active{background:rgba(201,168,76,.12);color:var(--gold);}
  .amode-btn:hover:not(.active){color:var(--text);background:rgba(255,255,255,.03);}

  /* 无尽模式进度条 */
  .endless-bar{background:var(--card);border:1px solid var(--border);padding:12px 18px;
    margin-bottom:16px;display:flex;align-items:center;gap:14px;}
  .endless-label{font-size:12px;color:var(--muted);white-space:nowrap;}
  .endless-progress{flex:1;height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;}
  .endless-fill{height:100%;background:linear-gradient(to right,var(--gold),var(--red));
    border-radius:3px;transition:width .4s ease;}
  .endless-count{font-family:'Noto Serif SC',serif;font-size:13px;color:var(--gold);white-space:nowrap;}

  /* 统一提交工具栏 */
  .batch-toolbar{position:sticky;bottom:0;background:rgba(15,15,26,.95);
    border-top:1px solid var(--border);padding:14px 20px;
    display:flex;align-items:center;justify-content:space-between;gap:12px;
    backdrop-filter:blur(8px);z-index:100;flex-wrap:wrap;}
  .batch-progress-text{font-size:13px;color:var(--muted);}
  .batch-progress-text span{color:var(--gold);font-weight:700;}

  /* 统一提交模式—选项已选高亮但不显示解析 */
  .option.batch-selected{border-color:var(--gold);background:rgba(201,168,76,.12);}
  .judge-btn.batch-selected{border-color:var(--gold);background:rgba(201,168,76,.12);}

</style>
</head>
<body>

<header>
  <div class="badge">吉 林 省</div>
  <h1>公务员考试 <span>常识答题器</span></h1>
  <p class="subtitle">CIVIL SERVICE EXAMINATION · JILIN PROVINCE</p>
</header>

<div class="stats-bar">
  <div class="stat"><div class="stat-num" id="sTotal">0</div><div class="stat-label">总作答</div></div>
  <div class="stat"><div class="stat-num" id="sCorrect" style="color:#27ae60">0</div><div class="stat-label">答对</div></div>
  <div class="stat"><div class="stat-num" id="sWrong" style="color:#c0392b">0</div><div class="stat-label">答错</div></div>
  <div class="stat"><div class="stat-num" id="sRate">—</div><div class="stat-label">正确率</div></div>
</div>

<div class="container">

  <!-- 模式切换 -->
  <div class="mode-tabs" style="display:flex;">
    <button class="mode-tab active" id="tab-bank" onclick="switchMode('bank')" style="flex:1">📚 本地题库</button>
    <button class="mode-tab" id="tab-search" onclick="switchMode('search')" style="flex:1;border-left:1px solid var(--border);border-right:1px solid var(--border)">🔍 搜索题目</button>
    <button class="mode-tab" id="tab-ai" onclick="switchMode('ai')" style="flex:1">🤖 AI 智能出题</button>
  </div>

  <!-- 本地题库设置 -->
  <div id="panel-bank" class="setup-panel">
    <div class="section-title">选择知识分类</div>
    <div class="categories" id="bankCats">
      <button class="cat-btn active" data-cat="all">全部</button>
      <button class="cat-btn" data-cat="policy">政策时政</button>
      <button class="cat-btn" data-cat="economy">经济常识</button>
      <button class="cat-btn" data-cat="science">科技常识</button>
      <button class="cat-btn" data-cat="history">历史常识</button>
    </div>
    <div class="row">
      <label>出题数量：</label>
      <select id="bankCount">
        <option value="5">5 题</option>
        <option value="10" selected>10 题</option>
        <option value="20">20 题</option>
        <option value="50">50 题</option>
        <option value="100">100 题</option>
        <option value="endless">♾ 无尽模式</option>
        <option value="999">全部题目</option>
      </select>
      <label style="margin-left:8px">题目类型：</label>
      <select id="bankType">
        <option value="all" selected>全部</option>
        <option value="single">单选题</option>
        <option value="judge">判断题</option>
      </select>
    </div>
    <div class="row" style="margin-bottom:0">
      <label>答题方式：</label>
      <div class="answer-mode-group">
        <button class="amode-btn active" data-mode="instant" onclick="setAnswerMode('instant',this)">⚡ 即时出答案</button>
        <button class="amode-btn" data-mode="batch" onclick="setAnswerMode('batch',this)">📋 统一提交</button>
      </div>
    </div>
    <div class="btn-row" style="margin-top:16px">
      <button class="btn btn-primary" onclick="startBankQuiz()">▶ 开始答题</button>
    </div>
    <div class="info-tag">📖 题库来源：已上传的常识讲义 PDF，含经济、科技、历史三大板块共 <span id="bankTotal">0</span> 道题</div>
  </div>

  <!-- 搜索题目面板 -->
  <div id="panel-search" class="setup-panel" style="display:none">
    <div class="section-title">搜索题目</div>

  {cat:'science',type:'single',text:'碳的同素异形体中，最硬的物质是？',
   options:['A. 石墨','B. 石墨烯','C. 金刚石','D. 活性炭'],
   answer:'C',explanation:'碳是世界上最多的同素异形体，其中金刚石是世界上最硬的物质，石墨烯是世界上最软的物质之一。石墨和粘土共同构成铅笔芯，"铅笔不含铅"。',knowledge:'科技·化学·碳'},
  {cat:'science',type:'judge',text:'空气中含量最多的元素是氧气，其含量约为21%。',
   options:['正确','错误'],answer:'错误',
   explanation:'空气中含量最多的元素是氮气（约78%），氧气约占21%。氮是惰性气体，多用于安全气囊、防腐剂、食品包装等。氧在人体、海洋、地壳中是含量最高的元素。',knowledge:'科技·化学·空气成分'},
  {cat:'science',type:'single',text:'下列物质中，属于"碱"的是？',
   options:['A. 碳酸钠（苏打）','B. 氯化钠（食盐）','C. 氢氧化钠（烧碱）','D. 碳酸氢钠（小苏打）'],
   answer:'C',explanation:'氢氧化钠（NaOH）又称火碱、烧碱、苛性钠，是碱；碳酸钠（苏打）和碳酸氢钠（小苏打）属于盐；氯化钠也是盐。注意：苏打≠小苏打，苏打是碳酸钠，小苏打是碳酸氢钠。',knowledge:'科技·化学·酸碱盐'},
  {cat:'science',type:'single',text:'影响食品安全的重金属污染物主要是？',
   options:['A. 铅和汞','B. 铜和锌','C. 铁和铝','D. 金和银'],
   answer:'A',explanation:'影响食品安全的重金属污染物主要是"汞和铅"，中毒后补充蛋白质可发生中和反应并缓解中毒症状。',knowledge:'科技·化学·重金属'},
  {cat:'science',type:'single',text:'以下关于人体血液的说法，正确的是？',
   options:['A. 肺动脉中流动脉血','B. 静脉血含氧量较多，呈鲜红色','C. O型血为"万能输血者"，可给任何血型输血','D. AB型血只能接受AB型血输入'],
   answer:'C',explanation:'O型血为"万能输血者"，可以给任何血型输血；AB型血可接受任何血型输入（"万能受血者"）。肺动脉中流静脉血，肺静脉中流动脉血（与名称相反，是常考混淆点）。静脉血含氧少，呈暗红色。',knowledge:'科技·生物·血液'},
  {cat:'science',type:'single',text:'缺乏哪种维生素会导致"夜盲症"？',
   options:['A. 维生素B','B. 维生素C','C. 维生素A','D. 维生素D'],
   answer:'C',explanation:'维生素A缺乏→夜盲症、皮肤干燥，可吃胡萝卜补充；维生素B1缺乏→脚气病，B2缺乏→口腔溃疡；维生素C缺乏→坏血病（大航海时代常见）；维生素D缺乏→佝偻病、骨质疏松。',knowledge:'科技·生物·维生素'},
  {cat:'science',type:'judge',text:'人体中含量最高的元素是碳，其次是氧和氢。',
   options:['正确','错误'],answer:'错误',
   explanation:'人体中含量最高的元素是氧，前三位是：氧、碳、氯（氢）。海洋中含量最高的元素也是氧，前三：氧、氢、氯；地壳中含量最多的前四：氧、硅、铝、铁。',knowledge:'科技·化学·元素含量'},
  {cat:'science',type:'single',text:'"智慧元素"碘缺乏会引起哪种疾病？',
   options:['A. 脚气病','B. 甲状腺肿（大脖子病）','C. 坏血病','D. 缺铁性贫血'],
   answer:'B',explanation:'碘被称为"智慧元素"，海带中含量最高，缺碘会得甲状腺肿（俗称"大脖子病"）；硒是"长寿元素"；铁缺乏→缺铁性贫血，可通过吃菠菜、瘦肉、肝脏补充。',knowledge:'科技·生物·矿物质'},
  {cat:'science',type:'single',text:'以下关于计算机储存单位换算，正确的是？',
   options:['A. 1GB=1000MB','B. 1MB=1024KB','C. 1KB=1024bit','D. 1字节=16bit'],
   answer:'B',explanation:'换算关系：1GB=1024MB，1MB=1024KB，1KB=1024B（字节），1字节=8bit（位）。字节是基本单位，字长总是8的倍数，字长越长计算精度越高。',knowledge:'科技·计算机'},

  // ── 经济常识·补充 ──
  {cat:'economy',type:'single',text:'下列关于"失业"的界定，说法正确的是？',
   options:['A. 没有工作就属于失业','B. 有劳动能力且愿意就业但没有工作的人才属于失业','C. 退休人员没有工作也属于失业','D. 在校学生没有工作属于失业'],
   answer:'B',explanation:'失业的界定：有劳动能力且愿意就业，但没有工作的人才属于失业。退休人员、在校学生不属于失业人群。另外，一般失业率数据偏高，调查失业率数据偏低。',knowledge:'经济常识·失业定义'},
  {cat:'economy',type:'judge',text:'一般情况下，统计部门公布的失业率数据较高，而调查失业率数据较低。',
   options:['正确','错误'],answer:'正确',
   explanation:'这是考试常考的细节：一般情况下，官方公布的失业率数据较高↑，调查失业率数据较低↓。原因是统计口径不同，调查失业率更贴近实际就业状况。',knowledge:'经济常识·失业率'},
  {cat:'economy',type:'single',text:'"工作更替、正常流动、不可避免"描述的是哪种失业类型？',
   options:['A. 摩擦性失业','B. 结构性失业','C. 季节性失业','D. 周期性失业'],
   answer:'A',explanation:'摩擦性失业：工作更替、正常流动、不可避免（如换工作间隙的短暂失业）；结构性失业：劳动力供求不一致、专业不对口；季节性失业：季节变化产生，区分标准是否开工资；周期性失业：经济萧条引起需求下降。',knowledge:'经济常识·失业类型'},
  {cat:'economy',type:'single',text:'宏观调控的目标中，最主要的目标是？',
   options:['A. 增加就业','B. 保持国际收支平衡','C. 稳定物价','D. 促进经济增长'],
   answer:'D',explanation:'宏观调控的目标可概括为"两增一稳保平安"：促进经济增长、增加就业、保持国际收支平衡（稳定物价也是重要目标）。其中，促进经济增长是最主要的目标。',knowledge:'经济常识·宏观调控目标'},
  {cat:'economy',type:'single',text:'法定存款准备金率描述的关系是？',
   options:['A. 企业向银行借钱支付的利率','B. 央行向银行收取的，银行寄存于央行资金的比率','C. 居民向银行存钱获得的利率','D. 银行向央行提前取钱支付的利率'],
   answer:'B',explanation:'法定存款准备金率：个人→银行→央行，是央行给银行保管钱所收的利率；再贴现率：企业→银行→央行，是央行收银行提前取出钱的利率（银行收企业的叫"贴现率"）；基准利率是居民存钱的利率。',knowledge:'经济常识·货币政策工具'},
  {cat:'economy',type:'judge',text:'投资收益排序从高到低为：股票>基金>国债>银行。',
   options:['正确','错误'],answer:'正确',
   explanation:'投资收益从高到低：股票>基金>国债>银行；投资风险从高到低：股票>基金>银行>国债。注意：收益排序中国债排在银行前面，而风险排序中银行排在国债前面，这是常见混淆点。',knowledge:'经济常识·投资收益'},
  {cat:'economy',type:'single',text:'以下哪项属于"政府转移支付"而非"政府购买"？',
   options:['A. 购买警车','B. 建设高速公路','C. 发放低保补贴','D. 采购教材'],
   answer:'C',explanation:'政府转移支付是指政府花钱但没买到东西，如社会救济、低保、失业救济金等；政府购买是花钱买到了实物或服务，如购买警车、建设公路、采购教材等。',knowledge:'经济常识·政府购买vs转移支付'},

  // ── 历史常识 ──
  {cat:'history',type:'single',text:'我国历史上第一个奴隶制王朝是？',
   options:['A. 商朝','B. 周朝','C. 夏朝','D. 秦朝'],
   answer:'C',explanation:'夏朝是我国历史上第一个奴隶制王朝，开国君主是禹（启），亡国君主是桀（暴君）。秦朝是我国历史上第一个封建制王朝，开国君主是嬴政（秦始皇）。',knowledge:'历史·先秦·夏朝'},
  {cat:'history',type:'judge',text:'甲骨文是世界上最早的文字。',
   options:['正确','错误'],answer:'错误',
   explanation:'世界上最早的文字是楔形文字（两河流域）；中国最早的文字是甲骨文（商朝）。王懿荣因研究"龙骨"（入药的甲骨）时发现了甲骨文，刘鹗著《铁云藏龟》是世界上第一本关于甲骨文的注释。',knowledge:'历史·商朝·文字'},
  {cat:'history',type:'single',text:'西周实行的土地制度是？',
   options:['A. 均田制','B. 井田制','C. 屯田制','D. 庄园制'],
   answer:'B',explanation:'西周实行井田制（四圈私田，中间公田）；分封制是将天下土地分封给有功之臣；宗法制是嫡长子继承制。井田制的弊端：时间越久，血缘关系越淡薄，导致分封制瓦解。',knowledge:'历史·西周·土地制度'},
  {cat:'history',type:'single',text:'春秋五霸中，不包括以下哪位？',
   options:['A. 齐桓公','B. 楚庄王','C. 秦始皇','D. 晋文公'],
   answer:'C',explanation:'春秋五霸：齐桓公、秦穆公、楚庄王、宋襄公、晋文公。秦始皇是战国时期秦国的国君，不属于春秋五霸。战国七雄：齐楚秦燕赵魏韩。',knowledge:'历史·春秋战国·春秋五霸'},
  {cat:'history',type:'single',text:'"有教无类"是哪位思想家的主张？',
   options:['A. 孟子','B. 荀子','C. 孔子','D. 老子'],
   answer:'C',explanation:'孔子（至圣）主张"有教无类"，在杏坛讲学，著有《论语》（由弟子及再传弟子编著）；孟子主张性善论；荀子主张性恶论；老子（字老冉，名李耳）是道家创始人，著《道德经》。',knowledge:'历史·春秋·百家争鸣·儒家'},
  {cat:'history',type:'judge',text:'秦朝是我国历史上第一个实行郡县制的朝代，也是历史上县级行政区最早划分的朝代。',
   options:['正确','错误'],answer:'正确',
   explanation:'秦朝开国君主嬴政（秦始皇）推行郡县制，是历史上县级行政区的最早划分。同时，秦朝还实现了车同轨、统一货币（圆形方孔钱）、统一度量衡、统一文字（小篆）等大一统措施。',knowledge:'历史·秦朝·政治制度'},
  {cat:'history',type:'single',text:'汉武帝时期推行"罢黜百家，独尊儒术"的思想家是？',
   options:['A. 司马迁','B. 董仲舒','C. 班固','D. 张骞'],
   answer:'B',explanation:'董仲舒提出"罢黜百家，独尊儒术"和"天人合一，天人感应"，是古代君权神授思想的开端，儒学从此正式成为封建统治的官方学说（儒学崛起于西汉汉武帝时期）。',knowledge:'历史·西汉·儒学'},
  {cat:'history',type:'single',text:'鲁迅对《史记》的著名评价是？',
   options:['A. "千古之绝唱"','B. "史家之绝唱，无韵之离骚"','C. "通古今之变，究天人之际"','D. "二十四史之首"'],
   answer:'B',explanation:'鲁迅赞《史记》为"史家之绝唱，无韵之离骚"；梁启超称赞为"千古之绝唱"。《史记》由西汉司马迁撰写，东方朔赐名《太史公书》。北宋司马光的《资治通鉴》与《史记》合称"史学双璧"。',knowledge:'历史·西汉·史记'},
  {cat:'history',type:'single',text:'陆上丝绸之路的开辟者是？',
   options:['A. 班超','B. 郑和','C. 张骞','D. 卫青'],
   answer:'C',explanation:'张骞（西汉）出使西域，开辟了陆上丝绸之路（从古长安到古罗马）；班超（东汉）重新开辟了丝绸之路；郑和（明朝）七次下西洋，走的是海上丝绸之路，最远到达非洲东部和红海沿岸。',knowledge:'历史·西汉·丝绸之路'},
  {cat:'history',type:'judge',text:'"背水一战""胯下之辱""多多益善"这几个典故都与韩信有关。',
   options:['正确','错误'],answer:'正确',
   explanation:'背水一战、胯下之辱、明修栈道暗度陈仓、多多益善、一饭千金、成也萧何败也萧何，这些典故都与楚王韩信有关。鸿门宴和人杰鬼雄则与西楚霸王项羽有关。',knowledge:'历史·秦汉·韩信'},
  {cat:'history',type:'single',text:'历史上第一次农民起义是？',
   options:['A. 黄巾起义','B. 大泽乡起义（陈胜吴广起义）','C. 绿林起义','D. 赤眉起义'],
   answer:'B',explanation:'大泽乡起义（陈胜吴广起义）是历史上第一次农民自下而上的起义，口号为"王侯将相宁有种乎"，起因是秦朝法律制度严苛，遇雨误期按律当斩。',knowledge:'历史·秦末·农民起义'},
  {cat:'history',type:'single',text:'"安史之乱"发生在哪个朝代，有何历史意义？',
   options:['A. 西汉，汉朝由盛转衰的转折点','B. 唐朝，唐朝由盛转衰的转折点','C. 宋朝，宋朝分裂的开始','D. 明朝，明朝衰落的标志'],
   answer:'B',explanation:'安史之乱发生于唐朝（唐玄宗李隆基时期），安禄山、史思明发动叛乱，是唐朝由盛转衰的转折点。玄武门之变（唐太宗李世民）是古代史第一个兄弟残杀政变。',knowledge:'历史·唐朝·安史之乱'},
  {cat:'history',type:'single',text:'"诗史""诗圣"的称号属于哪位诗人？',
   options:['A. 李白','B. 杜甫','C. 白居易','D. 王维'],
   answer:'B',explanation:'唐代诗人称号：诗仙李白（浪漫主义）、诗圣/诗史杜甫（现实主义）、诗魔/诗王白居易、诗佛王维、诗鬼李贺、诗豪刘禹锡、诗杰王勃、诗魂屈原、诗奴贾岛、诗囚孟郊。',knowledge:'历史·唐朝·诗人称号'},
  {cat:'history',type:'single',text:'世界上最早的纸币"交子"出现于哪个朝代哪个地区？',
   options:['A. 唐朝，长安','B. 北宋，四川','C. 元朝，北京','D. 明朝，南京'],
   answer:'B',explanation:'世界上最早的纸币"交子"出现于北宋四川。宋朝还出现了大规模夜市、市井文化雏形，重农抑商政策开始瓦解；宋朝名画《清明上河图》由张择端（北宋）创作。',knowledge:'历史·宋朝·经济'},
  {cat:'history',type:'single',text:'元朝设立哪个机构正式管辖西藏事务？',
   options:['A. 西域都护府','B. 安西都护府','C. 宣政院','D. 理藩院'],
   answer:'C',explanation:'元朝设立宣政院正式管辖西藏事务（开始"管事"）。西汉汉武帝时设立西域都护府，管辖新疆西藏地区，但只是"管地不管事"。元朝是我国历史上疆域最大的朝代，开国君主是忽必烈（成吉思汗孙子）。',knowledge:'历史·元朝·政治'},
  {cat:'history',type:'judge',text:'《诗经》是中国最早的浪漫主义诗歌总集，共收录诗歌305首。',
   options:['正确','错误'],answer:'错误',
   explanation:'《诗经》是中国最早的现实主义诗歌总集，共305首，又称"诗三百"；浪漫主义代表是屈原的《楚辞》（《离骚》）。《诗经》六义：手法上有赋、比、兴，内容上有风、雅、颂。',knowledge:'历史·文学·诗经'},
  {cat:'history',type:'single',text:'"四大美人"中，"闭月"指的是？',
   options:['A. 西施','B. 王昭君','C. 貂蝉','D. 杨玉环'],
   answer:'C',explanation:'四大美人及称谓：沉鱼→西施，落雁→王昭君，闭月→貂蝉，羞花→杨玉环（杨贵妃）。杨贵妃的堂兄是杨国忠，她与唐玄宗李隆基的故事是唐朝著名历史典故。',knowledge:'历史·文化·四大美人'},
  {cat:'history',type:'single',text:'下列以少胜多的战役中，不属于三国时期的是？',
   options:['A. 官渡之战','B. 赤壁之战','C. 夷陵之战','D. 淝水之战'],
   answer:'D',explanation:'淝水之战发生在东晋时期（东晋vs前秦），是东晋以少胜多的著名战役；官渡之战（曹操vs袁绍）、赤壁之战（曹操vs孙刘联军）、夷陵之战（刘备vs东吴）均为三国时期的以少胜多战役。',knowledge:'历史·三国·著名战役'},
  {cat:'history',type:'single',text:'郑和下西洋最远到达了哪里？',
   options:['A. 印度西海岸','B. 波斯湾','C. 非洲东部及红海沿岸','D. 欧洲地中海'],
   answer:'C',explanation:'郑和（明朝，回族）七次下西洋，最远到达非洲东部以及红海沿岸。其性质是朝贡贸易（宣扬国威），同时也有寻找明惠帝朱允炆的目的。郑和又称"三宝太监"。',knowledge:'历史·明朝·郑和下西洋'},

  // ── 历史补充：先秦 ──
  {cat:'history',type:'single',text:'"禅让制"与"世袭制"的根本区别在于？',
   options:['A. 传位给有才能的人还是传给自己儿子','B. 是否经过战争夺权','C. 是否有文字记载','D. 继承人是否经过培训'],
   answer:'A',explanation:'禅让制是"公天下"——选有才能的人继承（如尧舜禹）；世袭制是"家天下"——传给自己的儿子（从夏启开始）。禹传启标志着禅让制结束、世袭制开始。',knowledge:'历史·先秦·禅让与世袭'},
  {cat:'history',type:'judge',text:'"三星堆"遗址属于夏商时期的古蜀文明。',
   options:['正确','错误'],answer:'正确',
   explanation:'三星堆遗址位于四川广汉，属于夏商时期的古蜀文明，是中国乃至世界重要的古文化遗址，出土了大量青铜器、金器、象牙等珍贵文物，证明古蜀文明与中原文明并存发展。',knowledge:'历史·夏商·三星堆'},
  {cat:'history',type:'single',text:'商朝开国君主是谁？亡国君主是谁？',
   options:['A. 开国：禹，亡国：桀','B. 开国：汤，亡国：纣','C. 开国：文王，亡国：幽王','D. 开国：汤，亡国：桀'],
   answer:'B',explanation:'商朝：开国君主是汤（推翻夏桀），亡国君主是纣王（被周武王所灭）。夏朝：开国禹/启，亡国桀；西周：开国周武王（周文王之子），亡国周幽王（烽火戏诸侯）。',knowledge:'历史·朝代开亡国君主'},
  {cat:'history',type:'single',text:'历史上著名的暴君"桀、纣、炀、幽"中，"炀"指的是哪位皇帝？',
   options:['A. 隋文帝杨坚','B. 隋炀帝杨广','C. 秦二世胡亥','D. 周厉王姬胡'],
   answer:'B',explanation:'历史上著名的四大暴君：桀（夏朝亡国君）、商纣王、隋炀帝杨广、周幽王。隋炀帝杨广虽然暴政，但也有功绩：兴科举、修运河、打破了世家大族的垄断。其父隋文帝杨坚开创"开皇之治"。',knowledge:'历史·历代暴君'},
  {cat:'history',type:'single',text:'下列关于西周"分封制"的说法，正确的是？',
   options:['A. 分封制即将天下土地按地形分配给百姓','B. 被封的诸侯称为"郡主"，享有土地和人口','C. 分封制的弊端是时间越久血缘越淡薄，导致诸侯势力做大','D. 分封制与宗法制没有关联'],
   answer:'C',explanation:'西周分封制将天下土地分封给有功之臣及子女，被封者如郡主等享有封地的统治权。其弊端：时间越久，与周天子血缘越淡薄，诸侯势力逐渐做大，最终导致东周衰落、春秋战国乱世。',knowledge:'历史·西周·分封制'},

  // ── 历史补充：春秋战国 ──
  {cat:'history',type:'single',text:'"兼爱非攻"是哪个学派的核心主张？',
   options:['A. 儒家','B. 道家','C. 法家','D. 墨家'],
   answer:'D',explanation:'墨家创始人墨子，核心主张是"兼爱非攻"（普遍互爱、反对战争）。儒家：仁义礼智信；道家：老子，无为而治；法家：以法治国，代表人物韩非、商鞅、李斯。',knowledge:'历史·春秋战国·百家争鸣'},
  {cat:'history',type:'single',text:'法家的代表著作《韩非子》的作者是谁？他的老师是谁？',
   options:['A. 商鞅，孔子','B. 韩非，荀子','C. 李斯，韩非','D. 韩非，老子'],
   answer:'B',explanation:'《韩非子》作者是韩非，他的老师是荀子（性恶论）。法家代表人物还有商鞅（辅佐秦孝公变法，徙木立信）和李斯（辅佐嬴政）。法家主张依法治国，天子犯法与庶民同罪。',knowledge:'历史·春秋战国·法家'},
  {cat:'history',type:'judge',text:'《三十六计》中"第一计"是"瞒天过海"，"最后一计"是"走为上策"。',
   options:['正确','错误'],answer:'正确',
   explanation:'《三十六计》：第一计是"瞒天过海"，最后（第三十六计）是"走为上策"。兵法家孙膑的老师是鬼谷子，马陵之战中孙膑用"减灶计"杀庞涓；诸葛亮北伐撤退也用了同样计谋。',knowledge:'历史·兵法·三十六计'},
  {cat:'history',type:'single',text:'《楚辞》代表作《离骚》的作者及其诗歌风格是？',
   options:['A. 孔子，现实主义','B. 屈原，浪漫主义','C. 庄子，浪漫主义','D. 屈原，现实主义'],
   answer:'B',explanation:'《楚辞》是浪漫主义诗歌的代表，《离骚》作者是屈原（诗魂）；《诗经》是现实主义诗歌总集，305首；屈原还著有《天问》（对星象研究，"天问一号"的来源）和《九歌》（曲）。',knowledge:'历史·文学·楚辞'},

  // ── 历史补充：秦朝 ──
  {cat:'history',type:'single',text:'秦朝"三公九卿制度"中，负责监察百官的是？',
   options:['A. 丞相','B. 太尉','C. 御史大夫','D. 廷尉'],
   answer:'C',explanation:'三公职责：丞相是"百官之长"，负责行政；太尉负责军事（但为虚职）；御史大夫负责监察。三公九卿制是秦朝的中央行政制度，后演变为唐朝三省六部制。',knowledge:'历史·秦朝·三公九卿'},
  {cat:'history',type:'single',text:'"沙丘之变"是中国历史上第一个臣弑君的政变，参与者是？',
   options:['A. 李斯与韩信','B. 李斯与赵高','C. 赵高与扶苏','D. 王翦与蒙恬'],
   answer:'B',explanation:'沙丘之变：秦始皇死后，李斯与赵高密谋篡改遗诏，扶植胡亥（秦二世）继位，赐死长公子扶苏。这是历史上第一个臣弑君（操控君主废立）的政变。',knowledge:'历史·秦朝·沙丘之变'},
  {cat:'history',type:'judge',text:'秦朝统一货币为圆形方孔钱，汉代称"五铢钱"。',
   options:['正确','错误'],answer:'正确',
   explanation:'秦始皇统一货币，铸造圆形方孔钱；汉代流通的是"五铢钱"，铸有"五铢"二字。秦朝还统一了度量衡（度=尺寸，量=容积，衡=重量）和文字（小篆，由李斯主持）。',knowledge:'历史·秦朝·统一货币'},
  {cat:'history',type:'single',text:'"焚书坑儒"发生于哪个朝代？儒学后来复兴于哪个时期？',
   options:['A. 西汉，东汉光武帝时期','B. 秦朝，西汉汉武帝时期','C. 秦朝，东汉明帝时期','D. 西汉，唐太宗时期'],
   answer:'B',explanation:'"焚书坑儒"发生于秦朝（秦始皇），是儒学第一次被打压。儒学后来复兴于西汉汉武帝时期，董仲舒提出"罢黜百家，独尊儒术"，儒学从此成为封建统治的官方意识形态。',knowledge:'历史·秦汉·儒学兴衰'},

  // ── 历史补充：汉朝 ──
  {cat:'history',type:'single',text:'汉武帝时期，以下哪位武将"封狼居胥"，远征漠北？',
   options:['A. 李广','B. 卫青','C. 霍去病','D. 班超'],
   answer:'C',explanation:'霍去病远征漠北，封狼居胥（古代对武将最高的称谓）；卫青是大将军；李广镇守大汉西域40年，因"李广难封"而遗憾，被称为"飞将"。"但使龙城飞将在"指的就是李广。',knowledge:'历史·西汉·名将'},
  {cat:'history',type:'single',text:'"察举制"和"九品中正制"的主要弊端分别是什么？',
   options:['A. 前者花钱买官，后者上品无寒门下品无氏族','B. 前者下品无氏族，后者花钱买官','C. 两者都是科举制的前身，公平合理','D. 前者只看才能，后者只看门第'],
   answer:'A',explanation:'察举制（汉武帝）：名义上推举贤才，实为"察秀才不识书，举孝廉父别居"，出现花钱买官的腐败现象；九品中正制（魏晋）：按家世评定品级，导致"上品无寒门，下品无氏族"的门阀垄断现象。',knowledge:'历史·汉魏·选官制度'},
  {cat:'history',type:'single',text:'海上丝绸之路的鼎盛时期是？',
   options:['A. 秦汉时期','B. 隋唐时期','C. 元朝时期','D. 明清时期'],
   answer:'C',explanation:'海上丝绸之路：起源于春秋战国，发展于隋唐，鼎盛于元朝，转变于明清（明清闭关锁国导致衰落）。陆上丝绸之路：张骞（西汉）开辟，班超（东汉）重开。',knowledge:'历史·海上丝绸之路'},
  {cat:'history',type:'judge',text:'东汉光武帝刘秀中兴汉室，史称"文景之治"。',
   options:['正确','错误'],answer:'错误',
   explanation:'"文景之治"指的是西汉汉文帝和汉景帝时期推行"无为而治"带来的盛世；东汉光武帝刘秀（被称为"位面之子"）中兴汉室，史称"光武中兴"，两者不能混淆。',knowledge:'历史·汉朝·光武中兴'},
  {cat:'history',type:'single',text:'"建安风骨"是指哪三位文学家的创作风格？',
   options:['A. 苏轼、苏洵、苏辙','B. 曹操、曹丕、曹植','C. 嵇康、阮籍、阮咸','D. 孔融、陈琳、王粲'],
   answer:'B',explanation:'"建安风骨"（建安文学）的代表是曹操、曹丕、曹植父子三人（"三曹"）；"竹林七贤"：嵇康、阮籍、阮咸、山涛、向秀、刘伶、王戎；"建安七子"：孔融、陈琳、王粲、徐干、阮瑀、应玚、刘祯。',knowledge:'历史·三国·建安文学'},
  {cat:'history',type:'single',text:'《孔雀东南飞》和《木兰辞》合称"乐府双璧"，其中《木兰辞》的历史意义是？',
   options:['A. 中国最早的叙事长诗','B. 古代抨击男尊女卑的第一著作','C. 中国最早的爱情诗','D. 第一部现实主义文学作品'],
   answer:'B',explanation:'"乐府双璧"：《孔雀东南飞》是我国古代最长的叙事诗（汉乐府）；《木兰辞》（木兰诗）是古代抨击男尊女卑的第一著作，讲述花木兰替父从军的故事，体现了对女性的尊重。',knowledge:'历史·文学·乐府双璧'},

  // ── 历史补充：唐宋 ──
  {cat:'history',type:'single',text:'唐朝"三省六部制"中，负责起草诏令的是哪个省？',
   options:['A. 尚书省','B. 门下省','C. 中书省','D. 御史台'],
   answer:'C',explanation:'三省六部制：中书省（起草诏令）→门下省（审核）→尚书省（执行）。六部：吏、户、礼、兵、刑、工。这是唐朝完善的中央行政制度，有效防止了权力集中，也是中国古代官制的重要创新。',knowledge:'历史·唐朝·三省六部制'},
  {cat:'history',type:'single',text:'唐代诗人"王孟"指的是？',
   options:['A. 王勃和孟郊','B. 王维和孟浩然','C. 王昌龄和孟郊','D. 王之涣和孟浩然'],
   answer:'B',explanation:'唐诗组合："王孟"=王维（诗佛）+孟浩然，均为山水田园派；"大李杜"=李白+杜甫；"小李杜"=李商隐+杜牧；"初唐四杰"=王勃、卢照邻、杨炯、骆宾王；"孤篇盖全唐"=张若虚《春江花月夜》。',knowledge:'历史·唐朝·诗人组合'},
  {cat:'history',type:'single',text:'"孤篇盖全唐"是对哪首诗的评价？作者是谁？',
   options:['A. 《将进酒》，李白','B. 《春江花月夜》，张若虚','C. 《长恨歌》，白居易','D. 《静夜思》，李白'],
   answer:'B',explanation:'"孤篇盖全唐"是对张若虚《春江花月夜》的高度评价，意为这一首诗可以盖过整个唐朝诗作。张若虚是初唐诗人，此诗被誉为"诗中的诗，顶峰上的顶峰"。',knowledge:'历史·唐朝·孤篇盖全唐'},
  {cat:'history',type:'judge',text:'宋朝陈桥兵变中，赵匡胤"黄袍加身"后，采取"杯酒释兵权"削弱武将权力，开创了文官当政的局面。',
   options:['正确','错误'],answer:'正确',
   explanation:'宋朝开国：赵匡胤通过"陈桥兵变、黄袍加身"夺得政权，建立宋朝后，以"杯酒释兵权"削弱武将权力，推行文官当政，这也导致宋朝重文轻武，军事实力相对薄弱。',knowledge:'历史·宋朝·陈桥兵变'},
  {cat:'history',type:'single',text:'宋朝豪放派词人中，"现存诗集最多"的是哪位？',
   options:['A. 苏轼','B. 辛弃疾','C. 陆游','D. 岳飞'],
   answer:'C',explanation:'豪放派代表：苏轼、辛弃疾、陆游（现存诗集最多）、岳飞（字鹏举，《满江红》）；婉约派代表：柳永（词）、李清照（"三瘦"：人比黄花瘦、应是绿肥红瘦、新来瘦）；"济南二安"：辛弃疾（字幼安）、李清照（号易安）。',knowledge:'历史·宋朝·词人'},
  {cat:'history',type:'single',text:'行省制度（省级行政区划）是哪个朝代建立的？',
   options:['A. 秦朝','B. 唐朝','C. 元朝','D. 明朝'],
   answer:'C',explanation:'元朝建立了行省制度，是中国古代省级行政区的最早划分（依地形、河流、山脉走向划分）。秦朝建立郡县制（县级行政区最早划分）；唐朝有道、州、县三级制；元朝还设立宣政院正式管辖西藏。',knowledge:'历史·元朝·行省制度'},
  {cat:'history',type:'single',text:'"唐宋八大家"不包括以下哪位？',
   options:['A. 韩愈','B. 柳宗元','C. 欧阳修','D. 李白'],
   answer:'D',explanation:'唐宋八大家：韩愈、柳宗元（唐）、欧阳修、苏轼、苏洵、苏辙、王安石、曾巩（宋）。李白是唐代著名诗人（诗仙），但不属于唐宋八大家（八大家均以散文著称）。',knowledge:'历史·文学·唐宋八大家'},
  {cat:'history',type:'judge',text:'玄奘西行天竺求经，鉴真东渡日本传播佛法，两人都是唐朝著名高僧。',
   options:['正确','错误'],answer:'正确',
   explanation:'玄奘（唐朝）西行天竺（古印度）取经，带回大量佛经，促进了中印文化交流；鉴真（唐朝）六次东渡日本，传播佛法和中国文化，为中日文化交流做出重大贡献。两人都是唐朝的文化使者。',knowledge:'历史·唐朝·中外交流'},

  // ── 科技补充：科学家 ──
  {cat:'science',type:'single',text:'以下哪位科学家著有《自然哲学的数学原理》？',
   options:['A. 爱因斯坦','B. 牛顿','C. 伽利略','D. 开普勒'],
   answer:'B',explanation:'牛顿的主要贡献：《自然哲学的数学原理》、万有引力定律、牛顿三定律、微积分。阿基米德、高斯、牛顿并称世界三大数学家。注意：自由落体是伽利略研究的，不要与牛顿混淆。',knowledge:'科技·科学家·牛顿'},
  {cat:'science',type:'single',text:'"天空的立法者"的称号属于哪位科学家？他的主要贡献是？',
   options:['A. 哥白尼，提出日心说','B. 开普勒，提出行星运动三大定律','C. 伽利略，发明望远镜','D. 布鲁诺，批判宗教神学'],
   answer:'B',explanation:'开普勒被称为"天空的立法者"，提出行星运动三大定律：轨道定律、面积定律、周期定律。哥白尼提出日心说（《天体运动论》）；布鲁诺是"西方批判宗教神学第一人"；富兰克林发明了避雷针。',knowledge:'科技·科学家·开普勒'},
  {cat:'science',type:'single',text:'"现代化学之父"是谁？他推翻了什么理论？',
   options:['A. 道尔顿，推翻燃烧素说','B. 拉瓦锡，推翻燃素说','C. 孟德尔，推翻进化论','D. 道尔顿，发现原子论'],
   answer:'B',explanation:'拉瓦锡是"现代化学之父"，推翻了"燃素说"，提出燃烧三要素：可燃物、助燃物（氧气）、着火点；道尔顿是"近代化学之父"，发现了色盲症；孟德尔是"遗传学之父"，通过豌豆实验发现遗传规律。',knowledge:'科技·科学家·拉瓦锡'},
  {cat:'science',type:'single',text:'阿基米德的主要贡献不包括以下哪项？',
   options:['A. 浮力定律（金王冠）','B. 光的反射（战船）','C. 杠杆原理','D. 发现电磁感应'],
   answer:'D',explanation:'阿基米德的主要贡献：浮力定律（金王冠的故事）、光的反射（用镜子聚光烧毁战船）、杠杆原理（"给我一个支点，我能撬动地球"）。阿基米德、高斯、牛顿并称世界三大数学家。发现电磁感应的是法拉第。',knowledge:'科技·科学家·阿基米德'},
  {cat:'science',type:'judge',text:'霍金的主要理论贡献是黑洞理论，中国首次拍摄到黑洞照片。',
   options:['正确','错误'],answer:'正确',
   explanation:'霍金被称为"宇宙之王"，主要贡献是黑洞理论（霍金辐射）。中国参与的国际合作天文团队首次拍摄到黑洞照片。普朗克提出"量子理论"；赫兹于1887-1888年证实了电磁波的存在（频率单位Hz以其命名）。',knowledge:'科技·科学家·霍金'},

  // ── 科技补充：物理 ──
  {cat:'science',type:'judge',text:'大气压随着海拔高度的升高而降低，这就是为什么高原地区气压低、水的沸点低。',
   options:['正确','错误'],answer:'正确',
   explanation:'大气压是大气产生的压强，随高度升高而降低。所以高原地区（如西藏）气压低，水的沸点低于100℃，需要用高压锅才能将食物煮熟。日常生活中"增大压力并减小受力面积"可以增大压强。',knowledge:'科技·物理·气压'},
  {cat:'science',type:'single',text:'"升华"是指固态直接变为气态，以下哪个现象属于升华？',
   options:['A. 食物冒白气','B. 烧开水冒蒸气','C. 灯丝变细','D. 雾凇形成'],
   answer:'C',explanation:'升华（固→气，吸热）：灯丝变细（钨升华）；凝华（气→固，放热）：雾凇、灯丝变黑；液化（气→液，放热）：食物冒白气、水蒸气凝结；汽化（液→气，吸热）：烧开水、加油站不使用手机（防静电引燃挥发气体）。',knowledge:'科技·物理·物态变化'},
  {cat:'science',type:'single',text:'以下哪种现象利用的是光的折射原理？',
   options:['A. 手电筒光柱','B. 镜子照人','C. 小孔成像','D. 海市蜃楼'],
   answer:'D',explanation:'光的折射：凹凸透镜、水中筷子弯折、水中鱼看上去比实际浅（"潭清疑水浅"）、海市蜃楼（海陆热力性质差异）、彩虹。光的直线传播：手电筒光柱、影子、小孔成像、日食月食；镜面反射：镜子、潜望镜。',knowledge:'科技·物理·光学原理'},
  {cat:'science',type:'single',text:'"光导纤维"利用的是光的什么原理？',
   options:['A. 光的直线传播','B. 镜面反射','C. 全反射','D. 光的散射'],
   answer:'C',explanation:'光导纤维利用的是光的全反射原理；丁达尔效应（光在胶体中散射，如雾天光线）利用的是光的散射；彩虹利用折射和色散；潜望镜利用镜面反射；手电筒利用光的直线传播。',knowledge:'科技·物理·光导纤维'},
  {cat:'science',type:'judge',text:'"热胀冷缩"是自然界的普遍规律，没有例外。',
   options:['正确','错误'],answer:'错误',
   explanation:'自然界中热胀冷缩是普遍规律，但"水"是唯一的反例：水在4℃时密度最大，0℃～4℃范围内会"冷胀热缩"（反常膨胀）。实际应用：路面留空隙、电线下垂弧度、杯中倒热水需预热防炸、鸡蛋过冷水更易剥壳。',knowledge:'科技·物理·热胀冷缩'},
  {cat:'science',type:'single',text:'"月光下的水坑"，迎着月亮看时呈现的景象是？',
   options:['A. 亮水暗地','B. 亮地暗水','C. 水地都亮','D. 水地都暗'],
   answer:'A',explanation:'镜面反射的规律：月光下，迎着月亮看——亮水暗地（水坑如镜，直接反射月光，显得亮）；背着月亮看——亮地暗水（地面漫反射，水坑因镜面反射不朝你，显得暗）。这是常考的生活物理现象。',knowledge:'科技·物理·镜面反射'},
  {cat:'science',type:'single',text:'"回声"现象的著名建筑代表是？',
   options:['A. 故宫太和殿','B. 北京天坛','C. 长城','D. 圆明园'],
   answer:'B',explanation:'北京天坛是著名的回声建筑代表，其圜丘、回音壁等建筑利用了声音的反射原理产生独特回声效果。此外，"酒香不怕巷子深"描述的是分子运动（扩散），温度越高运动越剧烈。',knowledge:'科技·物理·声学·回声'},

  // ── 科技补充：化学 ──
  {cat:'science',type:'single',text:'关于水（H₂O），以下说法正确的是？',
   options:['A. 硬水比软水洗澡更容易起泡沫','B. 将水烧沸是最常见的硬水软化方式','C. 蒸馏水是硬水','D. 海水是软水'],
   answer:'B',explanation:'软水和硬水的区分方法：洗澡时软水出泡沫多，硬水出泡沫少（含矿物质多）。将水煮沸是最常见的硬水软化方式（矿物质沉淀析出）。日常饮用的自来水多为硬水，蒸馏水为纯软水。',knowledge:'科技·化学·软水硬水'},
  {cat:'science',type:'single',text:'关于铅笔的说法，正确的是？',
   options:['A. 铅笔芯是铅做的','B. 铅笔芯由石墨和粘土组成，"H"越大越硬','C. 铅笔芯由石墨和橡胶组成','D. "B"越大铅笔越硬'],
   answer:'B',explanation:'"铅笔不含铅"——铅笔芯由石墨和粘土组成。H表示铅笔的硬度（Hard），H数字越大越硬、颜色越浅；B表示铅笔的质软程度（Black），B数字越大越软、颜色越深。6H最硬，8B最软。',knowledge:'科技·化学·铅笔'},
  {cat:'science',type:'judge',text:'二氧化碳的固态形式是干冰，常用于舞台烟雾效果和人工降雨。',
   options:['正确','错误'],answer:'正确',
   explanation:'二氧化碳（CO₂）固态为干冰，升华时吸收大量热并产生大量白雾，常用于舞台效果、人工降雨、保鲜冷藏。实验室检验CO₂的方法：向澄清石灰水通入CO₂，石灰水变混浊；继续通入，又变清澈。',knowledge:'科技·化学·二氧化碳'},
  {cat:'science',type:'single',text:'臭氧（O₃）的主要作用和分布特点是？',
   options:['A. 无毒，主要分布在赤道附近','B. 有毒，可吸收紫外线，主要在南北极和青藏高原出现空洞','C. 无毒，可以吸收红外线','D. 有毒，主要分布在城市上空'],
   answer:'B',explanation:'臭氧层：有毒（高浓度）、能吸收紫外线（保护地球生物）；臭氧空洞主要出现在南北极和青藏高原上空，由人类排放的氟利昂等物质破坏所致，是当今重要的环保问题。',knowledge:'科技·化学·臭氧层'},
  {cat:'science',type:'single',text:'"钛金属"被称为什么，主要用途是？',
   options:['A. "太空金属"，与人体契合度最高，多用于人体支架','B. "海洋金属"，主要用于船舶制造','C. "生命金属"，主要用于医药','D. "未来金属"，主要用于航空发动机'],
   answer:'A',explanation:'钛（Ti）被称为"太空金属"，因为它与人体的契合度最高，不会产生排斥反应，常用于人体骨骼支架、人工关节等医疗器械，同时也广泛用于航空航天领域。',knowledge:'科技·化学·钛'},
  {cat:'science',type:'single',text:'不锈钢的定义是指含多少铬的合金钢？',
   options:['A. 含铬量在5%～10%之间','B. 含铬量在12%～30%之间','C. 含铬量超过50%','D. 含铁量在12%～30%之间'],
   answer:'B',explanation:'不锈钢是指含铬（Cr）量在12%～30%之间的合金钢，铬的存在使钢材表面形成致密的氧化膜，防止生锈。另外：钢比铁更硬；铁比钢更韧；冬天时钢更"脆"。',knowledge:'科技·化学·不锈钢'},
  {cat:'science',type:'single',text:'铜是人类最早使用的金属，纯铜的颜色是？',
   options:['A. 黄色','B. 银白色','C. 紫红色','D. 金色'],
   answer:'C',explanation:'纯铜（Cu）呈紫红色，又称"紫铜"或"红铜"，具有极强的导热性和导电性，是人类最早使用的金属。商朝是青铜时代（铜锡铅合金）。三元合金包括：锡、铅、铝，或铜、铅、锡。',knowledge:'科技·化学·铜'},
  {cat:'science',type:'single',text:'亚硝酸钠主要存在于哪类食物中？每日摄入量不超过多少（中国标准）？',
   options:['A. 新鲜蔬菜，100mg','B. 腌制物和熏制食物，200mg','C. 油炸食物，500mg','D. 乳制品，50mg'],
   answer:'B',explanation:'亚硝酸钠（NaNO₂）在腌制物和熏制食物中含量较高，含有致癌物质。中国标准每日摄入不超过200mg，国际标准为50mg。维生素C可以有效抑制亚硝胺的产生，吃腌制食物时补充维生素C有一定保护作用。',knowledge:'科技·化学·食品安全'},
  {cat:'science',type:'judge',text:'乙醇（酒精）对人体肝脏影响最大，因为肝脏是唯一可再生的人体器官。',
   options:['正确','错误'],answer:'正确',
   explanation:'乙醇（酒精）：易燃、易挥发的无色透明液体；对人体肝脏影响最大，肝脏是人体唯一可再生的器官；对胃的直接影响较大。注意：重度醉酒后不可饮浓茶、不可立刻洗澡（防血液循环异常）。',knowledge:'科技·化学·乙醇'},
  {cat:'science',type:'single',text:'"卤水点豆腐"属于物理变化还是化学变化？',
   options:['A. 化学变化，因为产生了新物质豆腐','B. 物理变化，因为没有产生新物质','C. 既是物理变化也是化学变化','D. 纯物理变化，与化学无关'],
   answer:'B',explanation:'物理变化：不产生新物质，如"卤水点豆腐"（蛋白质凝固，物质成分不变）；化学变化：a+b=新物质。判断依据：是否有新物质生成。记忆口诀：物理变化=ab+cd=ac+bd；化学变化=a+b=新物质。',knowledge:'科技·化学·物理化学变化'},
  {cat:'science',type:'single',text:'植物缺氮、磷、钾的表现分别是？',
   options:['A. 叶黄/倒伏/病虫害','B. 倒伏/叶黄/病虫害','C. 病虫害/叶黄/倒伏','D. 叶黄/病虫害/倒伏'],
   answer:'A',explanation:'植物"三要素"氮磷钾的缺素表现：缺氮→叶黄（补充氮肥：大豆泡水）；缺磷→倒伏（补充磷肥：大米水）；缺钾→病虫害（补充钾肥：香蕉碎）。氮+磷+钾=尿素（主要肥料成分）。',knowledge:'科技·化学·植物营养'},

  // ── 科技补充：生物 ──
  {cat:'science',type:'single',text:'人体消化道中，最长的部分是？',
   options:['A. 大肠','B. 小肠','C. 食道','D. 胃'],
   answer:'B',explanation:'消化道：口腔→咽→食道→胃→小肠→大肠→肛门。其中小肠最长，是人体身高的3.12倍（约6-7米），是消化吸收的主要场所。消化腺包括：唾液腺、胰腺、肝脏、胃腺和肠腺。',knowledge:'科技·生物·消化系统'},
  {cat:'science',type:'judge',text:'"膝跳反射"是先天性非条件反射，"巴甫洛夫的狗"是后天训练形成的条件反射。',
   options:['正确','错误'],answer:'正确',
   explanation:'非条件反射：先天生来就有，如膝跳反射（叩击膝盖腱部自动抬腿）、缩手反射等；条件反射：后天通过训练强化形成，如"巴甫洛夫的狗"（铃声→流口水），是俄国生理学家巴甫洛夫发现的。',knowledge:'科技·生物·反射'},
  {cat:'science',type:'single',text:'关于血型，以下说法正确的是？',
   options:['A. A型血是"万能输血者"','B. O型血可以接受任何血型的输血','C. AB型血是"万能受血者"，可接受任何血型','D. B型血只能输给AB型'],
   answer:'C',explanation:'血型规律：O型血是"万能输血者"，可以给任何血型输血；AB型血是"万能受血者"，可以接受任何血型的输血。血细胞：红细胞（携氧，缺乏→贫血）；白细胞（免疫，缺乏→白血病）；血小板（止血，缺乏→血友病）。',knowledge:'科技·生物·血型'},
  {cat:'science',type:'single',text:'Ⅰ型糖尿病和Ⅱ型糖尿病的主要治疗方式分别是？',
   options:['A. 前者打胰岛素，后者用二甲双胍','B. 前者用二甲双胍，后者打胰岛素','C. 两者都打胰岛素','D. 两者都用二甲双胍'],
   answer:'A',explanation:'Ⅰ型糖尿病：胰腺完全丧失功能，无法产生胰岛素，需要每天注射胰岛素治疗；Ⅱ型糖尿病：胰腺丧失部分功能，可用药物二甲双胍促进胰岛素分泌或提高胰岛素敏感性来治疗。',knowledge:'科技·生物·糖尿病'},
  {cat:'science',type:'single',text:'"地球之肺""地球之心""地球之肾"分别指什么？',
   options:['A. 雨林/海洋/湿地','B. 海洋/雨林/湿地','C. 湿地/雨林/海洋','D. 雨林/湿地/海洋'],
   answer:'A',explanation:'生态系统美誉：地球之肺→热带雨林（吸收CO₂、释放O₂）；地球之心→海洋（调节气候、循环物质）；地球之肾→湿地（净化水质、调节水量）。这三类生态系统是地球最重要的生态屏障。',knowledge:'科技·生物·生态系统'},

  // ── 科技补充：高新技术 ──
  {cat:'science',type:'single',text:'算盘和计算机的进制分别是？',
   options:['A. 算盘十进制，计算机十进制','B. 算盘五升十进制，计算机二进制','C. 算盘二进制，计算机十六进制','D. 算盘十进制，计算机八进制'],
   answer:'B',explanation:'算盘采用五升十进制（每档上珠代表5，下珠代表1，满十进一）；计算机采用二进制（只有0和1两个数字）。控制器是CPU（中央处理器）；存储器分内存（ROM，只读）和外存（RAM，可读写）。',knowledge:'科技·计算机·进制'},
  {cat:'science',type:'judge',text:'计算机病毒是一种具有破坏性的程序代码，而不是真正的生物病毒。',
   options:['正确','错误'],answer:'正确',
   explanation:'计算机病毒是一种人为编写的具有破坏性的程序代码，能自我复制并感染其他程序。它不是真正的生物病毒，而是恶意软件的一种。云计算的存储中心在中国贵州。',knowledge:'科技·计算机·病毒'},
  {cat:'science',type:'single',text:'核裂变和核聚变的主要区别及应用是？',
   options:['A. 核裂变制氢弹，核聚变发电','B. 核裂变铀发电，核聚变制氢弹','C. 两者都用于发电','D. 两者都用于制造武器'],
   answer:'B',explanation:'核裂变：重核（铀）分裂释放能量，应用于核电站发电（可控）和原子弹（不可控）；核聚变：轻核（氘氚）合并释放能量，是氢弹的原理（目前不可控），也是太阳能量的来源，人工可控核聚变是未来清洁能源方向。',knowledge:'科技·高新技术·核能'},
  {cat:'science',type:'single',text:'中国四大航天发射基地中，主要承担"拉人"（载人航天）任务的是哪个？',
   options:['A. 文昌','B. 太原','C. 西昌','D. 酒泉'],
   answer:'D',explanation:'四大航天发射基地分工：酒泉——"拉人"（载人航天、飞船发射）；文昌——"拉货"（重型运载火箭、空间站货运）；太原、西昌——"搞科研"（各类卫星发射）。这是考试常考的知识点。',knowledge:'科技·航天·发射基地'},
  {cat:'science',type:'single',text:'能源分为一次能源和二次能源，以下属于二次能源的是？',
   options:['A. 煤炭','B. 石油','C. 电能','D. 天然气'],
   answer:'C',explanation:'一次能源：自然界直接存在、可直接使用的能源，如煤炭、石油、天然气、水能、风能、太阳能等；二次能源：一次能源加工转化后的能源，如电能、汽油、焦炭等，"一次拿来直接用，二次拿来用不了（需加工）"。',knowledge:'科技·高新技术·能源分类'},

  {cat:'policy',type:'single',text:'2026年中央一号文件关于农业农村现代化，下列说法错误的有几项？①取消种粮农民收益保障机制②允许在永久基本农田上建设乡村旅游民宿③强调学习运用"千万工程"经验④健全联农带农机制拓展农民增收渠道⑤将农村完全复制城市建设模式',options:['A. 2项','B. 3项','C. 4项','D. 5项'],answer:'B',explanation:'①②⑤均为错误说法：文件要求保持种粮农民收益保障机制；永久基本农田禁止建设民宿等非农设施；农村建设要保留乡村特色而非完全复制城市。③④均为正确说法。错误项共3项。',knowledge:'时政·一号文件·乡村振兴'},

  {cat:'policy',type:'single',text:'2026年中央一号文件指出，要加力实施：',options:['A. 新一轮百亿斤粮食产能提升行动','B. 新一轮千亿斤粮食产能提升行动','C. 新一轮万亿斤粮食产能提升行动','D. 新一轮十亿斤粮食产能提升行动'],answer:'B',explanation:'文件明确提出要加力实施新一轮千亿斤粮食产能提升行动，这是保障国家粮食安全的重大战略部署。',knowledge:'时政·一号文件·粮食产能'},
  {cat:'policy',type:'single',text:'2026年中央一号文件明确，要学习运用的经验是：',options:['A. "枫桥经验"','B. "浦江经验"','C. "晋江经验"','D. "千万工程"经验'],answer:'D',explanation:'"千万工程"是习近平同志在浙江工作期间亲自谋划的重大工程，文件明确要求学习运用"千万工程"经验推进乡村建设。',knowledge:'时政·一号文件·千万工程'},
  {cat:'policy',type:'single',text:'2026年中央一号文件关于防止返贫，2026年起进入：',options:['A. 过渡期最后一年','B. 常态化帮扶阶段','C. 全面取消帮扶阶段','D. 城市反哺农村阶段'],answer:'B',explanation:'2026年是巩固脱贫成果与乡村振兴有效衔接过渡期结束后，进入常态化帮扶阶段的开局之年，要建立健全防止返贫致贫长效机制。',knowledge:'时政·一号文件·防止返贫'},
  {cat:'policy',type:'single',text:'2026年中央一号文件提出，要推进生物育种：',options:['A. 限制化','B. 小范围试点','C. 产业化','D. 暂停实施'],answer:'C',explanation:'文件明确提出要推进生物育种产业化，加快培育推广优质高产良种，提升粮食产能。',knowledge:'时政·一号文件·种业振兴'},
  {cat:'policy',type:'single',text:'2026年中央一号文件在耕地保护方面要求严查：',options:['A. 农产品价格波动','B. 农村乱占耕地建房','C. 农民外出务工','D. 农村电商发展'],answer:'B',explanation:'文件强调严查乱占耕地建房行为，坚决遏制耕地"非农化"、防止"非粮化"，守住18亿亩耕地红线。',knowledge:'时政·一号文件·耕地保护'},
  {cat:'policy',type:'single',text:'2026年中央一号文件关于农业科技，鼓励拓展的应用场景不包括：',options:['A. 无人机','B. 物联网','C. 机器人','D. 虚拟货币'],answer:'D',explanation:'文件鼓励无人机、物联网、机器人、人工智能等现代技术在农业中应用，但虚拟货币与农业科技无关，且国家对其实施严格监管。',knowledge:'时政·一号文件·农业科技'},
  {cat:'policy',type:'single',text:'2026年中央一号文件强调，要守住的底线是：',options:['A. 不发生规模性返贫致贫','B. 不发生农村人口外流','C. 不发生农产品出口下降','D. 不发生农业机械化率降低'],answer:'A',explanation:'文件明确提出要守住不发生规模性返贫致贫的底线，这是巩固脱贫攻坚成果、推进乡村振兴的基本要求。',knowledge:'时政·一号文件·底线思维'},
  {cat:'policy',type:'single',text:'2026年中央一号文件关于乡村建设指出不能：',options:['A. 改善中心村生活条件','B. 科学配置资源','C. 把农村建设得跟城市一样','D. 推进污水治理'],answer:'C',explanation:'文件强调乡村建设要保留乡村特色风貌，不能把农村建设得跟城市一模一样，要体现乡土文化特色，实现宜居宜业和美乡村。',knowledge:'时政·一号文件·乡村建设'},
  {cat:'policy',type:'single',text:'2026年中央一号文件提出，要分层分类帮扶：',options:['A. 所有城市社区','B. 欠发达地区','C. 高收入农户','D. 外资农业企业'],answer:'B',explanation:'文件明确提出要分层分类帮扶国家和省级乡村振兴重点帮扶县，聚焦欠发达地区，加大倾斜支持力度。',knowledge:'时政·一号文件·帮扶政策'},
  {cat:'policy',type:'single',text:'2026年中央一号文件关于土地承包，目前正有序推进：',options:['A. 第二轮到期后再延长十五年试点','B. 第二轮到期后再延长三十年试点','C. 第三轮承包全面启动','D. 土地私有化改革'],answer:'B',explanation:'文件明确推进第二轮土地承包到期后再延长三十年整省试点，保持农村土地承包关系稳定并长久不变。',knowledge:'时政·一号文件·土地改革'},
  {cat:'policy',type:'single',text:'2026年中央一号文件要求，对帮扶对象实行：',options:['A. 终身固定身份','B. 动态进出管理','C. 一次性补助后退出','D. 全部转为低保户'],answer:'B',explanation:'文件要求对帮扶对象实行动态进出管理，根据农户实际情况及时纳入或退出帮扶名单，防止"一刀切"。',knowledge:'时政·一号文件·帮扶管理'},
  {cat:'policy',type:'single',text:'2026年中央一号文件关于农民增收主渠道强调：',options:['A. 发展产业和稳定就业','B. 依赖政府救济','C. 减少农业生产','D. 鼓励非法集资'],answer:'A',explanation:'文件强调农民增收要以发展产业和稳定就业为主渠道，拓展农民多元增收途径，提高各类收入。',knowledge:'时政·一号文件·农民增收'},
  {cat:'policy',type:'single',text:'2026年中央一号文件指出，"三农"向好，则：',options:['A. 全局被动','B. 全局主动','C. 城市衰退','D. 外贸受阻'],answer:'B',explanation:'文件指出"三农"向好，则全局主动，深刻阐明了农业农村现代化对于中国式现代化全局的战略意义。',knowledge:'时政·一号文件·战略定位'},
  {cat:'policy',type:'single',text:'2026年中央一号文件提及，2025年我国粮食产量达到：',options:['A. 1.2万亿斤','B. 1.3万亿斤','C. 1.4298万亿斤','D. 1.6万亿斤'],answer:'C',explanation:'2025年我国粮食产量达到1.4298万亿斤，再创历史新高，为保障国家粮食安全奠定坚实基础。',knowledge:'时政·一号文件·粮食产量'},
  {cat:'policy',type:'single',text:'2026年中央一号文件强调，要推动：',options:['A. 城乡割裂发展','B. 城乡融合发展','C. 农村向城市单向输血','D. 取消农村户籍'],answer:'B',explanation:'文件强调推动城乡融合发展，破除城乡二元结构，促进城乡要素双向流动，实现城乡共同繁荣。',knowledge:'时政·一号文件·城乡融合'},
  {cat:'policy',type:'single',text:'2026年中央一号文件关于食品安全要求：',options:['A. 放宽农兽药残留标准','B. 严查非法添加和农兽药残留超标','C. 取消全链条监管','D. 鼓励小作坊无证生产'],answer:'B',explanation:'文件要求严格食品安全监管，严查非法添加和农兽药残留超标，强化从农田到餐桌的全链条监管。',knowledge:'时政·一号文件·食品安全'},
  {cat:'policy',type:'single',text:'2026年中央一号文件提出，要培育具有：',options:['A. 国际竞争力的农业企业','B. 垄断地位的农资公司','C. 地方保护主义的合作社','D. 非市场化经营主体'],answer:'A',explanation:'文件明确提出要培育具有国际竞争力的农业企业，支持农业企业走出去参与国际市场竞争。',knowledge:'时政·一号文件·农业企业'},
  {cat:'policy',type:'single',text:'2026年中央一号文件关于农村教育要求：',options:['A. 撤并所有乡村小学','B. 保留必要乡村小规模学校','C. 禁止农村学生进城读书','D. 取消义务教育'],answer:'B',explanation:'文件明确要求保留必要的乡村小规模学校，防止过度撤并导致农村儿童上学困难，保障农村基础教育均衡发展。',knowledge:'时政·一号文件·农村教育'},
  {cat:'policy',type:'single',text:'2026年中央一号文件强调，要推进：',options:['A. 高耗水漫灌农业','B. 节水农业和滴灌技术','C. 化肥无限量使用','D. 农药随意喷洒'],answer:'B',explanation:'文件要求大力推进节水农业，推广滴灌、喷灌等节水灌溉技术，提高农业用水效率。',knowledge:'时政·一号文件·节水农业'},
  {cat:'policy',type:'single',text:'2026年中央一号文件关于农村医疗提出要：',options:['A. 撤销乡镇卫生院','B. 推进县级医院提质升级','C. 禁止村医执业','D. 取消医保报销'],answer:'B',explanation:'文件要求推进县级医院提质升级，提升县域医疗卫生服务能力，让农民在家门口能享受高质量医疗服务。',knowledge:'时政·一号文件·农村医疗'},
  {cat:'policy',type:'single',text:'2026年中央一号文件指出，要发挥社会救助的：',options:['A. 主体作用','B. 补充作用','C. 兜底保障作用','D. 替代产业帮扶作用'],answer:'C',explanation:'文件明确社会救助要发挥兜底保障作用，对于因病因灾等原因致贫返贫的困难群众，要及时纳入社会救助范围。',knowledge:'时政·一号文件·社会救助'},
  {cat:'policy',type:'single',text:'2026年中央一号文件关于农村能源支持发展：',options:['A. 高污染燃煤锅炉','B. 分布式可再生能源','C. 柴草直燃取暖','D. 无处理沼气排放'],answer:'B',explanation:'文件要求大力发展农村分布式可再生能源，包括太阳能、风能、生物质能等清洁能源，推动农村能源革命。',knowledge:'时政·一号文件·农村能源'},
  {cat:'policy',type:'single',text:'2026年中央一号文件强调，要树立和践行：',options:['A. GDP至上政绩观','B. 形象工程政绩观','C. 正确政绩观','D. 数字报表政绩观'],answer:'C',explanation:'文件要求各级干部树立和践行正确政绩观，坚持实事求是、求真务实，把功夫下在解决农民群众实际问题上。',knowledge:'时政·一号文件·政绩观'},

  // ── 中央农村工作会议·新年贺词·中央经济工作会议（68题）──
  {cat:'policy',type:'single',text:'2025年中央农村工作会议指出，坚持稳定和完善农村土地承包关系，"大稳定、小调整"，有序推进第二轮土地承包到期后再延长三十年试点，鼓励农户通过土地流转、入股等方式发展适度规模经营，赋予农民更加充分的财产权益。这一做法（ ）①取消对承包土地的限制，增加农民劳动性收入②稳固农村基本经营制度，推动农业规模化经营③坚持农村土地集体所有，发展壮大农村集体经济④保障农民土地所有权流转的权益，促进共同富裕',
   options:['A. ①②','B. ①④','C. ②③','D. ③④'],answer:'C',
   explanation:'①错误：并非取消限制而是规范流转，增加的是财产性收入而非劳动性收入。④错误：农村土地实行集体所有制，农民享有的是承包经营权而非所有权。②③正确：延长承包期稳固了家庭联产承包责任制，促进土地适度规模经营；土地集体所有制不变，有利于发展壮大农村集体经济。',knowledge:'时政·中央农村工作会议·土地政策'},

  {cat:'policy',type:'single',text:'2025年12月30日中央农村工作会议，关于习近平对"三农"工作的重要指示，下列说法正确的有几项？①锚定农业农村现代化，扎实推进乡村全面振兴，推动城乡融合发展②要毫不放松抓好粮食生产，促进良田良种良机良法集成增效③要提高强农惠农富农政策效能，促进粮食等重要农产品价格稳步上升④要持续巩固拓展脱贫攻坚成果，把常态化帮扶纳入乡村振兴战略统筹实施⑤要学习运用"枫桥"经验，因地制宜推进宜居宜业和美乡村建设',
   options:['A. 2项','B. 3项','C. 4项','D. 5项'],answer:'A',
   explanation:'①②④正确。③错误：文件强调要防止农产品价格大起大落，维护市场稳定，不是"稳步上升"。⑤错误：乡村建设要学习"千万工程"经验，"枫桥经验"是基层社会治理经验，不对应乡村建设。正确2项，选A。',knowledge:'时政·中央农村工作会议·三农工作'},

  {cat:'policy',type:'single',text:'2025年12月30日中央农村工作会议，关于加快建设农业强国，下列说法正确的有几项？①要稳定粮油生产，加力实施新一轮千亿斤粮食产能提升行动②加强水利基础设施建设，强化气象监测预报预警，增强农业防灾减灾能力③促进"菜篮子"产业提质增效，提升多元化食物供给能力④加强耕地保护和质量提升，严守耕地红线，分区分类高速度推进高标准农田建设',
   options:['A. 1项','B. 2项','C. 3项','D. 4项'],answer:'C',
   explanation:'①②③正确，均为会议明确部署。④中"高速度"表述错误，应为"高质量"推进高标准农田建设，追求质量而非速度。正确3项，选C。',knowledge:'时政·中央农村工作会议·农业强国'},

  {cat:'policy',type:'single',text:'2025年12月30日中央农村工作会议，关于乡村建设和乡村治理，下列说法正确的有几项？①要因地制宜完善乡村建设实施机制，统筹优化乡村国土空间布局，加快补齐农村现代生活条件短板②持续整治提升农村人居环境，以钉钉子精神解决好农村改厕、垃圾围村等问题③做好农村基层组织换届选举，提高党建引领乡村治理效能④坚持和发展新时代"千万工程"经验，及时化解矛盾纠纷，维护农村稳定安宁',
   options:['A. 1项','B. 2项','C. 3项','D. 4项'],answer:'B',
   explanation:'①②正确，均为会议明确部署。③错误：提高乡村治理效能的表述正确，但"农村基层组织换届选举"不是会议重点部署内容。④错误："千万工程"经验主要用于乡村建设，化解矛盾纠纷对应"枫桥经验"。正确2项，选B。',knowledge:'时政·中央农村工作会议·乡村建设'},

  {cat:'policy',type:'single',text:'2025年12月30日中央农村工作会议，关于农民增收和乡村产业发展，下列说法正确的有几项？①加强农业关键核心技术攻关和科技成果高效转化应用，因地制宜发展农业新质生产力②要统筹建立常态化防止返贫致贫机制，健全常态化帮扶政策体系③要千方百计促进农民稳定增收，健全种粮农民收益保障机制④统筹做好外出务工服务保障和返乡就业创业扶持，促进农民工稳岗就业⑤培育壮大县域富民产业，拓展农民参与产业发展渠道和方式，健全联农带农机制',
   options:['A. 2项','B. 3项','C. 4项','D. 5项'],answer:'D',
   explanation:'①②③④⑤均为正确说法，均为会议明确部署的农民增收和乡村产业发展举措。全部5项正确，选D。',knowledge:'时政·中央农村工作会议·农民增收'},

  {cat:'policy',type:'single',text:'2025年12月30日中央农村工作会议，下列关于会议内容说法正确的是：',
   options:['A. 要坚持把解决好"三农"问题作为重中之重，坚持四级书记抓乡村振兴','B. 要稳定粮油生产，加力实施新一轮百亿斤粮食产能提升行动','C. 全面开展第二轮土地承包到期后再延长十五年整省试点','D. 规范有序做好农村各类资源盘活利用，创新乡村振兴投融资机制'],answer:'D',
   explanation:'A错误：应为五级书记（非四级）抓乡村振兴。B错误：应为新一轮千亿斤（非百亿斤）粮食产能提升行动。C错误：应再延长三十年（非十五年）。D正确：会议明确要规范有序做好农村各类资源盘活利用，创新乡村振兴投融资机制。',knowledge:'时政·中央农村工作会议·综合'},

  {cat:'policy',type:'single',text:'2025年12月30日中央农村工作会议，关于"三农"工作，下列相关说法错误的是：',
   options:['A. 必须把加快建设农业强国作为统领"三农"工作的战略总纲','B. 把实施乡村振兴战略作为新时代"三农"工作总抓手','C. 坚持把增加农民收入作为"三农"工作的中心任务','D. 把牢牢守住不发生规模性返贫致贫作为首要任务'],answer:'D',
   explanation:'D错误：守住不发生规模性返贫致贫是防止返贫工作的底线，不是"三农"工作的首要任务，"三农"工作的首要任务应为保障粮食安全。A、B、C均为正确表述，分别对应"战略总纲""总抓手""中心任务"。',knowledge:'时政·中央农村工作会议·三农战略'},

  {cat:'policy',type:'single',text:'《加快建设农业强国规划（2024—2035年）》，提出必须把加快建设农业强国作为统领"三农"工作的战略总纲。下列与加快建设农业强国有关的说法正确的是：',
   options:['A. 建立健全长江流域信息共享系统，推进长江流域农业深度节水控水','B. 完善粮食产销奖补制度，中央预算内投资向粮食主销区倾斜','C. 推进农业科技推广体系，从经营性向公益性转变','D. 推进生态综合补偿，健全横向生态保护补偿机制，统筹推进生态环境损害赔偿'],answer:'D',
   explanation:'A错误：长江流域相关政策是生态保护，不是节水控水的核心表述。B错误：中央预算内投资应向粮食主产区（非主销区）倾斜。C错误：农业科技推广体系应从经营性向公益性转变方向，实际规划方向相反，应强化公益性。D正确：健全横向生态保护补偿机制是农业强国规划的明确内容。',knowledge:'时政·农业强国规划'},

  {cat:'policy',type:'single',text:'农业强国是社会主义现代化强国的根基。下列表述正确的是：①保障粮食和重要农产品稳定安全供给始终是建设农业强国的头等大事②深化农村土地制度改革，允许农村土地所有权出租、入股、买卖③完善城乡融合发展体制机制和政策体系，促进发展要素向农村倾斜④坚持确保谷物基本自给、口粮绝对安全的粮食安全观，落实藏粮于地、藏粮于技战略⑤健全以集体经济收入为主的稳定的村级组织运转经费保障制度',
   options:['A. ①②③','B. ②③④','C. ①③④','D. ①③⑤'],answer:'C',
   explanation:'②错误：农村土地所有权属于集体，不允许出租、入股、买卖，只有经营权可依法流转。⑤错误：村级运转经费不应仅依靠集体经济收入，还有政府转移支付等多渠道保障。①③④均正确：粮食安全是头等大事；促进要素向农村倾斜；藏粮于地藏粮于技是粮食安全战略。',knowledge:'时政·农业强国·基本知识'},

  {cat:'policy',type:'single',text:'习近平主席在2026年新年贺词中深情寄语："民生无小事，枝叶总关情"。新就业群体权益保障、适老化改造便民、育儿家庭补贴发放……这些关乎群众柴米油盐、三餐四季的"小事"，始终记在党和国家心中，成为政策发力点。这是因为（ ）①价值观对人们认识和改造世界的活动具有积极导向作用②人民群众是社会历史的创造者，是社会变革的决定力量③人民群众的主观愿望是推动政策制定和实施的根本依据④坚持群众观点和群众路线是党做好一切工作的重要保证',
   options:['A. ①②','B. ②③','C. ①④','D. ②④'],answer:'D',
   explanation:'①错误：价值观并非总是具有积极导向作用，错误的价值观会产生消极导向。③错误：政策制定的根本依据是客观实际和人民根本利益，而非人民群众的主观愿望。②④正确：党关注民生体现了人民群众是社会历史主体，以及坚持群众路线的重要保证。',knowledge:'时政·新年贺词·民生政策'},

  {cat:'policy',type:'single',text:'国家主席习近平在2026年新年贺词中强调：2025年是"十四五"收官之年，科技实力、国防实力、综合国力跃上新台阶，人民群众获得感幸福感安全感不断增强。2026年是"十五五"开局之年，让我们一起为梦想奋斗，为幸福打拼，把宏伟愿景变成美好现实。这告诉我们（ ）①我国处于社会主义初级阶段的国情得以调整和改变②我国已经成为富强民主文明和谐美丽的现代化强国③人民是中国梦的主体，中国梦归根到底是人民的梦④把小我融入大我，敢于有梦、勇于追梦、勤于圆梦',
   options:['A. ①②','B. ①③','C. ②④','D. ③④'],answer:'D',
   explanation:'①错误：我国仍处于社会主义初级阶段，这一基本国情没有改变。②错误：我国还没有成为富强民主文明和谐美丽的现代化强国，这是2035年乃至更长时期的目标。③④正确：中国梦是人民的梦，需要每个人把小我融入大我、勇于追梦。',knowledge:'时政·新年贺词·中国梦'},

  {cat:'policy',type:'single',text:'习近平主席在2026年新年贺词中提到"民生无小事，枝叶总关情"，"投资于人"首次写入政府工作报告。关于政府"投资于人"下列说法正确的是（ ）①旨在始终坚持以人民为中心的发展思想②体现了群众路线是党的生命线和根本工作路线③深刻彰显了我国是人民当家作主的社会主义国家④是政府依法履行职能、坚持为人民服务的务实之举',
   options:['A. ①②','B. ①④','C. ②③','D. ③④'],answer:'B',
   explanation:'②错误："群众路线是党的生命线"是正确的，但题目中涉及的是政府行为，群众路线是党的工作方法，不直接对应政府行为表述。③"人民当家作主"是我国政治制度特征，与"投资于人"的直接关联不够紧密。①④正确：政府投资于人体现以人民为中心，是政府依法履职的体现。',knowledge:'时政·新年贺词·投资于人'},

  {cat:'policy',type:'single',text:'国家主席习近平发表的二○二六年新年贺词指出，民生无小事，枝叶总关情。过去一年，新就业群体权益有了进一步保障，适老化改造给老年人带来方便，育儿家庭每月多了300元补贴。从上述贺词内容可以读出我国（ ）①坚持以人民为中心的发展思想②将人民智慧与国家战略相结合③把实现人民幸福作为发展的目的④始终依靠人民不断推动国家发展',
   options:['A. ①②','B. ①③','C. ②④','D. ③④'],answer:'B',
   explanation:'②错误：题目材料体现的是政府关爱民生，并未体现"将人民智慧与国家战略相结合"。④错误：材料体现了政府为民服务，不是"依靠人民推动发展"的角度。①③正确：为民生改善立法立规，体现以人民为中心；把实现人民幸福作为发展目的。',knowledge:'时政·新年贺词·民生'},

  {cat:'policy',type:'single',text:'党兴方能国强。习近平在二○二六年新年贺词中强调，要砥砺初心使命，继续回答好延安"窑洞之问"，书写无愧于人民的时代答卷。对此，中国共产党应（ ）①以党的作风建设为基础，推动全面从严治党向纵深发展②强体魄于伟大的自我革命，开新局于伟大的社会革命③发挥人民监督的强制性作用，保持大党的清醒和坚定④坚持依法执政这一基本方式，永葆党的先进性、纯洁性',
   options:['A. ①③','B. ①④','C. ②③','D. ②④'],answer:'D',
   explanation:'①错误：全面从严治党的基础是党的政治建设，而非作风建设。③错误：人民监督没有"强制性作用"的表述，监督权不等于强制力。②④正确：党要以自我革命推动社会革命，依法执政是党执政的基本方式。',knowledge:'时政·新年贺词·党的建设'},

  {cat:'policy',type:'single',text:'国家主席习近平在二○二六年新年贺词中指出，山海寻梦，不觉其远；前路迢迢，阔步而行。我们要一起为梦想奋斗、为幸福打拼，把宏伟愿景变成美好现实。下列关于中国梦表述正确的是（ ）①本质是国家富强、民族振兴、人民幸福②是人民的梦，必须紧紧依靠人民来实现③是世界人民的梦想，得到世界各国支持④是主导世界的梦想，中国发展奉献世界',
   options:['A. ①②','B. ①④','C. ②③','D. ③④'],answer:'A',
   explanation:'③错误：中国梦虽对世界有积极意义，但并非"世界人民的梦想"，也未必"得到世界各国支持"，表述过于绝对。④错误：中国梦不是"主导世界"，中国走和平发展道路，不谋求霸权。①②正确：中国梦的本质是三个"富强民族人民"，它是人民的梦，必须依靠人民实现。',knowledge:'时政·新年贺词·中国梦内涵'},

  {cat:'policy',type:'single',text:'在国家主席习近平同志二○二六年新年贺词中讲到：2025年是"十四五"收官之年，5年来，党中央团结带领全国各族人民，圆满完成目标任务，我国经济总量今年预计达到140万亿元，综合国力跃上新台阶。这表明（ ）①党的全面领导是做好经济工作的根本保证②履行好经济建设职能是我们党的职责所在③科学执政，民主执政是党执政的重要方式④我们党执政的奋斗目标是发展社会生产力',
   options:['A. ①②','B. ①③','C. ②④','D. ③④'],answer:'B',
   explanation:'②错误：党不是政府，履行经济建设职能是政府的职责，党是领导和执政。④错误：党执政的奋斗目标是实现中华民族伟大复兴，带领人民实现共产主义，不仅仅是"发展社会生产力"。①③正确：党的全面领导是根本保证；科学执政、民主执政、依法执政是党执政的重要方式。',knowledge:'时政·新年贺词·党的执政'},

  {cat:'policy',type:'single',text:'国家主席习近平在2026年新年贺词中讲道：民生无小事，枝叶总关情。柴米油盐、三餐四季，每个"小家"热气腾腾，中国这个"大家"就蒸蒸日上。这体现了我国（ ）①着力增进民生福祉②解决发展动力问题③坚持协调发展理念④坚持以人民为中心',
   options:['A. ①②','B. ①④','C. ②③','D. ③④'],answer:'B',
   explanation:'②错误：材料体现的是增进民生福祉、以人民为中心，不是"解决发展动力问题"。③错误：协调发展侧重城乡、区域、物质文明与精神文明等的协调，与材料关注民生的主旨不符。①④正确：关注民生"小事"体现着力增进民生福祉和坚持以人民为中心的发展思想。',knowledge:'时政·新年贺词·发展理念'},

  {cat:'policy',type:'single',text:'二○二六年新年贺词中"山海寻梦，不觉其远；前路迢迢，阔步而行。让我们拿出跃马扬鞭的勇气，激发万马奔腾的活力，保持马不停蹄的干劲，一起为梦想奋斗、为幸福打拼，把宏伟愿景变成美好现实。"下列古诗词名句所体现的精神历程与这一奋斗逻辑顺序相符的是（ ）①男儿何不带吴钩，收取关山五十州②千磨万击还坚劲，任尔东西南北风③黄沙百战穿金甲，不破楼兰终不还④春风得意马蹄疾，一日看尽长安花',
   options:['A. ①→③→②','B. ①→③→④','C. ②→①→④','D. ③→②→④'],answer:'B',
   explanation:'贺词的奋斗逻辑是：有勇气（立志）→有干劲（坚持奋斗）→实现目标（成功喜悦）。①"男儿何不带吴钩"体现立志的勇气；③"黄沙百战穿金甲，不破楼兰终不还"体现坚定奋斗的干劲；④"春风得意马蹄疾"体现实现梦想后的喜悦。故选B：①→③→④。',knowledge:'时政·新年贺词·人文素养'},

  {cat:'policy',type:'single',text:'国家主席习近平在二○二六年新年贺词中讲道："创新创造催生了新质生产力，也让生活更加多姿多彩。"由此可知，发展新质生产力需要（ ）①坚持创新在我国现代化建设全局中的核心地位②贯彻新发展理念，发挥科技是第一动力的作用③加速淘汰传统产业，大幅提升新兴产业的比重④深化供给侧结构性改革，提高产业现代化水平',
   options:['A. ①③','B. ①④','C. ②③','D. ②④'],answer:'B',
   explanation:'③错误：发展新质生产力不是要"加速淘汰传统产业"，而是改造提升传统产业，同时发展战略性新兴产业，二者并重。②中"科技是第一动力"表述混淆，应为"科技是第一生产力"，"创新是第一动力"。①④正确：创新是现代化建设全局的核心；深化供给侧改革、提高产业现代化水平是发展新质生产力的重要路径。',knowledge:'时政·新年贺词·新质生产力'},

  {cat:'policy',type:'single',text:'国家主席习近平在2026年的新年贺词中讲道："民生无小事，枝叶总关情。"坚持以人民为中心的发展思想要（ ）①做到发展为了人民、发展依靠人民、发展成果由人民共享②发展壮大农村集体经济，实现城乡同步富裕③把人民作为发展的力量源泉，充分尊重人民群众的主体地位和首创精神④坚持乡村振兴，把实现人民群众需求作为出发点和落脚点',
   options:['A. ①④','B. ①③','C. ②③','D. ②④'],answer:'B',
   explanation:'②错误："城乡同步富裕"表述不准确，且发展农村集体经济不是坚持以人民为中心的主要内涵。④表述"坚持乡村振兴"只是以人民为中心的一个具体举措，范围过窄。①③正确：以人民为中心的核心是"发展为了人民、依靠人民、成果共享"；尊重人民主体地位和首创精神是其重要内涵。',knowledge:'时政·新年贺词·以人民为中心'},

  {cat:'policy',type:'single',text:'二○二六年新年贺词温暖有力、催人奋进。从贺词中"5年来，我们踔厉奋发、勇毅前行""我们依靠创新为高质量发展赋能""继续敞开胸怀拥抱世界"可以看出，我们的"信心"（ ）①源自于经济实力的稳步提升与发展质量的持续优化②来自创新活力的奔涌迸发与新质生产力的加速成长③彰显于世界大同的时代潮流与人民至上的深厚情怀④是对新时代历史机遇期的肯定和对未来的发展期许',
   options:['A. ①②','B. ①③','C. ②④','D. ③④'],answer:'A',
   explanation:'③错误："世界大同的时代潮流"与题目"信心"来源的逻辑关联不强，过于抽象；材料未涉及"世界大同"。④中"历史机遇期"与材料对应不直接。①②正确：5年成就体现经济实力提升；依靠创新赋能体现创新活力与新质生产力成长，这是信心的直接来源。',knowledge:'时政·新年贺词·发展信心'},

  {cat:'policy',type:'single',text:'2026年新年贺词整体上展现了中国在前进道路上的从容与坚定。从当代国际社会角度看，这种从容坚定根本上源于我国（ ）',
   options:['A. 拥有世界上最强大的军事力量和最发达的经济总量','B. 坚持独立自主的和平外交政策，赢得了所有国家的支持','C. 走符合自身国情的发展道路，并不断取得显著成就','D. 致力于改变现有的国际政治经济秩序和治理规则'],answer:'C',
   explanation:'A错误：我国军事和经济实力虽显著增强，但并非"世界最强大"和"最发达"，表述绝对化。B错误：赢得了"所有国家"支持说法绝对，并不现实。D错误：我国致力于完善而非"改变"现有国际秩序。C正确：从容坚定根本源于走符合国情的中国特色社会主义道路，并取得了显著成就。',knowledge:'时政·新年贺词·国际形势'},

  {cat:'policy',type:'single',text:'2026年新年贺词将"让大家笑容更多、心里更暖"作为民生目标。实现这一目标，需要政府（ ）',
   options:['A. 包办一切民生事项，直接满足所有个人的具体需求','B. 强化法治保障，完善收入分配，促进社会公平正义','C. 以经济增长速度为唯一衡量标准，做大财富蛋糕','D. 暂时牺牲部分群体的利益以换取整体的快速发展'],answer:'B',
   explanation:'A错误：政府不能"包办一切"，市场和社会力量也要发挥作用。C错误：衡量发展不能以经济增长速度为唯一标准，要重视高质量发展。D错误：不能牺牲部分群体利益，要坚持共同富裕。B正确：强化法治、完善收入分配、促进公平正义是政府改善民生的正确路径。',knowledge:'时政·新年贺词·政府职能'},

  {cat:'policy',type:'single',text:'2026年新年贺词中指出"2025年是十四五收官之年。大家拼搏进取、耕耘奉献，铸就了欣欣向荣的中国。我向每一位辛勤付出的奋斗者致敬！"从哲学角度看，这体现了（ ）',
   options:['A. 意识对改造客观世界具有促进作用','B. 人民群众是社会历史的主体，是社会变革的决定力量','C. 经过五年的奋斗，我们对中国式现代化的认识已经到达顶点','D. 要调整经济基础以适应上层建筑的发展'],answer:'B',
   explanation:'A错误：并非所有意识都具有促进作用，正确意识才有促进作用。C错误：认识是无限发展的，没有"顶点"。D错误：上层建筑要适应经济基础，而不是反过来。B正确：奋斗者们是中国发展的主体力量，体现了人民群众是社会历史的主体和决定力量。',knowledge:'时政·新年贺词·哲学分析'},

  {cat:'policy',type:'single',text:'2026年新年贺词强调在"深化改革开放中稳步前行"。从经济角度看，深化改革开放对于构建新发展格局的意义在于（ ）',
   options:['A. 旨在建立完全依赖国际市场的外向型经济体系','B. 是促进国内国际双循环相互孤立发展的关键','C. 能打通经济循环堵点，使生产、分配、流通、消费更多依托国内市场','D. 意味着要以对外开放为主，对内改革为辅来推动发展'],answer:'C',
   explanation:'A错误：新发展格局强调以国内大循环为主体，不是完全依赖国际市场。B错误：双循环是相互促进，不是"相互孤立"。D错误：改革和开放并重，不存在主辅之分。C正确：深化改革开放能打通经济循环堵点，畅通国内大循环，这是构建新发展格局的核心要义。',knowledge:'时政·新年贺词·新发展格局'},

  {cat:'policy',type:'single',text:'2026年新年贺词中指出"大家坚实的脚步，汇聚成中国式现代化浩荡前行最深厚的力量。"这生动诠释了（ ）',
   options:['A. 人民群众是中国式现代化事业的领导核心','B. 人民是中国式现代化的实践主体和力量源泉','C. 中国式现代化的实现路径是个人奋斗的简单相加','D. 人民通过直接行使国家权力来管理现代化事业'],answer:'B',
   explanation:'A错误：中国式现代化的领导核心是中国共产党，不是人民群众。C错误：现代化不是个人奋斗的简单相加，而是在党的领导下的整体推进。D错误：人民不是直接行使国家权力，而是通过人大等间接行使。B正确："坚实的脚步"汇聚成力量，体现人民是实践主体和力量源泉。',knowledge:'时政·新年贺词·人民主体'},

  {cat:'policy',type:'single',text:'2026年新年贺词提到C919飞向更广阔蓝天、"中国芯"持续突破。我国在科技领域取得这些成就的体制保障在于（ ）',
   options:['A. 充分发挥市场在科技资源配置中的全部作用','B. 实行单一的按劳分配制度以激励科研人员','C. 发挥新型举国体制优势，强化国家战略科技力量','D. 主要依靠引进和消化吸收国际先进技术成果'],answer:'C',
   explanation:'A错误：科技领域不能只靠市场，需要政府主导关键领域。B错误：我国实行按劳分配为主体、多种分配方式并存，不是单一按劳分配。D错误：核心技术不能靠引进，要靠自主创新。C正确：新型举国体制是我国在关键技术领域集中力量攻关的体制优势，是C919、"中国芯"等突破的重要保障。',knowledge:'时政·新年贺词·科技创新'},

  {cat:'policy',type:'single',text:'2026年新年贺词指出"书写无愧于人民的时代答卷"。从我国政治制度的角度看，这首先体现了（ ）',
   options:['A. 人民代表大会制度是我国的根本政治制度，保障人民行使国家权力','B. 我国是人民民主专政的社会主义国家，国家一切权力属于人民','C. 基层群众自治制度让人民直接管理基层公共事务和公益事业','D. 民族区域自治制度保障了少数民族人民当家作主的权利'],answer:'B',
   explanation:'"书写无愧于人民的时代答卷"体现的是国家权力属于人民，国家的一切工作都要服务于人民。这首先指向我国人民民主专政的国体，即国家一切权力属于人民这一根本原则。A是政体层面；C是基层自治；D是民族制度；B最直接对应"为人民服务"的国家性质。',knowledge:'时政·新年贺词·政治制度'},

  {cat:'policy',type:'single',text:'2026年新年贺词强调"我们依靠创新为高质量发展赋能"，并提及创新创造催生了新质生产力。对此理解正确的是（ ）',
   options:['A. 发展新质生产力意味着必须完全放弃和淘汰所有传统产业','B. 高质量发展的根本动力在于增加资本、劳动力等生产要素的投入','C. 新质生产力以创新为主导，是符合高质量发展要求的关键力量','D. 形成新质生产力主要依靠政府扩大投资和直接参与企业经营'],answer:'C',
   explanation:'A错误：发展新质生产力要改造提升传统产业，不是完全淘汰。B错误：高质量发展的根本动力是创新，不是要素投入。D错误：新质生产力要发挥市场的决定性作用，而非主要靠政府投资。C正确：新质生产力以原创性、颠覆性科技创新为主导，是高质量发展的关键力量。',knowledge:'时政·新年贺词·新质生产力'},

  {cat:'policy',type:'single',text:'从文化角度看，2026年新年贺词中展现的"闯"的精神、"奋斗"底色和"信心"支撑，集中体现了（ ）',
   options:['A. 中华传统文化在当代的直接延续和全盘继承','B. 以爱国主义为核心的民族精神和以改革创新为核心的时代精神','C. 外来文化对中国社会发展产生的决定性影响','D. 文艺创作是弘扬民族精神的唯一有效形式'],answer:'B',
   explanation:'A错误：文化要在继承中创新，不能"全盘继承"，也不是"直接延续"。C错误：中国发展靠的是自身文化精神，外来文化没有"决定性影响"。D错误：弘扬民族精神有多种形式，文艺创作不是"唯一"形式。B正确："闯"精神体现爱国主义民族精神，"奋斗"和"信心"体现改革创新的时代精神。',knowledge:'时政·新年贺词·文化精神'},

  {cat:'policy',type:'single',text:'2025年中央经济工作会议将"坚持内需主导，建设强大国内市场"置于八项重点任务首位，明确提出深入实施提振消费专项行动、制定城乡居民增收计划、优化"两重"项目投资等举措。这些部署最直接的目的是（ ）',
   options:['A. 靠政府投资拉动经济增长，筑牢经济发展根基','B. 淘汰传统产业供给，推动产业体系现代化转型','C. 全面放开消费限制，实现国内国际双循环平衡','D. 畅通国内大循环，增强新发展格局的内生动力'],answer:'D',
   explanation:'A错误：不是单纯靠政府投资，而是消费、投资、出口协同发力。B错误：不是淘汰传统产业，而是改造升级。C错误："全面放开消费限制"表述不准确，内外循环不是"平衡"关系。D正确：将内需主导摆首位，最直接目的是畅通国内大循环，增强新发展格局的内生动力。',knowledge:'时政·中央经济工作会议·内需'},

  {cat:'policy',type:'single',text:'2025年中央经济工作会议强调，要深入实施国有企业改革深化提升行动，国有企业要对准能源、矿产、粮食、信息通信等关键领域，更好发挥战略支撑作用。这体现了（ ）①国有经济必须在社会总资产中占据优势地位②国有经济必须控制国民经济命脉，对经济发展起主导作用③国有经济的主导作用主要体现在其控制力和影响力上④实施股份制改造，是国有企业改革提升的最优方案',
   options:['A. ①②','B. ③④','C. ①④','D. ②③'],answer:'D',
   explanation:'①错误：国有经济要在关键领域控制，不一定要在社会总资产中占优势地位。④错误：股份制是国企改革的重要形式，但不是"最优方案"，不能一概而论。②③正确：国有经济要控制国民经济命脉，其主导作用主要体现在控制力和影响力上。',knowledge:'时政·中央经济工作会议·国有企业'},

  {cat:'policy',type:'single',text:'2025年12月中央经济工作会议提出2026年要继续实施更加积极的财政政策，继续实施适度宽松的货币政策。以下属于货币政策的是（ ）',
   options:['A. 加大财政支出强度','B. 增加发行超长期特别国债','C. 适时降准降息','D. 增加地方政府专项债券发行使用'],answer:'C',
   explanation:'A属于财政政策（财政支出）。B增发特别国债属于财政政策。D专项债券属于财政政策。C"降准"是中央银行调整存款准备金率，"降息"是调整政策利率，都属于货币政策工具。故选C。',knowledge:'时政·中央经济工作会议·货币政策'},

  {cat:'policy',type:'single',text:'2025年中央经济工作会议明确要求"继续实施适度宽松的货币政策"。下列属于适度宽松货币政策的是（ ）',
   options:['A. 提高财政赤字率，确保政策持续用力、更加给力','B. 增加发行超长期特别国债，用于"两重"项目建设','C. 综合运用降息、降准等政策工具激发市场需求和活力','D. 央行在公开市场上卖出有价证券，收回一部分基础货币'],answer:'C',
   explanation:'A属于积极的财政政策（扩大赤字）。B增发国债属于财政政策。D央行卖出证券收回货币是紧缩性货币政策（减少流动性）。C综合运用降息降准释放流动性，是宽松货币政策的典型措施，故选C。',knowledge:'时政·中央经济工作会议·宽松货币政策'},

  {cat:'policy',type:'single',text:'2025年中央经济工作会议强调要"继续实施积极的财政政策"。下列措施中，属于积极财政政策的是（ ）①引导金融机构降低实体经济贷款利率，促进融资成本稳中有降②中国人民银行决定下调金融机构存款准备金率0.5个百分点③适度增加地方政府专项债券额度，重点用于重大项目建设④实施结构性减税降费政策，支持科技创新和制造业发展',
   options:['A. ①②','B. ①④','C. ②③','D. ③④'],answer:'D',
   explanation:'①属于货币政策（引导贷款利率属于央行货币政策传导）。②下调存款准备金率属于货币政策（宽松货币政策）。③增加地方政府专项债属于财政政策（扩大支出）；④减税降费属于财政政策（减少税收收入，扩大财政支持）。故选D：③④属于积极财政政策。',knowledge:'时政·中央经济工作会议·财政政策'},

  {cat:'policy',type:'single',text:'习近平总书记在中央经济工作会议上强调："必须坚持投资于物和投资于人紧密结合"。这说明（ ）①"物"的承载与"人"的发展还是可以独自进行的②投资于人，重在增强劳动者数量和自我发展能力③投资于物和投资于人需要统一于新质生产力发展之中④把握好投资于物和投资于人相互依存、相互促进的关系',
   options:['A. ①②','B. ①③','C. ②④','D. ③④'],answer:'D',
   explanation:'①错误："紧密结合"本身就否定了"可以独自进行"。②错误：投资于人重在提高劳动者质量和素质，而非单纯增加"数量"。③④正确：两者要统一于新质生产力发展，要把握二者相互依存相互促进的辩证关系。',knowledge:'时政·中央经济工作会议·投资于人'},

  {cat:'policy',type:'single',text:'2025年12月中央经济工作会议强调，要"制定实施城乡居民增收计划"，提高劳动报酬在初次分配中的比重，政府通过税收、社会保障、转移支付进行深度调节。这一部署表明（ ）①国民收入分配格局正朝着更加注重公平的方向调整②提高劳动报酬在初次分配中的比重属于再分配范畴③政府运用再分配调节机制旨在强化社会公平与保障④居民收入增长与经济增长同步要主要依靠市场机制',
   options:['A. ①③','B. ①④','C. ②③','D. ②④'],answer:'A',
   explanation:'②错误：提高劳动报酬在初次分配中的比重，"初次分配"范畴本身就是生产要素参与分配，而非再分配。④错误：实现收入与经济同步增长，需要政府通过再分配调节，而非主要依靠市场。①③正确：注重公平、强化再分配调节机制正是该部署的核心意图。',knowledge:'时政·中央经济工作会议·收入分配'},

  {cat:'policy',type:'single',text:'2025年12月中央经济工作会议提出明年实施更加积极的财政政策和适度宽松的货币政策。下列传导路径正确的是（ ）①央行下调存款准备金率→市场流动性充裕→企业融资成本降低→扩大生产规模②央行开展逆回购操作→增加市场货币流动→缓解企业融资难→助力经济平稳运行③发行超长期特别国债→推进重点领域投资→刺激社会总供给→促进经济提质增效④财政部实施消费贷款贴息→降低消费信贷成本→激发消费潜力→发挥消费对经济的拉动作用',
   options:['A. ①②','B. ①③','C. ②④','D. ③④'],answer:'A',
   explanation:'③错误：发行国债推进投资刺激的是"社会总需求"而非"总供给"。④"消费贷款贴息"属于财政政策，但"财政部"直接实施贴息的路径描述不够准确，一般通过银行系统执行。①②路径逻辑正确：降准→流动性增加→融资成本降低；逆回购→增加货币流动→缓解融资难。选A。',knowledge:'时政·中央经济工作会议·政策传导'},

  {cat:'policy',type:'single',text:'2025年12月中央经济工作会议强调：推进贸易投资一体化、内外贸一体化发展；深化外商投资促进体制机制改革；完善海外综合服务体系；推动共建"一带一路"高质量发展。下列推导正确的是（ ）①深化外商投资促进体制机制改革→外资抢占国内市场→挤压本土企业生存空间②完善海外综合服务体系→保障我国企业海外权益→增强我国企业海外投资的信心③推进贸易投资一体化、内外贸一体化发展→减少国内市场竞争→保护国内产业④积极发展数字贸易、绿色贸易→培育外贸发展新动能→转变对外贸易发展方式',
   options:['A. ①②','B. ①③','C. ②④','D. ③④'],answer:'C',
   explanation:'①错误：深化外商投资促进改革目的是互利共赢，不是让外资"抢占"市场挤压本土企业。③错误：内外贸一体化是促进竞争提升质量，不是"减少竞争保护国内产业"。②④路径推导正确。故选C。',knowledge:'时政·中央经济工作会议·对外贸易'},

  {cat:'policy',type:'single',text:'2025年12月中央经济工作会议指出，要"激发经营主体活力，防范部分行业内卷式竞争风险"。破除"内卷式"竞争（ ）①是激发企业创新、推动产业升级的充分条件②需要制度创新、监管强化与企业转型协同发力③旨在通过优化市场环境以提升行业整体竞争力④有利于畅通国内大循环，推动行业高质量发展和转型升级',
   options:['A. ①③','B. ①④','C. ②③','D. ②④'],answer:'D',
   explanation:'①错误：破除内卷是企业创新的必要条件之一，但不是"充分条件"，充分条件意味着只要破除内卷就一定能创新，这过于绝对。③"旨在"提升竞争力表述正确但②④更准确全面。②④正确：破除内卷需要多方协同；有利于畅通国内大循环和高质量发展。选D。',knowledge:'时政·中央经济工作会议·内卷竞争'},

  {cat:'policy',type:'single',text:'2025年12月3日，中共中央召开党外人士座谈会，就经济工作听取各民主党派中央负责人和无党派人士代表的意见建议并研究采纳。12月10日中央经济工作会议明确了明年经济社会发展目标任务。由此可见（ ）①中国共产党坚持民主集中制，科学民主决策②人民政协履行参政议政职能，参与国家方针制定③协商民主在推动中国式现代化发展中发挥独特作用④民主党派议政建言，发挥执政优势，服务发展大局',
   options:['A. ①②','B. ①③','C. ②④','D. ③④'],answer:'B',
   explanation:'②错误：题目中听取意见的是"党外人士座谈会"而非人民政协的专门会议，参与方为民主党派，不能直接等同于人民政协的参政议政。④错误：民主党派是参政党而非执政党，没有"执政优势"。①③正确：党召开座谈会体现民主集中制和科学民主决策；广泛协商体现协商民主的独特作用。',knowledge:'时政·中央经济工作会议·协商民主'},

  {cat:'policy',type:'single',text:'2025年12月中央政治局会议强调"因地制宜做好经济工作，实现高质量发展"。贵州借"凉"布局数据基础设施，内蒙古追"风"逐"日"发展新能源。上述材料体现了（ ）①把握矛盾特殊性，因地制宜制定经济发展策略②立足关键部分，以优势产业带动整体效能提升③从客观实际出发，通过错位竞争实现高质量发展④坚持共性与个性统一，以统一方案指导各地发展',
   options:['A. ①②','B. ①③','C. ②④','D. ③④'],answer:'B',
   explanation:'②错误：材料体现的是因地制宜发挥各自优势，不是强调"关键部分带动整体"的整体与部分关系。④错误：各地因地制宜是强调个性和特殊性，而非"统一方案指导"。①③正确：贵州、内蒙古各自发挥地理气候优势，体现矛盾特殊性和从客观实际出发。',knowledge:'时政·中央经济工作会议·因地制宜'},

  {cat:'policy',type:'single',text:'中央经济工作会议于2025年12月11日在北京举行，提出继续实施适度宽松的货币政策，保持流动性充裕。下列措施符合适度宽松货币政策的是（ ）①中央银行进行逆回购交易②实施更大力度减税降费政策③降低金融机构存款准备金率④提高市场存贷款基准利率',
   options:['A. ①②','B. ①③','C. ②④','D. ③④'],answer:'B',
   explanation:'②减税降费属于积极财政政策，不是货币政策。④提高存贷款利率属于紧缩性货币政策（收紧流动性）。①逆回购是央行向市场投放流动性，属于宽松货币政策；③降低准备金率释放银行可贷资金，属于宽松货币政策。故选B：①③。',knowledge:'时政·中央经济工作会议·货币政策工具'},

  {cat:'policy',type:'single',text:'中央经济工作会议部署重点任务时指出"制定全国统一大市场建设指引"。下列传导路径中，能推动建设全国统一大市场的是（ ）',
   options:['A. 落实"全国一张清单"管理模式→统一各地区市场行为→打破地方保护和区域壁垒','B. 全面取消在就业地参保户籍限制→促进劳动力跨区域流动→激发劳动力市场的活力','C. 跨省异地就医医保直接结算→提高社会保障水平→建设统一的医疗服务市场','D. 健全统一的社会信用制度→督促行政机关诚信履约→提升经营主体的交易便利度'],answer:'A',
   explanation:'"全国一张清单"管理模式→统一市场规则→打破地方保护，这条路径最直接指向全国统一大市场建设目标。B涉及劳动力流动，C涉及医保互通，D涉及信用建设，虽都有助于市场统一，但A路径最直接对应"打破地方保护和区域壁垒"这一核心目标。',knowledge:'时政·中央经济工作会议·统一大市场'},

  {cat:'policy',type:'single',text:'2025年中央经济工作会议提出要"坚持对外开放，推动多领域合作共赢"，明确"深化外商投资促进体制机制改革"等具体举措。据此，可以推断出（ ）①扩大开放是改革开放以来党的全部理论和实践的主题②开放的重点坚持引进来和走出去并重，符合我国基本国情的转变③中国坚定扩大开放，彰显了新时代通过深化改革破解发展难题的坚定决心④深化体制机制改革是新时代坚持和发展中国特色社会主义的必然要求与实践',
   options:['A. ①②','B. ①④','C. ②③','D. ③④'],answer:'D',
   explanation:'①错误：党的全部理论和实践的主题是坚持和发展中国特色社会主义，不是"扩大开放"。②错误："基本国情的转变"表述有误，我国基本国情（社会主义初级阶段）没有根本改变。③④正确：坚定扩大开放体现通过深化改革破解难题的决心；深化体制机制改革是中国特色社会主义的必然要求。',knowledge:'时政·中央经济工作会议·对外开放'},

  {cat:'policy',type:'single',text:'2025年12月中央经济工作会议提出"保持必要的财政赤字、债务总规模和支出总量"，"优化财政支出结构，强化国家重大战略财力保障，推动更多资金资源投资于人"。由此可见（ ）①我国实施积极的财政政策，以促进社会总供给与社会总需求的平衡②优化财政支出结构，意味着要削减所有非重点领域的财政资金支出③保持必要的财政赤字和债务规模表明我国要实施紧缩性的财政政策④国家通过优化财政支出结构促进资源合理配置，增强民众获得感',
   options:['A. ①②','B. ①④','C. ②③','D. ③④'],answer:'B',
   explanation:'②错误：优化结构是有增有减，合理调整，不是"削减所有非重点领域"。③错误：保持必要赤字正是积极财政政策的体现，而非紧缩性财政政策。①④正确：积极财政政策促进供需平衡；优化支出结构增强民众获得感。',knowledge:'时政·中央经济工作会议·财政政策'},

  {cat:'policy',type:'single',text:'中央经济工作会议2025年12月10至11日在北京举行，提出积极财政政策和宽松货币政策。若不考虑其他因素，下列推导正确的是（ ）①下调金融机构存款准备金率→释放银行可贷资金→增加市场流动性②增加地方政府专项债券发行使用→优化财政支出结构→提高企业市场竞争力③实施组合式税费支持政策→缓解企业资金压力→提高企业利润率④适时降准降息政策→降低中小微企业融资成本→激发中小微企业经营活力',
   options:['A. ①②','B. ①④','C. ②③','D. ③④'],answer:'B',
   explanation:'②"专项债→优化支出结构→提高企业竞争力"路径过于跳跃，专项债主要用于基础设施，不直接提高企业竞争力。③"税费支持→缓解资金压力→提高利润率"最终结果不一定是"提高利润率"，可能用于研发或扩大再生产。①④路径逻辑正确：降准释放流动性；降准降息降低融资成本激发活力。',knowledge:'时政·中央经济工作会议·政策传导路径'},

  {cat:'policy',type:'single',text:'2025年中央经济工作会议提出，"着力稳定房地产市场，因城施策控增量、去库存、优供给"。下列推导过程符合经济学原理且有利于稳定房地产市场的是（ ）①因城施策控增量→增加住房供给→实现房地产市场供求平衡→稳定房价②因城施策去库存→减少住房需求→实现房地产市场供求平衡→稳定房价③深化住房公积金制度改革→降低购房者购房成本→刺激需求→稳定房市④因城施策优供给→以新供给引领需求→带动住房消费→稳定房地产市场',
   options:['A. ①②','B. ①③','C. ②④','D. ③④'],answer:'D',
   explanation:'①错误：控增量是"减少"而非"增加"住房供给，路径描述矛盾。②错误：去库存的目的是消化存量，手段是促进需求而非"减少需求"，路径描述相反。③④路径推导正确：公积金改革降低成本刺激需求；优供给引领需求带动消费。',knowledge:'时政·中央经济工作会议·房地产'},

  {cat:'policy',type:'single',text:'中央经济工作会议指出，要引导金融机构加力支持扩大内需、科技创新、中小微企业等重点领域。这些规定的预期作用路径是（ ）①实行结构性减税→降低小微企业税收负担→激发企业经营活力②实施积极的财政政策→扩大社会总供给→推动经济高质量发展③规范税收优惠→营造公平市场秩序→增强企业聚焦核心业务④金融机构资金支持→增加企业利润→优化投资和促进供给',
   options:['A. ①②','B. ①③','C. ②④','D. ③④'],answer:'B',
   explanation:'②错误：积极财政政策扩大的是社会总需求，而非总供给。④错误：金融支持不直接"增加企业利润"，而是缓解融资难、降低成本。①③路径正确：结构性减税降低税负激发活力；规范税收优惠营造公平竞争环境。',knowledge:'时政·中央经济工作会议·金融支持'},

  {cat:'policy',type:'single',text:'2025年12月中央经济工作会议为"十五五"开局之年定调，财政政策发行1.3万亿元超长期特别国债，货币政策灵活运用降准降息等工具。下列传导路径正确的是（ ）①发行超长期特别国债→支持新质生产力与设备更新→扩大有效投资与内需→促进经济高质量发展②实施大规模设备更新补贴→降低企业生产成本→提升企业经济效益→增强市场竞争力③降低存款准备金率→释放银行信贷资金→缓解企业融资压力与成本→激发市场主体活力④降低存款准备金率→扩大信贷投放规模→持续增加社会总供给→稳定物价提振市场信心',
   options:['A. ①③','B. ①④','C. ②③','D. ②④'],answer:'A',
   explanation:'②路径中"补贴→降低成本→提升效益→增强竞争力"大体合理但过于线性，不是最典型路径。④错误：降准扩大信贷增加的是社会总需求而非总供给，且"稳定物价"逻辑不对（扩信贷可能引发通胀压力）。①③路径推导正确：国债→扩大投资内需→高质量发展；降准→释放信贷→缓解融资压力。',knowledge:'时政·中央经济工作会议·政策组合'},

  {cat:'policy',type:'single',text:'2025年中央经济工作会议提出"深化拓展人工智能+"，党的二十届四中全会建议强调"抢占人工智能产业应用制高点"。抢占人工智能产业应用制高点的意义在于（ ）①推动产业结构优化升级，促进实体经济与数字经济深度融合②赋能传统产业转型升级，提高全要素生产率以培育新质生产力③完全替代传统生产要素，降低企业运营成本实现利润最大化④主导全球人工智能产业规则制定，掌握国际经济竞争的绝对优势',
   options:['A. ①②','B. ①③','C. ②④','D. ③④'],answer:'A',
   explanation:'③错误：人工智能不能"完全替代"传统生产要素，实现"利润最大化"也不是政策目标。④错误："绝对优势"表述过于绝对，也不符合中国和平发展的外交立场。①②正确：人工智能促进产业融合升级；赋能传统产业、提高全要素生产率是培育新质生产力的重要路径。',knowledge:'时政·中央经济工作会议·人工智能'},

  {cat:'policy',type:'single',text:'2025年12月中央经济工作会议提出坚持内需主导，建设强大国内市场。若不考虑其他因素，以下政策传导路径正确的是（ ）①部分地区实行中小学春秋假→催生研学新需求→倒逼市场供给形成新业态→培育经济发展新动能②财政补贴支持消费品以旧换新→居民置换老旧家电成本降低→智能家电需求增加→消费结构优化升级③提高城乡居民基础养老金标准→增加老年居民财产性收入→老年群体消费能力增强→银发经济规模扩大④央行下调金融机构存款准备金率→居民储蓄利率下调→储蓄意愿降低→消费支出增加',
   options:['A. ①②','B. ①④','C. ②③','D. ③④'],answer:'A',
   explanation:'③错误：养老金属于转移支付，增加的是"转移性收入"而非"财产性收入"（财产性收入来自房租、股息等）。④错误：降准不直接导致"居民储蓄利率下调"，降准影响银行流动性，与储蓄利率关联非直接。①②路径推导逻辑正确。故选A。',knowledge:'时政·中央经济工作会议·扩大内需'},

  {cat:'policy',type:'single',text:'习近平总书记在2025年中央经济工作会议上指出"五个必须"：必须充分挖掘经济潜能，必须坚持政策支持和改革创新并举，必须做到既"放得活"又"管得好"，必须坚持投资于物和投资于人紧密结合，必须以苦练内功来应对外部挑战。"五个必须"（ ）①是我们党对经济工作规律性认识的深化②全景展示了党中央治国理政理念和经验③为"十五五"期间经济工作提供行动指南④为推动经济的高质量发展提供了制度保障',
   options:['A. ①③','B. ①④','C. ②③','D. ②④'],answer:'A',
   explanation:'②错误："五个必须"聚焦经济工作，而非全景展示"治国理政"全局理念。④错误："五个必须"是方法论指导，不是"制度保障"（制度保障涉及制度建设）。①③正确：这是党对经济规律认识的深化；为"十五五"期间经济工作提供行动指南。',knowledge:'时政·中央经济工作会议·五个必须'},

  {cat:'policy',type:'single',text:'2025年12月10日中央经济工作会议将"坚持内需主导、建设强大国内市场"摆在8项重点任务之首。下列关于扩大内需的传导路径正确的是（ ）',
   options:['A. 规范居民投资理财→增加居民经营性收入→提升消费能力','B. 保持必要的财政赤字→优化财政支出结构→扩大社会总供给','C. 货币政策适度宽松→下调住房贷款最低首付比例→降低消费门槛','D. 创业担保贷款政策落地→定向流动性注入创业领域→激发投资活力'],answer:'D',
   explanation:'A错误：投资理财增加的是"财产性收入"而非"经营性收入"。B错误：积极财政政策扩大的是社会总需求，不是总供给。C错误：住房贷款首付比例属于宏观审慎政策，不直接由"货币政策适度宽松"决定。D路径逻辑较为合理：创业担保贷款→资金流入创业领域→激发投资活力，有助于内需扩大。',knowledge:'时政·中央经济工作会议·扩大内需路径'},

  {cat:'policy',type:'single',text:'2025年12月10日，中央经济工作会议总结2025年经济工作，部署2026年经济工作，要求继续实施更加积极的财政政策。下列属于积极的财政政策的是（ ）',
   options:['A. 减少国家财政支出，增加税收','B. 引导商业银行加大对实体经济的支持','C. 提高银行贷款利率，缓解企业融资难问题','D. 实施减税降费政策，支持重点领域发展'],answer:'D',
   explanation:'A属于紧缩性财政政策（减支增税）。B属于货币政策（央行引导银行行为）。C提高贷款利率属于紧缩性货币政策。D减税降费属于积极财政政策（减少税收收入，增强企业和居民可支配资金）。故选D。',knowledge:'时政·中央经济工作会议·积极财政政策'},

  {cat:'policy',type:'single',text:'中央经济工作会议部署2026年经济工作时强调，深入整治"内卷式"竞争。"内卷式"竞争（ ）①是市场配置资源的必然结果，应通过市场自主解决②违背市场经济公平竞争原则，阻碍全国统一大市场建设③使企业陷入低水平发展困境，与高质量发展要求背道而驰④会倒逼企业降价让利，最终形成低价优质的良性市场生态',
   options:['A. ①②','B. ①④','C. ②③','D. ③④'],answer:'C',
   explanation:'①错误："内卷式"竞争是市场失灵的表现，不能仅靠市场自主解决，需要政府干预和制度规范。④错误：内卷式竞争导致低质低价，破坏市场生态，不会形成"低价优质的良性生态"。②③正确：内卷式竞争破坏公平竞争和统一大市场；使企业陷入低水平困境，背离高质量发展。',knowledge:'时政·中央经济工作会议·内卷竞争'},

  {cat:'policy',type:'single',text:'2025年12月中央经济工作会议明确提出，扩大内需是明年排在首位的重点任务，要把握消费的结构性变化，从供需两侧发力提振消费。由此可见，我们扩大内需就要需要增强（ ）①消费对经济发展的基础性作用②投资对优化供给结构的关键作用③紧缩性财政政策和扩张性货币政策作用④扩张性财政政策和紧缩性货币政策作用',
   options:['A. ①②','B. ①③','C. ②④','D. ③④'],answer:'A',
   explanation:'③错误：扩大内需需要积极财政政策（扩张）和宽松货币政策（扩张），不是紧缩性财政政策。④错误：宏观调控方向是"更加积极的财政政策+适度宽松的货币政策"，不是紧缩性货币政策。①②正确：消费是拉动经济的基础；投资优化供给结构是供给侧的关键。',knowledge:'时政·中央经济工作会议·消费与投资'},

  {cat:'policy',type:'single',text:'2025年12月11日闭幕的中央经济工作会议指出，做好明年的经济工作，要坚持我国基本经济制度。这里所说的我国基本经济制度主要包括我国的（ ）①生产资料所有制②社会主义市场经济体制③多种所有制经济共同发展④国有经济和农村集体经济',
   options:['A. ①②','B. ①③','C. ②④','D. ③④'],answer:'B',
   explanation:'②社会主义市场经济体制是我国的经济体制，而非基本经济制度。④国有经济和农村集体经济只是公有制经济的组成部分，不是基本经济制度的完整表述。①③正确：我国基本经济制度包括：以公有制为主体（涉及生产资料所有制）、多种所有制经济共同发展，以及按劳分配为主体多种分配方式并存等。',knowledge:'时政·中央经济工作会议·基本经济制度'},

  {cat:'policy',type:'single',text:'2025年12月中央经济工作会议指出，我国持续推进民生领域重点改革，实施稳岗扩容提质行动、优化药品集中采购、推行长期护理保险制度、倡导积极婚育观等一系列举措。这些举措的共同作用是（ ）',
   options:['A. 完善再分配调节机制，维护社会公平正义','B. 健全基本公共服务体系，保障和改善民生','C. 发挥市场决定性作用，提高资源配置效率','D. 扩大中等收入群体的规模，促进共同富裕'],answer:'B',
   explanation:'A：这些举措中有些不属于再分配范畴（如倡导婚育观）。C：这些是政府公共服务举措，不是发挥市场作用。D：扩大中等收入群体是结果之一，但不是所有举措的直接目的。B正确：稳岗、医保、护理保险、婚育政策等共同指向健全基本公共服务体系、保障和改善民生。',knowledge:'时政·中央经济工作会议·民生改革'},

  {cat:'policy',type:'single',text:'2025年12月8日，中共中央政治局召开会议，分析当前的经济形势和研究2026年经济工作。会议指出，明年经济工作要坚持稳中求进、提质增效，继续实施更加积极的财政政策和适度宽松的货币政策。由此可知（ ）①物质与意识相互依赖，是不可分割的②要把客观条件与发展目标作为工作的出发点③政策是对新形势新情况的能动反映④正确把握经济规律是有效进行宏观调控的前提',
   options:['A. ①②','B. ①④','C. ②③','D. ③④'],answer:'D',
   explanation:'①错误：物质决定意识，不是"相互依赖"，两者不是对等关系。②错误：工作的出发点应是客观实际（物质条件），而非"客观条件与发展目标"并列。③④正确：根据经济形势变化调整政策，体现政策是能动反映；正确把握规律是宏观调控有效的前提。',knowledge:'时政·中央经济工作会议·哲学分析'},

  {cat:'policy',type:'single',text:'中央经济工作会议（2025年12月10-11日）强调继续实施更加积极的财政政策。下列选项能正确描述上述政策传导路径的是（ ）',
   options:['A. 提高存款准备金率→增加市场流动性→激发企业活力→推动实体经济提质增效','B. 提高增值税起征点→企业税负减轻→科技创新能力提升→推动经济高质量发展','C. 发行地方政府专项债→推动产业升级→化解企业经营风险→筑牢实体经济基础','D. 增加地方政府债务规模→基层"三保"支出减少→优化资源配置→提升治理效能'],answer:'B',
   explanation:'A错误：提高存款准备金率是收紧货币（减少流动性），属于紧缩货币政策，与积极财政政策无关，且方向相反。C中"专项债→推动产业升级→化解企业风险"路径跳跃较大。D"增加债务→三保支出减少"逻辑相反，增加债务是为保障三保支出，不是减少。B路径相对合理：提高增值税起征点（财政政策）→减轻税负→企业有更多资金投入创新。',knowledge:'时政·中央经济工作会议·财政政策传导'},

  {cat:'policy',type:'single',text:'中央经济工作会议再次强调因地制宜发展新质生产力。有人提出"只有因地制宜，才能推动新质生产力发展"，若以此为前提，下列推理必为真的是（ ）①如果新质生产力提高，必然做到因地制宜②如果做到因地制宜，就能提高新质生产力③新质生产力没有提高，就没有做到因地制宜④没有做到因地制宜，就没有提高新质生产力',
   options:['A. ①②','B. ①④','C. ②③','D. ③④'],answer:'B',
   explanation:'"只有A（因地制宜），才能B（推动新质生产力）"的逻辑结构是"A是B的必要条件"，即：B→A（有B必有A），非A→非B（没A就没B）。①若B则A（正确）；②若A则B（充分条件，错误，A是必要条件）；③非B则非A（即①的逆否，正确但与①等价）；④非A则非B（正确）。①和③等价，④直接正确。题目选B（①④）。',knowledge:'时政·中央经济工作会议·逻辑推理'},

  {cat:'policy',type:'single',text:'中央经济工作会议提出2026年经济要坚持稳中求进、提质增效，发挥存量政策和增量政策集成效应，提升宏观经济治理效能。这一政策部署蕴含的逻辑思维方法是（ ）',
   options:['A. 归纳推理','B. 逆向思维','C. 类比推理','D. 系统优化方法'],answer:'D',
   explanation:'"发挥存量政策和增量政策集成效应"体现了将多种政策工具整合优化，协同发力，追求整体效果最优，这正是系统优化方法（整体优化）的体现。归纳推理是从个别到一般；逆向思维是反向考虑；类比推理是依据相似性推理；系统优化是统筹协调各部分达到整体最优。',knowledge:'时政·中央经济工作会议·思维方法'},

  {cat:'policy',type:'single',text:'"十五五"规划围绕积极应对人口老龄化作出专项部署，提出健全养老事业和产业协同发展政策机制，优化基本养老服务供给，完善城乡养老服务网络，发展医育、医养结合服务，扩大康复护理、安宁疗护服务供给。这说明（ ）①加强公共设施适老化改造，是筑牢现代化经济体系根基的关键性举措②社会保障作为初次分配的重要手段，能够有效防范和化解社会养老风险③完善城乡养老服务网络，旨在保障老年人基本养老需求，促进社会公平正义④养老事业与产业协同发展，能实现公共服务兜底与市场资源配置的优势互补',
   options:['A. ①②','B. ①④','C. ②③','D. ③④'],answer:'D',
   explanation:'①错误：适老化改造属于社会保障和民生领域，不是"现代化经济体系根基"（根基是实体经济）。②错误：社会保障属于再分配范畴，不是初次分配的手段。③④正确：完善养老网络旨在保障基本需求促进公平；养老事业（政府兜底）与产业（市场配置）协同是互补关系。',knowledge:'时政·十五五规划·老龄化应对'},

  {cat:'policy',type:'single',text:'本次中央经济工作会议指出，需充分发挥市场在资源配置中的决定性作用。下列选项能体现市场作为资源配置方式的是（ ）',
   options:['A. 2025年，浙江省政府投入20亿元用于省内生态保护与修复工程','B. 财政部紧急下拨2025年洪涝灾害救灾资金15亿元，支援灾区重建','C. 教育部启动2025年义务教育薄弱环节改善计划，提供专项补贴','D. 2025年，腾讯集团收购某人工智能公司股权，拓展科技业务布局'],answer:'D',
   explanation:'A、B、C都是政府（行政）配置资源的方式：政府投入生态保护、财政下拨救灾资金、教育部提供专项补贴，都属于行政手段。D腾讯收购人工智能公司股权，是企业基于市场信号、价值判断做出的投资决策，是市场配置资源的典型体现。',knowledge:'时政·中央经济工作会议·市场配置'},

  {cat:'policy',type:'single',text:'中央经济工作会议明确指出新一年的财政政策也将"更加积极"，财政部门将通过适度赤字安排、专项债优化使用、税收政策进一步调整等多措并举。下列属于更加积极的财政政策的是（ ）①落实好减税降费政策②缩小政府债券发行规模③加大政府社会保障支出④降准降息加大信贷投放力度',
   options:['A. ①②','B. ①③','C. ②④','D. ③④'],answer:'B',
   explanation:'②错误：缩小债券发行规模属于紧缩性财政政策（减少赤字）。④降准降息属于货币政策，不是财政政策。①减税降费属于积极财政政策（减少财政收入，扩大市场主体活力）；③加大社保支出属于积极财政政策（扩大财政支出，增进民生）。选B：①③。',knowledge:'时政·中央经济工作会议·积极财政政策'},

  {cat:'policy',type:'single',text:'2025年是全球经济复杂多变和国内经济转型的关键时期，稳中求进、以进促稳、先立后破是中央经济工作会议为2025年经济工作定下的总基调。"稳"是基础，"进"是关键，"破"是条件也是结果。这体现了（ ）①要坚持感性认识和理性认识的辩证统一②要坚持两点论和重点论的辩证统一③发展状态是前进性和曲折性的统一④矛盾的普遍性和特殊性的辩证统一',
   options:['A. ①②','B. ①③','C. ②④','D. ③④'],answer:'C',
   explanation:'①错误：材料谈的是经济工作方法论，不是认识论中感性与理性的关系。③错误：材料强调的是工作方法和辩证关系，不是发展的前进性和曲折性统一。②正确：既要"稳"又要"进"，同时突出"进"的关键，体现两点论和重点论统一。④正确："稳"是各地普遍要坚持的（普遍性），各地如何"稳"因地制宜（特殊性），体现普遍性与特殊性统一。',knowledge:'时政·中央经济工作会议·哲学方法论'},

  {cat:'policy',type:'single',text:'2025年中央经济工作会议要求，明年要坚持稳中求进、以进促稳、先立后破，要增强宏观政策取向一致性。宏观调控的主要目标是（ ）①促进经济增长②缩小收入差距③稳定物价④保持贸易顺差',
   options:['A. ①③','B. ①④','C. ②③','D. ②④'],answer:'A',
   explanation:'宏观调控的主要目标通常包括四个：促进经济增长、增加就业、稳定物价、保持国际收支平衡。②缩小收入差距是分配政策目标，不是宏观调控的主要目标。④保持贸易顺差不是目标，而是保持国际收支平衡（不追求顺差）。①促进经济增长③稳定物价是宏观调控核心目标。',knowledge:'时政·中央经济工作会议·宏观调控目标'},

  // ── 二十届四中全会其他部分（43题）──
  {cat:'policy',type:'single',text:'2025年10月23日，党的二十届四中全会提出了制定"十五五规划"的建议，国务院将根据党中央建议编制"十五五"规划纲要草案，并提请2026年第十四届全国人民代表大会第四次会议审查批准。这表明（ ）①国务院是全国人民代表大会的执行机关②国务院坚持在党的领导下依法行使职权③依法执政是党执政的基本方式和基本前提④坚持党的领导和人民当家作主本质上是一致的',
   options:['A. ①③','B. ①④','C. ②③','D. ②④'],answer:'D',
   explanation:'①错误：国务院是全国人民代表大会的执行机关说法不完整，国务院是最高国家权力机关的执行机关，即最高国家行政机关。③错误：依法执政是党执政的基本方式，不是基本前提，科学执政、民主执政、依法执政是党执政的三种方式。②④正确：国务院根据党中央建议编制规划，体现坚持党的领导依法行使职权；党的领导与人民当家作主本质一致。',knowledge:'时政·二十届四中全会·政治制度'},

  {cat:'policy',type:'single',text:'党的二十届四中全会指出，"十五五"时期我国发展处于战略机遇和风险挑战并存、不确定难预料因素增多的时期。我国经济基础稳、优势多、韧性强、潜能大，长期向好的支撑条件和基本趋势没有变，中国特色社会主义制度优势、超大规模市场优势、完整产业体系优势、丰富人才资源优势更加彰显。这要求我们（ ）①用联系的观点把握发展的过去与未来②推动事物的复杂矛盾转化为简单矛盾③将中国优势作为普遍经验推广至世界④分清主流支流，抓住矛盾的主要方面',
   options:['A. ①②','B. ①④','C. ②③','D. ③④'],answer:'B',
   explanation:'②错误：矛盾有其复杂性，不能人为"推动复杂矛盾转化为简单矛盾"，矛盾转化是客观的。③错误：矛盾具有特殊性，中国优势不能作为"普遍经验推广至世界"，各国国情不同。①④正确：用联系的观点把握过去与未来；既看到风险挑战又看到长期向好趋势，体现分清主流支流、抓住矛盾主要方面。',knowledge:'时政·二十届四中全会·哲学分析'},

  {cat:'policy',type:'single',text:'党的二十届四中全会审议通过《中共中央关于制定国民经济和社会发展第十五个五年规划的建议》，对未来五年发展作出顶层设计和战略擘画。第十五个五年规划（ ）①运用了抽象思维，其思维表达具有严谨性②是多样性统一的事物整体在思维中的再现③通过简略化的环节，把握了事物的本质和规律④以实践为基础，实现从思维具体到思维抽象的飞跃',
   options:['A. ①②','B. ①③','C. ②④','D. ③④'],answer:'A',
   explanation:'③错误："简略化"表述有误，科学规划是通过抽象分析把握本质，不是"简略化"。④错误：认识过程是从感性具体→思维抽象→思维具体，规划是思维具体的成果，不是"从思维具体到思维抽象"。①②正确：规划运用抽象思维，具有严谨性；规划是多样性统一的现实整体在思维中的再现（思维具体）。',knowledge:'时政·二十届四中全会·思维方法'},

  {cat:'policy',type:'single',text:'二十届四中全会擘画了中国未来五年的发展蓝图，宣示了接续推进中国式现代化的决心。下列国家机关的举措有助于实现中国式现代化的是（ ）',
   options:['A. 司法机关严格公正司法，加强人权司法保障','B. 中国共产党加强民主集中制，完善党内法规','C. 群众通过基层自治组织管理国家事务','D. 全国人民代表大会领导其他机关推进法治建设'],answer:'A',
